<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="테이블현황">
<title>테이블 현황</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif; background: #f0f2f5; color: #1e293b; overflow: hidden; position: fixed; width: 100%; height: 100%; }

#wrap { display: flex; flex-direction: column; width: 100%; height: 100%; }
#hd   { flex-shrink: 0; background: #fff; border-bottom: 1px solid #e2e8f0; padding: 8px 12px; display: flex; align-items: center; justify-content: space-between; gap: 6px; }
#tb   { flex-shrink: 0; background: #fff; border-bottom: 1px solid #e2e8f0; display: flex; padding: 0 12px; gap: 4px; }
#body { flex: 1; display: flex; overflow: hidden; min-height: 0; position: relative; }

.hd-left  { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.hd-logo  { width: 32px; height: 32px; background: linear-gradient(135deg,#3b82f6,#6366f1); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.hd-title { font-weight: 800; font-size: 15px; }
.hd-date  { font-size: 10px; color: #94a3b8; }
.hd-right { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.chip     { border-radius: 99px; padding: 3px 8px; font-size: 11px; font-weight: 700; border: 1px solid; white-space: nowrap; }
#badge    { font-size: 11px; font-weight: 600; white-space: nowrap; color: transparent; }

.tab { padding: 10px 14px; border: none; background: none; font-size: 13px; font-weight: 700; color: #94a3b8; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.tab.on { color: #3b82f6; border-bottom-color: #3b82f6; }

/* ── 사이드바 ── */
#sb { width: 180px; flex-shrink: 0; background: #fff; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; overflow: hidden; position: relative; z-index: 10; }

/* 사이드바 헤더: 타이틀 + 대기추가 버튼 */
.sb-hd { flex-shrink: 0; padding: 9px 10px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: space-between; gap: 4px; }
.sb-hd-title { font-weight: 800; font-size: 12px; color: #64748b; }

/* 사이드바 스크롤 컨테이너 */
#sb-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

/* 섹션 구분 헤더 */
.sb-sec { padding: 5px 10px 3px; font-size: 10px; font-weight: 800; color: #94a3b8; letter-spacing: .04em; background: #f8fafc; border-bottom: 1px solid #f1f5f9; position: sticky; top: 0; z-index: 2; display: flex; align-items: center; justify-content: space-between; }
.sb-sec-cnt { background: #e2e8f0; color: #64748b; border-radius: 99px; padding: 0 5px; font-size: 10px; font-weight: 700; }

/* 아이템 공통 */
.sb-row { padding: 8px 10px; border-bottom: 1px solid #f8fafc; cursor: pointer; }
.sb-row:active { background: #f8fafc; }
.sb-row-top { display: flex; align-items: center; justify-content: space-between; gap: 4px; }
.sb-row-name { font-weight: 700; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sb-row-sub  { font-size: 11px; color: #94a3b8; margin-top: 2px; }
.sb-badge    { font-size: 10px; font-weight: 700; border-radius: 4px; padding: 1px 5px; flex-shrink: 0; }

/* 대기 번호 */
.wi-num { width: 18px; height: 18px; border-radius: 50%; background: #e0e7ff; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 800; color: #6366f1; flex-shrink: 0; }

.sb-empty { padding: 14px 10px; text-align: center; color: #cbd5e1; font-size: 11px; }

/* ── 메인 영역 ── */
#main { position: absolute; top: 0; left: 0; right: 0; bottom: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 10px; display: flex; flex-direction: column; }
#rv   { position: absolute; top: 0; left: 0; right: 0; bottom: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 10px; display: none; flex-direction: column; gap: 10px; }
#rv.on { display: flex; }

#leg { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; align-items: center; }
.ld  { display: flex; align-items: center; gap: 3px; font-size: 11px; color: #64748b; }
.lc  { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

#cv  { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; position: relative; width: 100%; overflow: hidden; }
#cvi { position: absolute; inset: 0; overflow: hidden; }
#edbanner { display: none; position: absolute; top: 0; left: 0; right: 0; background: rgba(99,102,241,0.12); border-bottom: 2px dashed #6366f1; padding: 6px 10px; font-size: 11px; color: #6366f1; font-weight: 700; text-align: center; z-index: 5; align-items: center; justify-content: space-between; gap: 6px; }
#cv.em #edbanner { display: flex; }
#cv.em { border: 2px dashed #6366f1; }
#btn-add-table { background: #6366f1; color: #fff; border: none; border-radius: 6px; padding: 4px 9px; font-size: 11px; font-weight: 700; cursor: pointer; white-space: nowrap; flex-shrink: 0; }

.tc { position: absolute; border-radius: 10px; border: 2px solid; display: flex; flex-direction: column; overflow: hidden; cursor: pointer; }
.tc.bar { border-radius: 7px; flex-direction: row; align-items: center; justify-content: space-between; }
.tc.drag { opacity: 0.82; z-index: 50; box-shadow: 0 8px 24px rgba(0,0,0,0.18); }

/* 통계 3칸 */
#stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 7px; margin-top: 10px; }
.sc { background: #fff; border-radius: 10px; padding: 9px 10px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 7px; }
.si { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.sl { font-size: 10px; color: #94a3b8; }
.sv { font-weight: 800; font-size: 14px; }

.bp  { background: #3b82f6; color: #fff; border: none; border-radius: 7px; padding: 6px 11px; font-size: 13px; font-weight: 700; cursor: pointer; }
.bg  { background: #fff; border: 1px solid #e2e8f0; border-radius: 7px; padding: 5px 10px; font-size: 12px; color: #64748b; cursor: pointer; font-weight: 600; }
.be  { background: #6366f1; color: #fff; border: none; border-radius: 7px; padding: 5px 10px; font-size: 12px; font-weight: 700; cursor: pointer; }
.be.on { background: #ef4444; }

.rv-top { display: flex; align-items: center; gap: 8px; }
.rv-srch { flex: 1; padding: 9px 12px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 14px; outline: none; -webkit-appearance: none; font-family: inherit; background: #fff; }
.rv-srch:focus { border-color: #3b82f6; }

#cal { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; padding: 12px; }
.cal-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.cal-m { font-weight: 800; font-size: 14px; }
.cal-nav { background: none; border: 1px solid #e2e8f0; border-radius: 6px; width: 28px; height: 28px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
.cal-g { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
.cal-dow { text-align: center; font-size: 10px; font-weight: 700; color: #94a3b8; padding: 3px 0; }
.cal-dow:first-child { color: #ef4444; }
.cal-dow:last-child  { color: #3b82f6; }
.cd { text-align: center; padding: 4px 2px; border-radius: 6px; font-size: 12px; cursor: pointer; min-height: 28px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; }
.cd.today { background: #eff6ff; color: #3b82f6; font-weight: 800; }
.cd.sel   { background: #3b82f6; color: #fff; font-weight: 800; }
.cd.sel .dot { background: #fff; }
.cd.other { color: #cbd5e1; }
.cd.sun { color: #ef4444; } .cd.sat { color: #3b82f6; }
.cd.sel.sun, .cd.sel.sat { color: #fff; }
.dot { width: 4px; height: 4px; border-radius: 50%; background: #3b82f6; }

#rvw { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; }
.rvw-hd { padding: 11px 13px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: space-between; }
.rvw-title { font-weight: 800; font-size: 14px; }
.rvi { padding: 11px 13px; border-bottom: 1px solid #f8fafc; cursor: pointer; display: flex; align-items: flex-start; gap: 9px; }
.rvi:last-child { border-bottom: none; }
.rvi-t { background: #eff6ff; color: #3b82f6; border-radius: 6px; padding: 4px 7px; font-size: 12px; font-weight: 800; flex-shrink: 0; min-width: 46px; text-align: center; }
.rvi-b { flex: 1; min-width: 0; }
.rvi-n { font-weight: 700; font-size: 14px; }
.rvi-s { font-size: 11px; color: #64748b; margin-top: 1px; }
.rvi-m { font-size: 11px; color: #94a3b8; margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rvi-st { font-size: 11px; font-weight: 700; border-radius: 5px; padding: 2px 6px; flex-shrink: 0; }

#mo { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.5); z-index: 999; align-items: center; justify-content: center; padding: 16px; overflow-y: auto; }
#mo.on { display: flex; }
.md { background: #fff; border-radius: 16px; padding: 18px 18px 14px; width: 100%; max-width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
.md-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.md-title { font-weight: 800; font-size: 16px; }
.md-x { background: #f1f5f9; border: none; border-radius: 50%; width: 30px; height: 30px; font-size: 16px; cursor: pointer; color: #64748b; display: flex; align-items: center; justify-content: center; }
.mb { display: flex; flex-direction: column; gap: 11px; }
.ib { border-radius: 11px; border: 1px solid; padding: 12px 14px; margin-bottom: 12px; }
.ir { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; }
.ir:last-child { margin-bottom: 0; }
.il { color: #64748b; }
.iv { font-weight: 700; }
.gbs { display: flex; gap: 6px; flex-wrap: wrap; }
.gb  { width: 42px; height: 42px; border-radius: 9px; border: 2px solid #e2e8f0; background: #fff; color: #64748b; font-weight: 800; font-size: 15px; cursor: pointer; }
.gb.bl { border-color: #3b82f6; background: #eff6ff; color: #3b82f6; }
.gb.pu { border-color: #8b5cf6; background: #f5f3ff; color: #8b5cf6; }
.gb.gr { border-color: #10b981; background: #ecfdf5; color: #065f46; }
.gb.in { border-color: #6366f1; background: #f5f3ff; color: #6366f1; }
.abs { display: flex; gap: 7px; }
.ab  { flex: 1; padding: 12px 0; border: none; border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer; color: #fff; }
.fg  { display: flex; flex-direction: column; gap: 4px; }
.fl  { font-size: 12px; color: #64748b; }
.fi  { width: 100%; padding: 9px 11px; border: 1.5px solid #e2e8f0; border-radius: 9px; font-size: 14px; outline: none; -webkit-appearance: none; font-family: inherit; background: #fff; color: #1e293b; }
.fi:focus { border-color: #3b82f6; }
textarea.fi { resize: none; min-height: 60px; }
.tpb { padding: 11px 13px; background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: 700; width: 100%; color: #1e293b; }
.tps { color: #94a3b8; font-size: 12px; font-weight: 500; }
.g2  { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
.type-btn { padding: 7px 12px; border: 2px solid #e2e8f0; border-radius: 8px; background: #fff; color: #64748b; font-weight: 700; font-size: 13px; cursor: pointer; }
.type-btn.on { border-color: #6366f1; background: #f5f3ff; color: #6366f1; }
</style>
</head>
<body>
<div id="wrap">
  <div id="hd">
    <div class="hd-left">
      <div class="hd-logo">🍽</div>
      <div>
        <div class="hd-title">테이블 현황</div>
        <div class="hd-date" id="hdate"></div>
      </div>
    </div>
    <div class="hd-right">
      <span id="badge"></span>
      <span class="chip" id="c1" style="color:#3b82f6;border-color:#3b82f629;background:#3b82f615"></span>
      <span class="chip" id="c2" style="color:#8b5cf6;border-color:#8b5cf629;background:#8b5cf615"></span>
      <span class="chip" id="c3" style="color:#6366f1;border-color:#6366f129;background:#6366f115"></span>
      <button class="be" id="bedit">✏️배치</button>
    </div>
  </div>

  <div id="tb">
    <button class="tab on" id="t1">🪑 홀 현황</button>
    <button class="tab"    id="t2">📋 예약 관리</button>
  </div>

  <div id="body">
    <!-- 사이드바: 단일 스크롤 리스트 -->
    <div id="sb">
      <div class="sb-hd">
        <span class="sb-hd-title">현황</span>
        <button class="bp" style="font-size:11px;padding:4px 8px" id="bwait">+ 대기</button>
      </div>
      <div id="sb-scroll"></div>
    </div>

    <div id="main">
      <div id="leg">
        <div class="ld"><div class="lc" style="background:#cbd5e1"></div>빈 테이블</div>
        <div class="ld"><div class="lc" style="background:#3b82f6"></div>예약</div>
        <div class="ld"><div class="lc" style="background:#ca8a04"></div>~1시간</div>
        <div class="ld"><div class="lc" style="background:#ea580c"></div>1~1.5h</div>
        <div class="ld"><div class="lc" style="background:#dc2626"></div>1.5h+</div>
        <span id="ehint" style="margin-left:auto;font-size:11px;color:#6366f1;font-weight:700"></span>
      </div>
      <div id="cv">
        <div id="edbanner">
          <span>✏️ 탭=편집 · 길게=드래그</span>
          <button id="btn-add-table">+ 테이블</button>
        </div>
        <div id="cvi"></div>
      </div>
      <div id="stats">
        <div class="sc"><div class="si" style="background:#3b82f615">👥</div><div><div class="sl">착석 인원</div><div class="sv" id="s1" style="color:#3b82f6">0명</div></div></div>
        <div class="sc"><div class="si" style="background:#f59e0b15">🪑</div><div><div class="sl">착석 테이블</div><div class="sv" id="s2" style="color:#f59e0b">0개</div></div></div>
        <div class="sc"><div class="si" style="background:#10b98115">⬜</div><div><div class="sl">빈 테이블</div><div class="sv" id="s3" style="color:#10b981">0개</div></div></div>
      </div>
    </div>

    <div id="rv">
      <div class="rv-top">
        <input class="rv-srch" id="rvsrch" type="search" placeholder="🔍 이름, 연락처 검색…">
        <button class="bp" id="baddRv">+ 예약 추가</button>
      </div>
      <div id="cal">
        <div class="cal-hd">
          <button class="cal-nav" id="bcalp">‹</button>
          <span class="cal-m" id="calm"></span>
          <button class="cal-nav" id="bcaln">›</button>
        </div>
        <div class="cal-g">
          <div class="cal-dow">일</div><div class="cal-dow">월</div><div class="cal-dow">화</div>
          <div class="cal-dow">수</div><div class="cal-dow">목</div><div class="cal-dow">금</div><div class="cal-dow">토</div>
        </div>
        <div class="cal-g" id="calg"></div>
      </div>
      <div id="rvw">
        <div class="rvw-hd"><span class="rvw-title" id="rvtitle">전체 예약</span><span style="font-size:11px;color:#94a3b8" id="rvcnt"></span></div>
        <div id="rvlist"></div>
      </div>
    </div>
  </div>
</div>

<div id="mo"><div class="md" id="mdc"></div></div>

<script>
var STORAGE_KEY = 'tv5';
var INIT_TABLES = [
  {id:1,n:"1번",t:"4인",c:4,px:2, py:5 },
  {id:2,n:"2번",t:"4인",c:4,px:35,py:5 },
  {id:3,n:"3번",t:"4인",c:4,px:68,py:5 },
  {id:4,n:"4번",t:"4인",c:4,px:68,py:32},
  {id:5,n:"5번",t:"4인",c:4,px:68,py:58},
  {id:6,n:"6번",t:"2인",c:2,px:68,py:80},
  {id:7,n:"바1",t:"바", c:2,px:2, py:35},
  {id:8,n:"바2",t:"바", c:2,px:2, py:56},
  {id:9,n:"바3",t:"바", c:2,px:2, py:77}
];

var S = { tables:[], waits:[], ress:[], daily:[] };
var currentTab='floor', editMode=false, saveTimer=null;
var calY=new Date().getFullYear(), calM=new Date().getMonth(), calSel=null;
var gvFloor=2, gvWait=2, gvRes=2, gvRvAdd=2, gvRvEdit=2;
var activeResTableId=null;
var dragOffset={x:0,y:0}, dragPanelRect=null;

// ── XSS 방어
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function uid(){ return Date.now()+'_'+Math.random().toString(36).slice(2,7); }
function makeTable(t){ return {id:t.id,n:t.n,t:t.t,c:t.c,px:t.px,py:t.py,st:'empty',g:0,seatTime:null,res:null}; }

// ── 저장/로드
function loadData(){
  try{
    var d=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
    if(Array.isArray(d.tables)&&d.tables.length) S.tables=d.tables;
    if(Array.isArray(d.waits))  S.waits =d.waits;
    if(Array.isArray(d.ress))   S.ress  =d.ress;
    if(Array.isArray(d.daily))  S.daily =d.daily;
  }catch(e){ console.warn(e); }
}
function saveData(){
  clearTimeout(saveTimer); showBadge('saving');
  saveTimer=setTimeout(function(){
    try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(S)); showBadge('saved'); setTimeout(function(){showBadge('');},2000); }
    catch(e){ showBadge('err'); }
  },700);
}
function showBadge(s){
  var el=document.getElementById('badge');
  el.style.color={saving:'#f59e0b',saved:'#10b981',err:'#ef4444'}[s]||'transparent';
  el.textContent={saving:'저장 중…',saved:'✓ 저장됨',err:'⚠ 실패'}[s]||'';
}

// ── 유틸
function pad(n){return String(n).padStart(2,'0');}
function fmtElapsed(ms){ var t=Math.floor(ms/1000),h=Math.floor(t/3600),m=Math.floor((t%3600)/60),s=t%60; return h?h+':'+pad(m)+':'+pad(s):pad(m)+':'+pad(s); }
function fmtTime(ts){ var d=new Date(ts); return pad(d.getHours())+':'+pad(d.getMinutes()); }
function today(){ var d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function dlabel(s){ if(!s)return''; var p=s.split('-'); return new Date(+p[0],+p[1]-1,+p[2]).toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'}); }
function tableColor(st,seatTime){
  if(st==='empty')    return{bg:'#f8fafc',bd:'#cbd5e1',tx:'#94a3b8'};
  if(st==='reserved') return{bg:'#eff6ff',bd:'#3b82f6',tx:'#1d4ed8'};
  var e=Date.now()-seatTime;
  if(e<3600000)return{bg:'#fefce8',bd:'#ca8a04',tx:'#78350f'};
  if(e<5400000)return{bg:'#fff7ed',bd:'#ea580c',tx:'#7c2d12'};
  return{bg:'#fef2f2',bd:'#dc2626',tx:'#7f1d1d'};
}
function cardSize(type,W,H){
  if(type==="바")  return{w:Math.round(W*.28),h:Math.round(H*.09)};
  if(type==="2인") return{w:Math.round(W*.28),h:Math.round(H*.13)};
  if(type==="6인") return{w:Math.round(W*.28),h:Math.round(H*.155)};
  if(type==="8인") return{w:Math.round(W*.28),h:Math.round(H*.17)};
  return             {w:Math.round(W*.28),h:Math.round(H*.14)};
}
function todayDoneCount(){
  var td=today();
  return S.daily.filter(function(d){return d.date===td;}).length
       + S.ress.filter(function(r){return r.st==='completed'&&r.date===td;}).length;
}

// ── 헤더/통계
function renderHeader(){
  document.getElementById('hdate').textContent=new Date().toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
  var occ=S.tables.filter(function(t){return t.st==='occupied';}).length;

// ── 드래그 + 편집 탭
function bindCard(card,tid){
  var dragging=false,longPressTimer=null,tapAt=0,didDrag=false;
  card.addEventListener('touchstart',function(e){
    tapAt=Date.now(); if(!editMode)return;
    var touch=e.touches[0];
    longPressTimer=setTimeout(function(){dragging=true;card.classList.add('drag');startDrag(card,tid,touch.clientX,touch.clientY);},200);
  },{passive:true});
  card.addEventListener('touchmove',function(e){
    if(!editMode)return;
    if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}
    if(!dragging)return; e.preventDefault();
    moveDrag(e.touches[0].clientX,e.touches[0].clientY,card,tid);
  },{passive:false});
  card.addEventListener('touchend',function(){
    if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}
    if(dragging){dragging=false;card.classList.remove('drag');snapCard(tid);saveData();return;}
    if(Date.now()-tapAt<280){ editMode?openEditTableModal(tid):openTableModal(tid); }
  });
  card.addEventListener('mousedown',function(e){
    if(!editMode)return; dragging=true; didDrag=false; card.classList.add('drag');
    startDrag(card,tid,e.clientX,e.clientY);
    function onMove(ev){didDrag=true;moveDrag(ev.clientX,ev.clientY,card,tid);}
    function onUp(){dragging=false;card.classList.remove('drag');if(didDrag){snapCard(tid);saveData();}document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);}
    document.addEventListener('mousemove',onMove); document.addEventListener('mouseup',onUp);
  });
  card.addEventListener('click',function(){if(didDrag){didDrag=false;return;} editMode?openEditTableModal(tid):openTableModal(tid);});
}
function startDrag(card,tid,cx,cy){ var r=card.getBoundingClientRect(); dragOffset={x:cx-r.left,y:cy-r.top}; dragPanelRect=document.getElementById('cv').getBoundingClientRect(); }
function moveDrag(cx,cy,card,tid){
  if(!dragPanelRect)return;
  var panel=document.getElementById('cv'),W=panel.offsetWidth,H=panel.offsetHeight;
  var tb=S.tables.filter(function(t){return t.id===tid;})[0];
  var sz=cardSize(tb?tb.t:'4인',W,H);
  var nx=Math.max(0,Math.min(W-sz.w,cx-dragPanelRect.left-dragOffset.x));
  var ny=Math.max(0,Math.min(H-sz.h,cy-dragPanelRect.top-dragOffset.y));
  card.style.left=nx+'px'; card.style.top=ny+'px';
  S.tables=S.tables.map(function(t){return t.id===tid?Object.assign({},t,{px:nx/W*100,py:ny/H*100}):t;});
  cardCache[tid]='';
}
function snapCard(tid){
  var panel=document.getElementById('cv'),W=panel.offsetWidth,H=panel.offsetHeight;
  var SNAP=Math.round(W*.04),GAP=Math.round(W*.015);
  var me=S.tables.filter(function(t){return t.id===tid;})[0]; if(!me)return;
  var sz=cardSize(me.t,W,H),px=me.px/100*W,py=me.py/100*H;
  var xa=[0,W-sz.w],ya=[0,H-sz.h];
  S.tables.filter(function(t){return t.id!==tid;}).forEach(function(t){var s2=cardSize(t.t,W,H),ox=t.px/100*W,oy=t.py/100*H;xa.push(ox,ox+s2.w+GAP,ox+s2.w-sz.w);ya.push(oy,oy+s2.h+GAP,oy+s2.h-sz.h);});
  var bx=px,bdx=SNAP; xa.forEach(function(a){var d=Math.abs(px-a);if(d<bdx){bdx=d;bx=a;}});
  var by=py,bdy=SNAP; ya.forEach(function(a){var d=Math.abs(py-a);if(d<bdy){bdy=d;by=a;}});
  bx=Math.max(0,Math.min(W-sz.w,bx)); by=Math.max(0,Math.min(H-sz.h,by));
  var card=document.getElementById('tc'+tid);
  if(card){card.style.transition='left .18s ease,top .18s ease';card.style.left=bx+'px';card.style.top=by+'px';setTimeout(function(){if(card)card.style.transition='';},200);}
  S.tables=S.tables.map(function(t){return t.id===tid?Object.assign({},t,{px:bx/W*100,py:by/H*100}):t;});
}
function toggleEdit(){
  editMode=!editMode;
  var btn=document.getElementById('bedit'),cv=document.getElementById('cv'),hint=document.getElementById('ehint');
  S.tables.forEach(function(t){cardCache[t.id]='';});
  if(editMode){btn.textContent='✅저장';btn.classList.add('on');cv.classList.add('em');hint.textContent='탭=편집';}
  else{btn.textContent='✏️배치';btn.classList.remove('on');cv.classList.remove('em');hint.textContent='';saveData();}
  renderCanvas();
}

// ── 예약 관리 탭
function renderReservations(){renderCal();renderRvList();}
function renderCal(){
  document.getElementById('calm').textContent=calY+'년 '+(calM+1)+'월';
  var firstDow=new Date(calY,calM,1).getDay(),daysInMonth=new Date(calY,calM+1,0).getDate();
  var td=today(),dots={};
  S.ress.filter(function(r){return r.st!=='cancelled'&&r.date;}).forEach(function(r){dots[r.date]=1;});
  var html='';
  for(var i=0;i<firstDow;i++) html+='<div class="cd other"></div>';
  for(var d=1;d<=daysInMonth;d++){
    var s=calY+'-'+pad(calM+1)+'-'+pad(d),dow=(firstDow+d-1)%7;
    var cls='cd'+(dow===0?' sun':dow===6?' sat':'')+(s===td&&s!==calSel?' today':'')+(s===calSel?' sel':'');
    html+='<div class="'+cls+'" data-d="'+s+'">'+d+(dots[s]?'<div class="dot"></div>':'')+'</div>';
  }
  document.getElementById('calg').innerHTML=html;
  document.getElementById('calg').querySelectorAll('.cd').forEach(function(el){
    el.addEventListener('click',function(){var d=this.getAttribute('data-d');if(!d)return;calSel=(calSel===d)?null:d;renderCal();renderRvList();});
  });
}
function renderRvList(){
  var q=(document.getElementById('rvsrch').value||'').trim().toLowerCase();
  var list=S.ress.filter(function(r){return r.st!=='cancelled';});
  if(calSel) list=list.filter(function(r){return r.date===calSel;});
  if(q) list=list.filter(function(r){return(r.nm||'').toLowerCase().indexOf(q)>=0||(r.phone||'').indexOf(q)>=0;});
  list.sort(function(a,b){return((a.date||'9999')+(a.time||'99:99'))<((b.date||'9999')+(b.time||'99:99'))?-1:1;});
  document.getElementById('rvtitle').textContent=calSel?dlabel(calSel)+' 예약':'전체 예약';
  document.getElementById('rvcnt').textContent=list.length+'건';
  var sm={confirmed:['#10b981','#ecfdf5','확정'],pending:['#f59e0b','#fffbeb','대기'],
          arrived:['#3b82f6','#eff6ff','방문'],noshow:['#ef4444','#fef2f2','노쇼'],completed:['#6366f1','#f5f3ff','완료']};
  document.getElementById('rvlist').innerHTML=list.length
    ?list.map(function(r){var s=sm[r.st||'confirmed']||sm.confirmed;
        return '<div class="rvi" data-rid="'+esc(String(r.id))+'">'
          +'<div class="rvi-t">'+esc(r.time||'-:-')+'</div>'
          +'<div class="rvi-b"><div class="rvi-n">'+esc(r.nm)+'</div>'
          +'<div class="rvi-s">'+(r.date?dlabel(r.date)+' ':'')+esc(String(r.g))+'명'+(r.phone?' · '+esc(r.phone):'')+'</div>'
