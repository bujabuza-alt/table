<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>매장 관리 PRO</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system;
  background:#f5f6f8;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* ===== HEADER ===== */
header{
  height:56px;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 12px;
  border-bottom:1px solid #e5e7eb;
}
header h1{font-size:16px}

/* ===== LAYOUT ===== */
main{
  flex:1;
  display:flex;
  overflow:hidden;
}

/* ===== LEFT ===== */
.sidebar{
  width:220px;
  background:#fff;
  border-right:1px solid #e5e7eb;
  display:flex;
  flex-direction:column;
}
.wait-list{flex:1;overflow:auto}
.wait-item{
  padding:10px;
  border-bottom:1px solid #eee;
}

/* ===== CENTER ===== */
.canvas{
  flex:1;
  position:relative;
  background:#f9fafb;
}

/* ===== TABLE ===== */
.table{
  position:absolute;
  width:100px;
  height:80px;
  border-radius:12px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-size:12px;
  font-weight:700;
  border:2px solid;
}

.empty{background:#fff;border-color:#d1d5db}
.res{background:#dbeafe;border-color:#3b82f6}
.occ{background:#dcfce7;border-color:#22c55e}
.warn{background:#fff7ed;border-color:#ea580c}
.danger{background:#fee2e2;border-color:#dc2626}

/* ===== RIGHT ===== */
.right{
  width:260px;
  background:#fff;
  border-left:1px solid #e5e7eb;
  display:flex;
  flex-direction:column;
}
.panel{flex:1;overflow:auto}

/* ===== BUTTON ===== */
.btn{
  background:#3b82f6;
  color:#fff;
  border:none;
  padding:8px;
  border-radius:6px;
  margin-left:4px;
}
</style>
</head>

<body>

<header>
  <h1>매장 관리 PRO</h1>
  <div>
    <button class="btn" onclick="toggleEdit()">배치</button>
    <button class="btn" onclick="addWait()">대기</button>
    <button class="btn" onclick="addRes()">예약</button>
  </div>
</header>

<main>

<div class="sidebar">
  <div style="padding:10px;font-weight:700">대기</div>
  <div class="wait-list" id="waitList"></div>
</div>

<div class="canvas" id="canvas"></div>

<div class="right">
  <div style="padding:10px;font-weight:700">예약</div>
  <div class="panel" id="resList"></div>
</div>

</main>

<script>
// ===== STORAGE =====
const KEY="store_v1";

// ===== STATE =====
let S=JSON.parse(localStorage.getItem(KEY))||{
  tables:[
    {id:1,name:"1번",px:10,py:10,st:"empty",seat:null},
    {id:2,name:"2번",px:40,py:10,st:"empty",seat:null},
    {id:3,name:"3번",px:70,py:10,st:"empty",seat:null}
  ],
  waits:[],
  res:[]
};

let edit=false;

// ===== SAVE =====
function save(){
  localStorage.setItem(KEY,JSON.stringify(S));
}

// ===== RENDER =====
function render(){
  renderTables();
  renderWait();
  renderRes();
  save();
}

// ===== TABLE =====
function renderTables(){
  const cv=document.getElementById("canvas");
  cv.innerHTML="";
  const W=cv.offsetWidth;
  const H=cv.offsetHeight;

  S.tables.forEach(t=>{
    const el=document.createElement("div");
    el.className="table "+tableClass(t);

    el.style.left=(t.px/100*W)+"px";
    el.style.top =(t.py/100*H)+"px";

    el.innerHTML=`
      <div>${t.name}</div>
      ${t.seat?`<div>${elapsed(t.seat)}</div>`:''}
    `;

    el.onclick=()=>tableClick(t);

    bindDrag(el,t);
    cv.appendChild(el);
  });
}

function tableClass(t){
  if(t.st==="empty") return "empty";
  if(t.st==="res") return "res";

  if(t.st==="occ"){
    const min=(Date.now()-t.seat)/60000;
    if(min>90) return "danger";
    if(min>60) return "warn";
    return "occ";
  }
}

// ===== TABLE ACTION =====
function tableClick(t){
  if(edit) return;

  if(t.st==="empty"){
    t.st="occ";
    t.seat=Date.now();
  }else{
    if(confirm("퇴석 처리?")){
      t.st="empty";
      t.seat=null;
    }
  }
  render();
}

// ===== WAIT =====
function addWait(){
  const n=prompt("이름");
  if(!n) return;
  S.waits.push({name:n,time:Date.now()});
  render();
}

function renderWait(){
  const el=document.getElementById("waitList");
  el.innerHTML="";
  S.waits.forEach(w=>{
    const d=document.createElement("div");
    d.className="wait-item";
    d.innerText=w.name+" ("+elapsed(w.time)+")";
    d.onclick=()=>seatWait(w);
    el.appendChild(d);
  });
}

function seatWait(w){
  const t=S.tables.find(x=>x.st==="empty");
  if(!t) return alert("빈자리 없음");
  t.st="occ";
  t.seat=Date.now();
  S.waits=S.waits.filter(x=>x!==w);
  render();
}

// ===== RES =====
function addRes(){
  const n=prompt("예약 이름");
  if(!n) return;
  const time=prompt("시간 (18:00)");
  S.res.push({name:n,time});
  render();
}

function renderRes(){
  const el=document.getElementById("resList");
  el.innerHTML="";
  S.res.forEach(r=>{
    const d=document.createElement("div");
    d.className="wait-item";
    d.innerText=r.time+" "+r.name;
    d.onclick=()=>seatRes(r);
    el.appendChild(d);
  });
}

function seatRes(r){
  const t=S.tables.find(x=>x.st==="empty");
  if(!t) return alert("빈자리 없음");
  t.st="occ";
  t.seat=Date.now();
  S.res=S.res.filter(x=>x!==r);
  render();
}

// ===== DRAG =====
function bindDrag(el,t){
  let drag=false;

  el.addEventListener("touchstart",e=>{
    if(!edit)return;
    drag=true;
  },{passive:false});

  el.addEventListener("touchmove",e=>{
    if(!drag)return;
    e.preventDefault();

    const rect=canvas.getBoundingClientRect();
    const x=e.touches[0].clientX-rect.left;
    const y=e.touches[0].clientY-rect.top;

    t.px=x/rect.width*100;
    t.py=y/rect.height*100;

    renderTables();
  },{passive:false});

  el.addEventListener("touchend",()=>drag=false);
}

// ===== UTIL =====
function elapsed(ts){
  const m=Math.floor((Date.now()-ts)/60000);
  return m+"분";
}

function toggleEdit(){
  edit=!edit;
}

// ===== LOOP =====
setInterval(renderTables,1000);

// ===== INIT =====
render();

</script>

</body>
</html>
