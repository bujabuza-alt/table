<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0f0e0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="류마">
<meta name="mobile-web-app-capable" content="yes">
<title>류마 관리 시스템</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root {
  --bg:      #0f0e0d;
  --surf:    #1c1a18;
  --surf2:   #252320;
  --surf3:   #2e2b27;
  --border:  rgba(255,255,255,.07);
  --border2: rgba(255,255,255,.13);
  --text:    #f0ebe3;
  --text2:   #8a8070;
  --text3:   #5a5248;
  --red:     #c41230;
  --red2:    #e8162c;
  --amber:   #c8922a;
  --green:   #2a9a5a;
  --blue:    #2a72c8;
  --indigo:  #5a52c8;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; position: fixed; width: 100%; height: 100%; }

/* ══════════════════════════════════════════════
   매장 선택 화면
══════════════════════════════════════════════ */
#sel {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 32px 24px;
}
.sel-logo-wrap {
  position: relative; margin-bottom: 28px;
}
.sel-logo-img {
  width: 110px; height: 110px; object-fit: contain; opacity: .85;
}
.sel-brand { font-size: 11px; font-weight: 700; color: var(--text3); letter-spacing: .25em; text-transform: uppercase; text-align: center; margin-bottom: 36px; }
.sel-step  { width: 100%; max-width: 300px; }
.sel-label { font-size: 10px; color: var(--text3); font-weight: 700; text-align: center; margin-bottom: 14px; letter-spacing: .18em; text-transform: uppercase; }

.sel-store-btn {
  width: 100%; padding: 18px 20px; margin-bottom: 10px;
  border-radius: 12px; border: 1px solid var(--border2);
  background: var(--surf); color: var(--text);
  font-size: 17px; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  font-family: inherit; transition: background .12s;
}
.sel-store-btn:active { background: var(--surf3); }
.sel-store-icon { font-size: 11px; color: var(--text3); }

.pw-form { width: 100%; max-width: 300px; }
.pw-store-name { font-size: 18px; font-weight: 800; color: var(--text); text-align: center; margin-bottom: 4px; }
.pw-store-sub  { font-size: 11px; color: var(--text3); text-align: center; margin-bottom: 22px; letter-spacing: .08em; }
.pw-input-wrap { position: relative; margin-bottom: 12px; }
.pw-input {
  width: 100%; padding: 15px 16px;
  background: var(--surf); border: 1px solid var(--border2);
  border-radius: 12px; color: var(--text); font-size: 18px; letter-spacing: .2em;
  outline: none; font-family: inherit; -webkit-appearance: none;
  transition: border-color .15s;
}
.pw-input:focus { border-color: var(--red); }
.pw-input::placeholder { letter-spacing: .1em; font-size: 13px; color: var(--text3); }
.pw-btn {
  width: 100%; padding: 15px;
  background: var(--red); border: none; border-radius: 12px;
  color: #fff; font-size: 15px; font-weight: 800; cursor: pointer;
  font-family: inherit; letter-spacing: .04em;
  transition: background .12s;
}
.pw-btn:active { background: var(--red2); }
.pw-err { font-size: 12px; color: var(--red2); text-align: center; margin-top: 10px; min-height: 18px; }
.sel-back-btn {
  background: none; border: none; color: var(--text3); font-size: 12px;
  cursor: pointer; padding: 12px; text-align: center; width: 100%;
  font-family: inherit; margin-top: 4px; letter-spacing: .04em;
}

/* ══════════════════════════════════════════════
   메인 레이아웃
══════════════════════════════════════════════ */
#wrap { display: flex; flex-direction: column; width: 100%; height: 100%; }

/* 헤더 */
#hd {
  flex-shrink: 0; background: var(--surf);
  border-bottom: 1px solid var(--border);
  padding: 8px 12px;
  display: flex; align-items: center; justify-content: space-between; gap: 6px;
}
.hd-left  { display: flex; align-items: center; gap: 9px; flex-shrink: 0; }
.hd-logo  { width: 30px; height: 30px; object-fit: contain; opacity: .9; flex-shrink: 0; }
.hd-title { font-weight: 800; font-size: 14px; color: var(--text); }
.hd-date  { font-size: 10px; color: var(--text3); margin-top: 1px; }
.hd-right { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.chip {
  border-radius: 99px; padding: 3px 8px;
  font-size: 10px; font-weight: 700; border: 1px solid; white-space: nowrap;
}
#badge { font-size: 11px; font-weight: 600; white-space: nowrap; color: transparent; }

/* 탭바 */
#tb {
  flex-shrink: 0; background: var(--surf);
  border-bottom: 1px solid var(--border);
  display: flex; padding: 0 12px; gap: 2px;
}
.tab {
  padding: 10px 14px; border: none; background: none;
  font-size: 13px; font-weight: 700; color: var(--text3); cursor: pointer;
  border-bottom: 2px solid transparent; margin-bottom: -1px; font-family: inherit;
}
.tab.on { color: var(--red2); border-bottom-color: var(--red2); }

/* 바디 */
#body { flex: 1; display: flex; overflow: hidden; min-height: 0; }

/* ══════════════════════════════════════════════
   사이드바
══════════════════════════════════════════════ */
#sb {
  width: 156px; flex-shrink: 0;
  background: var(--surf); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.sb-head {
  flex-shrink: 0; padding: 8px 10px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.sb-title { font-weight: 700; font-size: 11px; color: var(--text3); letter-spacing: .06em; }
.sb-add-btn {
  background: var(--red); color: #fff; border: none;
  border-radius: 6px; padding: 5px 9px; font-size: 11px; font-weight: 700;
  cursor: pointer; font-family: inherit;
}
.sb-sec {
  flex-shrink: 0; padding: 5px 10px 3px;
  background: var(--bg); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 2;
}
.sb-sec-t { font-size: 9px; font-weight: 800; color: var(--text3); letter-spacing: .12em; text-transform: uppercase; }
.sb-sec-c { font-size: 9px; color: var(--text3); font-weight: 600; }
#sb-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

.ri { padding: 8px 10px; border-bottom: 1px solid var(--border); cursor: pointer; }
.ri:active { background: var(--surf2); }
.ri-top { display: flex; align-items: center; justify-content: space-between; gap: 4px; }
.ri-time { font-size: 11px; font-weight: 800; color: var(--red); background: rgba(196,18,48,.12); border-radius: 5px; padding: 2px 5px; flex-shrink: 0; }
.ri-name { font-weight: 700; font-size: 13px; color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ri-g    { font-size: 11px; color: var(--text2); font-weight: 600; flex-shrink: 0; }
.ri-sub  { font-size: 10px; color: var(--text3); margin-top: 2px; display: flex; align-items: center; gap: 4px; }
.ri-tbl  { color: var(--blue); font-weight: 700; }
.ri-dot  { display: inline-block; width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.di { padding: 7px 10px; border-bottom: 1px solid var(--border); }
.di-top { display: flex; align-items: center; justify-content: space-between; gap: 4px; }
.di-badge { font-size: 9px; font-weight: 700; border-radius: 4px; padding: 1px 5px; flex-shrink: 0; }
.di-name  { font-weight: 700; font-size: 12px; color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.di-g     { font-size: 10px; color: var(--text3); flex-shrink: 0; }
.di-sub   { font-size: 10px; color: var(--text3); margin-top: 2px; }
.wi { padding: 8px 10px; border-bottom: 1px solid var(--border); cursor: pointer; }
.wi:active { background: var(--surf2); }
.wi-top { display: flex; align-items: center; justify-content: space-between; }
.wi-num { width: 16px; height: 16px; border-radius: 50%; background: rgba(196,18,48,.18); display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 800; color: var(--red2); flex-shrink: 0; }
.wi-name { font-weight: 700; font-size: 13px; color: var(--text); margin-left: 5px; }
.wi-g    { font-size: 11px; color: var(--text2); font-weight: 600; }
.wi-sub  { font-size: 10px; color: var(--text3); margin-top: 2px; }
.wi-memo { font-size: 10px; color: var(--text3); margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.wi-tags { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 3px; }
.wi-tag  { font-size: 9px; padding: 1px 5px; border-radius: 99px; background: rgba(196,18,48,.1); color: var(--red); font-weight: 700; }
.sb-empty { padding: 14px 10px; text-align: center; color: var(--text3); font-size: 11px; }

/* ══════════════════════════════════════════════
   메인 영역
══════════════════════════════════════════════ */
#main { flex: 1; min-width: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 10px; display: flex; flex-direction: column; }
#rv   { flex: 1; min-width: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 10px; display: none; flex-direction: column; gap: 10px; }
#rv.on { display: flex; }

#leg { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; align-items: center; }
.ld  { display: flex; align-items: center; gap: 3px; font-size: 10px; color: var(--text3); }
.lc  { width: 7px; height: 7px; border-radius: 2px; flex-shrink: 0; }
#cv  {
  background: var(--surf); border-radius: 12px;
  border: 1px solid var(--border);
  position: relative; width: 100%; overflow: hidden;
}
#cvi { position: absolute; inset: 0; overflow: hidden; }
#edbanner {
  display: none; position: absolute; top: 0; left: 0; right: 0;
  background: rgba(196,18,48,.1); border-bottom: 2px dashed var(--red);
  padding: 6px; font-size: 11px; color: var(--red); font-weight: 700; text-align: center; z-index: 5;
}
#cv.em #edbanner { display: block; }
#cv.em { border: 2px dashed var(--red); }

/* 테이블 카드 */
.tc {
  position: absolute; border-radius: 8px; border: 1.5px solid;
  display: flex; flex-direction: column; overflow: hidden; cursor: pointer;
}
.tc.drag { opacity: 0.85; z-index: 50; box-shadow: 0 8px 28px rgba(0,0,0,.5); }

/* 통계 */
#stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin-top: 10px; }
.sc {
  background: var(--surf); border-radius: 10px;
  padding: 9px 10px; border: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.si { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
.sl { font-size: 9px; color: var(--text3); letter-spacing: .04em; }
.sv { font-weight: 800; font-size: 14px; margin-top: 1px; }

/* 버튼 */
.bp  { background: var(--red); color: #fff; border: none; border-radius: 7px; padding: 6px 11px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; }
.bp:active { opacity:.85; }
.bg  { background: var(--surf2); border: 1px solid var(--border2); border-radius: 7px; padding: 5px 10px; font-size: 12px; color: var(--text2); cursor: pointer; font-weight: 600; font-family: inherit; }
.be  { background: var(--indigo); color: #fff; border: none; border-radius: 7px; padding: 5px 10px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; }
.be.on { background: var(--red); }

/* 예약 탭 */
.rv-top { display: flex; align-items: center; gap: 8px; }
.rv-srch {
  flex: 1; padding: 9px 12px;
  border: 1px solid var(--border2); border-radius: 10px;
  font-size: 14px; outline: none; -webkit-appearance: none; font-family: inherit;
  background: var(--surf); color: var(--text);
}
.rv-srch:focus { border-color: var(--red); }
.rv-srch::placeholder { color: var(--text3); }

/* 캘린더 */
#cal { background: var(--surf); border-radius: 12px; border: 1px solid var(--border); padding: 12px; }
.cal-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.cal-m { font-weight: 800; font-size: 14px; color: var(--text); }
.cal-nav {
  background: var(--surf2); border: 1px solid var(--border2);
  border-radius: 6px; width: 28px; height: 28px; cursor: pointer;
  font-size: 14px; display: flex; align-items: center; justify-content: center; color: var(--text2);
}
.cal-g { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
.cal-dow { text-align: center; font-size: 10px; font-weight: 700; color: var(--text3); padding: 3px 0; }
.cal-dow:first-child { color: var(--red); }
.cal-dow:last-child  { color: var(--blue); }
.cd { text-align: center; padding: 4px 2px; border-radius: 6px; font-size: 12px; cursor: pointer; min-height: 28px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; color: var(--text2); }
.cd.today { background: rgba(196,18,48,.12); color: var(--red2); font-weight: 800; }
.cd.sel   { background: var(--red); color: #fff; font-weight: 800; }
.cd.sel .dot { background: rgba(255,255,255,.7); }
.cd.other { color: var(--text3); }
.cd.sun { color: var(--red); }
.cd.sat { color: var(--blue); }
.cd.sel.sun, .cd.sel.sat { color: #fff; }
.dot { width: 4px; height: 4px; border-radius: 50%; background: var(--red); }

/* 예약 리스트 */
#rvw { background: var(--surf); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
.rvw-hd { padding: 11px 13px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.rvw-title { font-weight: 800; font-size: 14px; color: var(--text); }
.rvi { padding: 11px 13px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; align-items: flex-start; gap: 9px; }
.rvi:last-child { border-bottom: none; }
.rvi-t { background: rgba(196,18,48,.12); color: var(--red2); border-radius: 6px; padding: 4px 7px; font-size: 12px; font-weight: 800; flex-shrink: 0; min-width: 46px; text-align: center; }
.rvi-b { flex: 1; min-width: 0; }
.rvi-n { font-weight: 700; font-size: 14px; color: var(--text); }
.rvi-s { font-size: 11px; color: var(--text2); margin-top: 1px; }
.rvi-m { font-size: 11px; color: var(--text3); margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rvi-st { font-size: 11px; font-weight: 700; border-radius: 5px; padding: 2px 6px; flex-shrink: 0; }
.rvi-tags { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 3px; }
.rvi-tag  { font-size: 10px; padding: 1px 6px; border-radius: 99px; background: rgba(196,18,48,.1); color: var(--red); font-weight: 700; }

/* ══════════════════════════════════════════════
   모달
══════════════════════════════════════════════ */
#mo { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 999; align-items: center; justify-content: center; padding: 16px; overflow-y: auto; }
#mo.on { display: flex; }
.md {
  background: var(--surf); border-radius: 16px; padding: 18px 18px 16px;
  width: 100%; max-width: 360px; border: 1px solid var(--border2);
  box-shadow: 0 24px 64px rgba(0,0,0,.6);
}
.md-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.md-title { font-weight: 800; font-size: 16px; color: var(--text); }
.md-x {
  background: var(--surf3); border: none; border-radius: 50%; width: 30px; height: 30px;
  font-size: 16px; cursor: pointer; color: var(--text2);
  display: flex; align-items: center; justify-content: center;
}
.mb { display: flex; flex-direction: column; gap: 11px; }
.ib { border-radius: 11px; border: 1px solid; padding: 12px 14px; margin-bottom: 12px; }
.ir { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; }
.ir:last-child { margin-bottom: 0; }
.il { color: var(--text2); }
.iv { font-weight: 700; color: var(--text); }
.gbs { display: flex; gap: 6px; flex-wrap: wrap; }
.gb {
  width: 42px; height: 42px; border-radius: 9px;
  border: 1.5px solid var(--border2); background: var(--surf2);
  color: var(--text2); font-weight: 800; font-size: 15px; cursor: pointer; font-family: inherit;
}
.gb.bl { border-color: var(--blue); background: rgba(42,114,200,.15); color: #60a5fa; }
.gb.pu { border-color: var(--indigo); background: rgba(90,82,200,.15); color: #a78bfa; }
.gb.gr { border-color: var(--green); background: rgba(42,154,90,.15); color: #4ade80; }
.abs { display: flex; gap: 7px; }
.ab  { flex: 1; padding: 12px 0; border: none; border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer; color: #fff; font-family: inherit; }
.fg  { display: flex; flex-direction: column; gap: 4px; }
.fl  { font-size: 12px; color: var(--text2); }
.fi  {
  width: 100%; padding: 9px 11px;
  border: 1px solid var(--border2); border-radius: 9px; font-size: 14px;
  outline: none; -webkit-appearance: none; font-family: inherit;
  background: var(--surf2); color: var(--text);
}
.fi:focus { border-color: var(--red); }
textarea.fi { resize: none; min-height: 60px; }
.tpb {
  padding: 11px 13px; background: var(--surf2);
  border: 1px solid var(--border2); border-radius: 10px;
  cursor: pointer; display: flex; justify-content: space-between; align-items: center;
  font-size: 14px; font-weight: 700; width: 100%; color: var(--text); font-family: inherit;
}
.tps { color: var(--text3); font-size: 12px; font-weight: 500; }
.g2  { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
.phone-wrap { display: flex; align-items: center; border: 1px solid var(--border2); border-radius: 9px; overflow: hidden; background: var(--surf2); }
.phone-wrap:focus-within { border-color: var(--red); }
.phone-pfx { padding: 9px 0 9px 11px; font-size: 14px; font-weight: 700; color: var(--text); white-space: nowrap; flex-shrink: 0; }
.phone-sep { padding: 9px 2px; font-size: 14px; color: var(--text3); flex-shrink: 0; }
.phone-inp { flex: 1; padding: 9px 11px 9px 3px; border: none; outline: none; font-size: 14px; font-family: inherit; background: transparent; color: var(--text); min-width: 0; -webkit-appearance: none; }
.tag-picker { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-pill { padding: 5px 11px; border-radius: 99px; border: 1px solid var(--border2); background: var(--surf2); color: var(--text2); font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; font-family: inherit; }
.tag-pill.on { border-color: var(--red); background: rgba(196,18,48,.12); color: var(--red2); }
.tag-add-btn { padding: 5px 11px; border-radius: 99px; border: 1px dashed var(--border2); background: transparent; color: var(--text3); font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; }
.divider { height: 1px; background: var(--border); margin: 8px 0; }

/* 테이블 형태/크기 선택 */
.shape-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }
.shape-btn {
  border: 1.5px solid var(--border2); background: var(--surf2);
  border-radius: 9px; cursor: pointer; padding: 10px 6px;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  font-family: inherit; transition: border-color .12s;
}
.shape-btn.on { border-color: var(--red); background: rgba(196,18,48,.1); }
.shape-preview { background: var(--border2); border-radius: 4px; flex-shrink: 0; }
.shape-label { font-size: 10px; font-weight: 700; color: var(--text2); }
.shape-btn.on .shape-label { color: var(--red2); }

.size-row { display: flex; gap: 7px; }
.size-btn {
  flex: 1; border: 1.5px solid var(--border2); background: var(--surf2);
  border-radius: 9px; cursor: pointer; padding: 10px 6px;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  font-family: inherit;
}
.size-btn.on { border-color: var(--red); background: rgba(196,18,48,.1); }
.size-label { font-size: 11px; font-weight: 700; color: var(--text2); }
.size-sub   { font-size: 9px; color: var(--text3); }
.size-btn.on .size-label { color: var(--red2); }

/* 비밀번호 변경 */
.settings-section { font-size: 10px; font-weight: 800; color: var(--text3); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 9px; }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════
     매장 선택 / 비밀번호 화면

function showStoreStep() {

function showPwStep(store) {

  document.getElementById('sel-s2').style.display = '';

function tryEnter() {
  if (!_pendingStore) return;
  var pw = document.getElementById('pw-input').value;
  var store = _pendingStore;
  // Firebase에서 비밀번호 확인
  fbDb.ref('tableApp/config/' + store + 'Pw').once('value').then(function(snap) {
    var stored = snap.val() || DEFAULT_PW[store];
    if (pw === stored) { doEnter(store); }
    else { document.getElementById('pw-err').textContent = '비밀번호가 틀렸습니다'; }
  }).catch(function() {
    if (pw === DEFAULT_PW[store]) { doEnter(store); }
    else { document.getElementById('pw-err').textContent = '비밀번호가 틀렸습니다'; }
  });
}
function doEnter(store) {
  currentStore = store;
  STORAGE_KEY  = 'tv5_' + store;
  if (fbRef) fbRef.off();
  fbRef = fbDb.ref('tableApp/' + store);

  // 초기화

// Firebase 저장/로드

function loadData() {
  try {
    var d = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    if (d.tables && d.tables.length) S.tables = d.tables;
    if (d.waits)  S.waits = d.waits;
    if (d.ress)   S.ress  = d.ress;
    if (d.daily)  S.daily = d.daily;
    S.tags = (d.tags && d.tags.length) ? d.tags : DEFAULT_TAGS.slice();
  } catch(e) { S.tags = DEFAULT_TAGS.slice(); }
}
function saveData() {
  if (!fbRef) return;
  clearTimeout(saveTimer);
  showBadge('saving');
  saveTimer = setTimeout(function() {
    var ts = Date.now(); lastSavedTs = ts;
    var payload = { tables:S.tables, waits:S.waits, ress:S.ress, tags:S.tags, daily:S.daily, _ts:ts };
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(payload)); } catch(e) {}
    fbRef.set(payload)
      .then(function() { showBadge('saved'); setTimeout(function(){ showBadge(''); }, 2000); })
      .catch(function() { showBadge('err'); });
  }, 400);
}
function startFirebaseListener() {
  if (!fbRef) return;
  fbRef.off();
  fbRef.on('value', function(snapshot) {
    var d = snapshot.val();
    if (!d) return;
    if (d._ts && d._ts === lastSavedTs) return;
    if (d._ts && lastSavedTs && d._ts < lastSavedTs - 1000) return;
    if (d.tables && d.tables.length) S.tables = d.tables;
    if (d.waits)  S.waits = d.waits;
    if (d.ress)   S.ress  = d.ress;
    if (d.daily)  S.daily = d.daily;
    if (d.tags && d.tags.length) S.tags = d.tags;
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch(e) {}
    S.tables.forEach(function(t){ cardCache[t.id] = ''; });
    syncTodayReservations();
    renderAll();
    if (currentTab === 'reserve') renderReservations();
  }, function() { showBadge('err'); });
}
function showBadge(s) {
  var el = document.getElementById('badge');
  el.style.color = {saving:'#c8922a',saved:'#2a9a5a',err:'var(--red2)'}[s] || 'transparent';
  el.textContent = {saving:'저장 중…',saved:'✓ 저장됨',err:'⚠ 실패'}[s] || '';
}

function esc(s){ return String(s==null?''​:s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function uid(){ return Date.now()+'_'+Math.random().toString(36).slice(2,7); }
function pad(n){ return String(n).padStart(2,'0'); }
function fmtElapsed(ms){ var t=Math.floor(ms/1000),h=Math.floor(t/3600),m=Math.floor((t%3600)/60),s=t%60; return h?h+':'+pad(m)+':'+pad(s):pad(m)+':'+pad(s); }
function fmtTime(ts){ var d=new Date(ts); return pad(d.getHours())+':'+pad(d.getMinutes()); }
function today(){ var d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function dlabel(s){ if(!s)return''; var p=s.split('-'); return new Date(+p[0],+p[1]-1,+p[2]).toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'}); }

function makeTable(t) {
  // 구버전(t 필드) 호환
  var shape = t.shape || (t.t==='바'?'bar':t.t==='2인'?'sq':t.t==='6인'?'wide':'sq');
  var sz    = t.sz   || (t.t==='바'?'s':t.t==='6인'?'l':'m');
  var cap   = t.c || (shape==='wide'?6:shape==='bar'?2:4);
  return { id:t.id, n:t.n, shape:shape, sz:sz, c:cap, px:t.px, py:t.py, st:'empty', g:0, seatTime:null, res:null };
}

// ── 테이블 색상 ───────────────────────────────
function tableColor(st, seatTime) {
  if (st==='empty')    return { bg:'#1c1a18', bd:'#3a3835', tx:'#5a5248' };
  if (st==='reserved') return { bg:'rgba(42,114,200,.12)', bd:'var(--blue)', tx:'#60a5fa' };
  var e = Date.now() - seatTime;
  if (e < 3600000) return { bg:'rgba(200,146,42,.1)', bd:'var(--amber)', tx:'var(--amber)' };
  if (e < 5400000) return { bg:'rgba(200,112,48,.1)', bd:'#c87030',     tx:'#c87030' };
  return { bg:'rgba(196,18,48,.12)', bd:'var(--red)', tx:'var(--red2)' };
}

// ── 테이블 카드 크기 (shape + sz 기반) ────────
//   shape: sq(1:1)  wide(2:1)  bar(3:1 slim)
//   sz:    s  m  l
function cardSize(shape, sz, W, H) {
  var bw = { s:0.17, m:0.26, l:0.36 }[sz] || 0.26;
  var w  = Math.round(W * bw);
  var ratio = shape==='wide' ? 0.52 : shape==='bar' ? 0.32 : 1.0;
  var h  = Math.round(w * ratio);
  // 최소 높이 보정
  if (h < 28) h = 28;
  return { w:w, h:h };
}

function todayDoneCount() {
  var td = today();
  return (S.daily||[]).filter(function(d){ return d.date===td; }).length
       + S.ress.filter(function(r){ return r.st==='completed'&&r.date===td; }).length;
}

function renderCanvas() {
  var panel = document.getElementById('cv'), inner = document.getElementById('cvi');
  var W = panel.offsetWidth;
  if (!W) { setTimeout(renderCanvas, 50); return; }
  var H = Math.round(W * 1.25);
  if (parseInt(panel.style.height) !== H) panel.style.height = H+'px';
  var now = Date.now();
  S.tables.forEach(function(tb) {
    var card = document.getElementById('tc'+tb.id);
    if (!card) {
      card = document.createElement('div'); card.id = 'tc'+tb.id;
      inner.appendChild(card); bindCard(card, tb.id); cardCache[tb.id] = '';
    }
    var c  = tableColor(tb.st, tb.seatTime);
    var sz = cardSize(tb.shape||'sq', tb.sz||'m', W, H);
    var x  = Math.max(0, Math.min(W-sz.w, Math.round(tb.px/100*W)));
    var y  = Math.max(0, Math.min(H-sz.h, Math.round(tb.py/100*H)));
    card.style.left=x+'px'; card.style.top=y+'px';
    card.style.width=sz.w+'px'; card.style.height=sz.h+'px';
    card.style.background=c.bg; card.style.borderColor=c.bd;
    card.style.padding = (tb.shape==='bar') ? '5px 9px' : '8px 9px 6px';
    card.style.cursor = editMode?'grab':'pointer';
    card.style.boxShadow = editMode?'0 0 0 2px rgba(196,18,48,.3)':'';
    var wasDragging = card.classList.contains('drag');
    card.className = 'tc'+(wasDragging?' drag':'');
    var dot = tb.st==='occupied'?'#2a9a5a':tb.st==='reserved'?'var(--blue)':'#3a3835';
    var elMin = tb.st==='occupied'?Math.floor((now-tb.seatTime)/60000):0;
    var key = tb.st+'|'+tb.g+'|'+(tb.seatTime||0)+'|'+elMin+'|'+(tb.res?JSON.stringify(tb.res):'')+'|'+editMode+'|'+tb.shape+'|'+tb.sz;
    if (cardCache[tb.id]===key) return;
    cardCache[tb.id] = key;
    var html = '';
    var isBar = tb.shape==='bar';
    if (isBar) {
      html = '<div style="display:flex;justify-content:space-between;align-items:center;width:100%;height:100%">'+
        '<div style="font-weight:800;font-size:11px;color:'+c.tx+'">'+esc(tb.n)+'</div>';
      if (editMode) {
        html += '<div style="display:flex;gap:3px">'+
          '<button style="border:none;background:rgba(90,82,200,.2);color:#a78bfa;border-radius:4px;padding:2px 5px;font-size:9px;font-weight:700;cursor:pointer" data-editid="'+tb.id+'">편집</button>'+
          '<button style="border:none;background:rgba(196,18,48,.2);color:var(--red2);border-radius:4px;padding:2px 5px;font-size:9px;font-weight:700;cursor:pointer" data-delid="'+tb.id+'">삭제</button></div>';
      } else if (tb.st==='occupied') {
        html += '<div style="text-align:right"><div style="font-size:11px;color:'+c.tx+';font-weight:700">'+esc(String(tb.g))+'명</div><div style="font-size:9px;color:'+c.tx+'">'+fmtElapsed(now-tb.seatTime)+'</div></div>';
      } else if (tb.st==='reserved') {
        html += '<div style="font-size:11px;color:'+c.tx+';font-weight:700">'+esc(tb.res&&tb.res.time||'')+'</div>';
      } else {
        html += '<div style="width:7px;height:7px;border-radius:50%;background:'+dot+'"></div>';
      }
      html += '</div>';
    } else {
      html = '<div style="display:flex;justify-content:space-between;align-items:flex-start;width:100%">'+
        '<div style="font-weight:800;font-size:12px;color:'+c.tx+'">'+esc(tb.n)+'</div>';
      if (editMode) {
        html += '<div style="display:flex;gap:3px">'+
          '<button style="border:none;background:rgba(90,82,200,.2);color:#a78bfa;border-radius:4px;padding:2px 5px;font-size:9px;font-weight:700;cursor:pointer" data-editid="'+tb.id+'">편집</button>'+
          '<button style="border:none;background:rgba(196,18,48,.2);color:var(--red2);border-radius:4px;padding:2px 5px;font-size:9px;font-weight:700;cursor:pointer" data-delid="'+tb.id+'">삭제</button></div>';
      } else {

      }
      html += '</div>';
      if (!editMode) {
        if (tb.st==='occupied')
          html += '<div style="font-size:11px;color:'+c.tx+';font-weight:700;margin-top:3px">👤'+esc(String(tb.g))+'명</div>'+
                   '<div style="font-size:10px;color:'+c.tx+';margin-top:1px">⏱'+fmtElapsed(now-tb.seatTime)+'</div>';
        else if (tb.st==='reserved')
          html += '<div style="font-size:11px;color:'+c.tx+';font-weight:700;margin-top:3px">📋'+esc(tb.res&&tb.res.name||'')+'</div>'+
                   '<div style="font-size:10px;color:'+c.tx+';margin-top:1px">'+esc(tb.res&&tb.res.time||'')+'·'+esc(String(tb.res&&tb.res.g||''))+'명</div>';
        else
          html += '<button style="margin-top:4px;font-size:10px;color:var(--text3);background:var(--surf3);border:none;border-radius:5px;padding:2px 6px;cursor:pointer" data-resid="'+tb.id+'">예약 등록</button>';
      }
    }
    card.innerHTML = html;
    var rb = card.querySelector('[data-resid]');
    if (rb) rb.addEventListener('click',function(e){ e.stopPropagation(); openResModal(+this.getAttribute('data-resid')); });
    card.querySelectorAll('[data-editid]').forEach(function(btn){
      btn.addEventListener('click',function(e){ e.stopPropagation(); openEditTableModal(+this.getAttribute('data-editid')); });
    });
    card.querySelectorAll('[data-delid]').forEach(function(btn){
      btn.addEventListener('click',function(e){ e.stopPropagation(); deleteTable(+this.getAttribute('data-delid')); });
    });
  });
}

function bindCard(card, tid) {
  var dragging=false, longPressTimer=null, tapAt=0;
  card.addEventListener('touchstart',function(e){
    tapAt=Date.now(); if(!editMode)return;
    var touch=e.touches[0];
    longPressTimer=setTimeout(function(){ dragging=true; card.classList.add('drag'); startDrag(card,tid,touch.clientX,touch.clientY); },180);
  },{passive:true});
  card.addEventListener('touchmove',function(e){
    if(!editMode)return;
    if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}
    if(!dragging)return; e.preventDefault(); moveDrag(e.touches[0].clientX,e.touches[0].clientY,card,tid);
  },{passive:false});
  card.addEventListener('touchend',function(){
    if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}
    if(dragging){dragging=false;card.classList.remove('drag');snapCard(tid);saveData();return;}
    if(!editMode&&Date.now()-tapAt<280) openTableModal(tid);
  });
  card.addEventListener('mousedown',function(e){
    if(!editMode)return; dragging=true; card.classList.add('drag'); startDrag(card,tid,e.clientX,e.clientY);
    function onMove(ev){moveDrag(ev.clientX,ev.clientY,card,tid);}
    function onUp(){dragging=false;card.classList.remove('drag');snapCard(tid);saveData();document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);}
    document.addEventListener('mousemove',onMove); document.addEventListener('mouseup',onUp);
  });
  card.addEventListener('click',function(){ if(!editMode) openTableModal(tid); });
}
function startDrag(card,tid,cx,cy){
  var r=card.getBoundingClientRect(); dragOffset={x:cx-r.left,y:cy-r.top};
  dragPanelRect=document.getElementById('cv').getBoundingClientRect();
}
function moveDrag(cx,cy,card,tid){
  if(!dragPanelRect)return;
  var panel=document.getElementById('cv'),W=panel.offsetWidth,H=panel.offsetHeight;
  var tb=S.tables.filter(function(t){return t.id===tid;})[0];
  var sz=cardSize(tb?tb.shape:'sq',tb?tb.sz:'m',W,H);
  var nx=Math.max(0,Math.min(W-sz.w,cx-dragPanelRect.left-dragOffset.x));
  var ny=Math.max(0,Math.min(H-sz.h,cy-dragPanelRect.top-dragOffset.y));
  card.style.left=nx+'px'; card.style.top=ny+'px';
  S.tables=S.tables.map(function(t){return t.id===tid?Object.assign({},t,{px:nx/W*100,py:ny/H*100}):t;});
  cardCache[tid]='';
}
function snapCard(tid){
  var panel=document.getElementById('cv'),W=panel.offsetWidth,H=panel.offsetHeight;
  var SNAP=Math.round(W*.04),GAP=Math.round(W*.015);
  var me=S.tables.filter(function(t){return t.id===tid;})[0]; if(!me)return;
  var sz=cardSize(me.shape,me.sz,W,H),px=me.px/100*W,py=me.py/100*H;
  var xa=[0,W-sz.w],ya=[0,H-sz.h];
  S.tables.filter(function(t){return t.id!==tid;}).forEach(function(t){
    var s2=cardSize(t.shape,t.sz,W,H),ox=t.px/100*W,oy=t.py/100*H;
    xa.push(ox,ox+s2.w+GAP,ox+s2.w-sz.w); ya.push(oy,oy+s2.h+GAP,oy+s2.h-sz.h);
  });
  var bx=px,bdx=SNAP; xa.forEach(function(a){var d=Math.abs(px-a);if(d<bdx){bdx=d;bx=a;}});
  var by=py,bdy=SNAP; ya.forEach(function(a){var d=Math.abs(py-a);if(d<bdy){bdy=d;by=a;}});
  bx=Math.max(0,Math.min(W-sz.w,bx)); by=Math.max(0,Math.min(H-sz.h,by));
  var card=document.getElementById('tc'+tid);
  if(card){card.style.transition='left .18s,top .18s';card.style.left=bx+'px';card.style.top=by+'px';setTimeout(function(){if(card)card.style.transition='';},200);}
  S.tables=S.tables.map(function(t){return t.id===tid?Object.assign({},t,{px:bx/W*100,py:by/H*100}):t;});
}
function toggleEdit(){
  editMode=!editMode;
  var btn=document.getElementById('bedit'),cv=document.getElementById('cv'),hint=document.getElementById('ehint');
  S.tables.forEach(function(t){cardCache[t.id]='';});
  if(editMode){
    btn.textContent='✅'; btn.classList.add('on');
    cv.classList.add('em'); hint.textContent='길게 눌러 이동';
    var ab=document.createElement('button');
    ab.id='baddtbl'; ab.className='bp';
    ab.style.cssText='position:absolute;bottom:10px;right:10px;z-index:10;font-size:11px;padding:6px 10px;';
    ab.textContent='+ 테이블 추가';
    ab.addEventListener('click',function(e){e.stopPropagation();openAddTableModal();});
    cv.appendChild(ab);
  } else {
    btn.textContent='✏️'; btn.classList.remove('on');
    cv.classList.remove('em'); hint.textContent='';
    var a2=document.getElementById('baddtbl'); if(a2)a2.remove();
    saveData();
  }
  renderCanvas();
}

function typeToCap(shape, sz) {
  if (shape==='bar') return 2;
  if (shape==='wide') return { s:2, m:4, l:6 }[sz]||4;
  return { s:2, m:4, l:6 }[sz]||4;
}

function deleteTable(tid){

  S.tables=S.tables.filter(function(t){return t.id!==tid;});
  var card=document.getElementById('tc'+tid); if(card)card.remove(); delete cardCache[tid];

}

function renderReservations(){renderCal();renderRvList();}
function renderCal(){
  document.getElementById('calm').textContent=calY+'년 '+(calM+1)+'월';
  var firstDow=new Date(calY,calM,1).getDay(),daysInMonth=new Date(calY,calM+1,0).getDate();
  var td=today(),dots={};
  S.ress.filter(function(r){return r.st!=='cancelled'&&r.date;}).forEach(function(r){dots[r.date]=1;});
  var html='';
  for(var i=0;i<firstDow;i++) html+='<div class="cd other"></div>';
  for(var d=1;d<=daysInMonth;d++){
    var s=calY+'-'+pad(calM+1)+'-'+pad(d),dow=(firstDow+d-1)%7;
    var cls='cd'+(dow===0?' sun':dow===6?' sat':'')+(s===td&&s!==calSel?' today':'')+(s===calSel?' sel':'');
    html+='<div class="'+cls+'" data-d="'+s+'">'+d+(dots[s]?'<div class="dot"></div>':'')+ '</div>';
  }
  document.getElementById('calg').innerHTML=html;
  document.getElementById('calg').querySelectorAll('.cd').forEach(function(el){
    el.addEventListener('click',function(){var d=this.getAttribute('data-d');if(!d)return;calSel=(calSel===d)?null:d;renderCal();renderRvList();});
  });
}

function showModal(html){
  var mdc=document.getElementById('mdc'); mdc.className='md'; mdc.innerHTML=html;
  document.getElementById('mo').classList.add('on');
  var xbtn=document.getElementById('mxbtn'); if(xbtn) xbtn.addEventListener('click',closeModal);
}
function closeModal(){ document.getElementById('mo').classList.remove('on'); document.getElementById('mdc').innerHTML=''; }

// 헬퍼
// ══════════════════════════════════════════════
function bindGbs(cid,ac,cb){
  var c=document.getElementById(cid); if(!c)return;
  c.querySelectorAll('.gb').forEach(function(btn){
    btn.addEventListener('click',function(){var n=+this.getAttribute('data-n');c.querySelectorAll('.gb').forEach(function(b){b.className='gb';}); this.className='gb '+ac;cb(n);});
  });
}
function phoneInputHtml(id,val){
  var dv=val?val.replace(/^010-?/,''):'';
  return '<div class="phone-wrap"><span class="phone-pfx">010</span><span class="phone-sep">-</span>'+
    '<input class="phone-inp" id="'+id+'" type="tel" maxlength="9" placeholder="0000-0000" value="'+esc(dv)+'"></div>';
}
function bindPhone(id){
  var el=document.getElementById(id); if(!el)return;
  el.addEventListener('input',function(){var v=this.value.replace(/\D/g,'');if(v.length>8)v=v.slice(0,8);if(v.length>4)v=v.slice(0,4)+'-'+v.slice(4);this.value=v;});
}
function getPhone(id){var el=document.getElementById(id);if(!el||!el.value.replace(/\D/g,''))return'';return'010-'+el.value;}
function tagPickerHtml(pickerId,sel){
  return '<div class="tag-picker" id="'+pickerId+'">'+
    S.tags.map(function(t){var on=(sel||[]).indexOf(t)>=0;return '<button type="button" class="tag-pill'+(on?' on':'')+'" data-tag="'+esc(t)+'">'+esc(t)+'</button>';}).join('')+
    '<button type="button" class="tag-add-btn" id="'+pickerId+'_mgr">⚙ 태그</button></div>';
}
function bindTagPicker(pid){
  var c=document.getElementById(pid); if(!c)return;
  c.querySelectorAll('.tag-pill').forEach(function(btn){btn.addEventListener('click',function(){this.classList.toggle('on');});});
  var mgr=document.getElementById(pid+'_mgr');
  if(mgr) mgr.addEventListener('click',function(){openTagManager();});
}
function getSelectedTags(pid){
  var c=document.getElementById(pid); if(!c)return[];
  var r=[]; c.querySelectorAll('.tag-pill.on').forEach(function(b){r.push(b.getAttribute('data-tag'));});
  return r;
}

  function html(){ return '<div class="md-hd"><span class="md-title">태그 관리</span><button class="md-x" id="mxbtn">×</button></div>'+
    '<div class="mb"><div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:8px" id="tmlist">'+
    S.tags.map(function(t,i){return '<div style="display:flex;align-items:center;gap:3px;background:var(--surf3);border-radius:99px;padding:3px 6px 3px 11px"><span style="font-size:13px;font-weight:700;color:var(--text)">'+esc(t)+'</span><button type="button" style="border:none;background:none;color:var(--text3);font-size:14px;cursor:pointer;padding:0 3px;line-height:1" data-tidx="'+i+'">×</button></div>';}).join('')+
    '</div><div style="display:flex;gap:6px"><input class="fi" id="tmnew" placeholder="새 태그" style="flex:1"><button class="bp" id="tmadd">추가</button></div>'+
    '<button class="ab" style="background:var(--indigo);width:100%;margin-top:8px" id="tmdone">완료</button></div>'; }
  function bind(){
    document.getElementById('mxbtn').addEventListener('click',closeModal);
    document.getElementById('tmlist').querySelectorAll('[data-tidx]').forEach(function(btn){
      btn.addEventListener('click',function(){S.tags.splice(+this.getAttribute('data-tidx'),1);saveData();document.getElementById('mdc').innerHTML=html();bind();});
    });
    document.getElementById('tmadd').addEventListener('click',function(){
      var v=document.getElementById('tmnew').value.trim(); if(!v)return;
      if(S.tags.indexOf(v)>=0){alert('이미 있습니다');return;}
      S.tags.push(v);saveData();document.getElementById('mdc').innerHTML=html();bind();
    });
    document.getElementById('tmnew').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('tmadd').click();});
    document.getElementById('tmdone').addEventListener('click',closeModal);
  }
  document.getElementById('mdc').innerHTML=html();
  document.getElementById('mo').classList.add('on');
  bind();
}

function syncTodayReservations(){
  var td=today(),changed=false;
  S.ress.forEach(function(r){
    if(r.date===td&&r.st==='confirmed'&&r.tableId){
      var tbl=S.tables.filter(function(t){return t.id===r.tableId;})[0];
      if(tbl&&tbl.st==='empty'){
        var ro={name:r.nm,g:r.g,time:r.time,date:r.date,phone:r.phone,memo:r.memo,tags:r.tags,resId:r.id};
        S.tables=S.tables.map(function(t){return t.id===r.tableId?Object.assign({},t,{st:'reserved',res:ro}):t;});
        changed=true;
      }
    }
  });
  if(changed){S.tables.forEach(function(t){cardCache[t.id]='';});saveData();}
}
