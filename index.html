<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="테이블현황">
<title>테이블 현황</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif; background: #f0f2f5; color: #1e293b; overflow: hidden; position: fixed; width: 100%; height: 100%; }

/* 레이아웃 */
#wrap { display: flex; flex-direction: column; width: 100%; height: 100%; }
#hd   { flex-shrink: 0; background: #fff; border-bottom: 1px solid #e2e8f0; padding: 8px 12px; display: flex; align-items: center; justify-content: space-between; gap: 6px; }
#tb   { flex-shrink: 0; background: #fff; border-bottom: 1px solid #e2e8f0; display: flex; padding: 0 12px; gap: 4px; }
#body { flex: 1; display: flex; overflow: hidden; min-height: 0; }

/* 헤더 */
.hd-left  { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.hd-logo  { width: 32px; height: 32px; background: linear-gradient(135deg,#3b82f6,#6366f1); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.hd-title { font-weight: 800; font-size: 15px; }
.hd-date  { font-size: 10px; color: #94a3b8; }
.hd-right { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.chip     { border-radius: 99px; padding: 3px 8px; font-size: 11px; font-weight: 700; border: 1px solid; white-space: nowrap; }
#badge    { font-size: 11px; font-weight: 600; white-space: nowrap; color: transparent; }

/* 탭 */
.tab { padding: 10px 14px; border: none; background: none; font-size: 13px; font-weight: 700; color: #94a3b8; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.tab.on { color: #3b82f6; border-bottom-color: #3b82f6; }

/* 사이드바 */
#sb { width: 180px; flex-shrink: 0; background: #fff; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; overflow: hidden; }
.sb-head { flex-shrink: 0; padding: 10px 12px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: space-between; }
.sb-title { font-weight: 700; font-size: 13px; color: #64748b; }
#wl { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.wi { padding: 10px 12px; border-bottom: 1px solid #f8fafc; cursor: pointer; }
.wi-top { display: flex; align-items: center; justify-content: space-between; }
.wi-num { width: 20px; height: 20px; border-radius: 50%; background: #e0e7ff; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; color: #6366f1; flex-shrink: 0; }
.wi-name { font-weight: 700; font-size: 14px; margin-left: 6px; }
.wi-g { font-size: 12px; color: #475569; font-weight: 600; }
.wi-sub { font-size: 11px; color: #94a3b8; margin-top: 2px; }
.wi-memo { font-size: 11px; color: #94a3b8; margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* 메인 */
#main { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 10px; min-width: 0; }
#rv   { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 10px; display: none; flex-direction: column; gap: 10px; min-width: 0; }
#rv.on { display: flex; }

/* 범례 */
#leg { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; align-items: center; }
.ld  { display: flex; align-items: center; gap: 3px; font-size: 11px; color: #64748b; }
.lc  { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

/* 캔버스 */
#cv  { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; position: relative; width: 100%; overflow: hidden; }
#cvi { position: absolute; inset: 0; }
#edbanner { display: none; position: absolute; top: 0; left: 0; right: 0; background: rgba(99,102,241,0.12); border-bottom: 2px dashed #6366f1; padding: 6px; font-size: 12px; color: #6366f1; font-weight: 700; text-align: center; z-index: 5; }
#cv.em #edbanner { display: block; }
#cv.em { border: 2px dashed #6366f1; }

/* 테이블 카드 */
.tc { position: absolute; border-radius: 10px; border: 2px solid; display: flex; flex-direction: column; overflow: hidden; cursor: pointer; }
.tc.bar { border-radius: 7px; flex-direction: row; align-items: center; justify-content: space-between; }
.tc.drag { opacity: 0.82; z-index: 50; box-shadow: 0 8px 24px rgba(0,0,0,0.18); }

/* 드래그 안정성 강화 (iOS Safari 핵심) */
#cv.em .tc {
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}

/* 통계 */
#stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 7px; margin-top: 10px; }
.sc { background: #fff; border-radius: 10px; padding: 9px 10px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 7px; }
.si { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.sl { font-size: 10px; color: #94a3b8; }
.sv { font-weight: 800; font-size: 14px; }

/* 버튼 */
.bp  { background: #3b82f6; color: #fff; border: none; border-radius: 7px; padding: 6px 11px; font-size: 13px; font-weight: 700; cursor: pointer; }
.bg  { background: #fff; border: 1px solid #e2e8f0; border-radius: 7px; padding: 5px 10px; font-size: 12px; color: #64748b; cursor: pointer; font-weight: 600; }
.be  { background: #6366f1; color: #fff; border: none; border-radius: 7px; padding: 5px 10px; font-size: 12px; font-weight: 700; cursor: pointer; }
.be.on { background: #ef4444; }

/* 예약관리 */
.rv-top { display: flex; align-items: center; gap: 8px; }
.rv-srch { flex: 1; padding: 9px 12px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 14px; outline: none; -webkit-appearance: none; font-family: inherit; background: #fff; }
.rv-srch:focus { border-color: #3b82f6; }

/* 달력 */
#cal { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; padding: 12px; }
.cal-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.cal-m { font-weight: 800; font-size: 14px; }
.cal-nav { background: none; border: 1px solid #e2e8f0; border-radius: 6px; width: 28px; height: 28px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
.cal-g { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
.cal-dow { text-align: center; font-size: 10px; font-weight: 700; color: #94a3b8; padding: 3px 0; }
.cal-dow:first-child { color: #ef4444; }
.cal-dow:last-child  { color: #3b82f6; }
.cd { text-align: center; padding: 4px 2px; border-radius: 6px; font-size: 12px; cursor: pointer; min-height: 28px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; }
.cd.today { background: #eff6ff; color: #3b82f6; font-weight: 800; }
.cd.sel   { background: #3b82f6; color: #fff; font-weight: 800; }
.cd.sel .dot { background: #fff; }
.cd.other { color: #cbd5e1; }
.cd.sun { color: #ef4444; } .cd.sat { color: #3b82f6; }
.cd.sel.sun, .cd.sel.sat { color: #fff; }
.dot { width: 4px; height: 4px; border-radius: 50%; background: #3b82f6; }

/* 예약 목록 */
#rvw { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; }
.rvw-hd { padding: 11px 13px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: space-between; }
.rvw-title { font-weight: 800; font-size: 14px; }
.rvi { padding: 11px 13px; border-bottom: 1px solid #f8fafc; cursor: pointer; display: flex; align-items: flex-start; gap: 9px; }
.rvi:last-child { border-bottom: none; }
.rvi-t { background: #eff6ff; color: #3b82f6; border-radius: 6px; padding: 4px 7px; font-size: 12px; font-weight: 800; flex-shrink: 0; min-width: 46px; text-align: center; }
.rvi-b { flex: 1; min-width: 0; }
.rvi-n { font-weight: 700; font-size: 14px; }
.rvi-s { font-size: 11px; color: #64748b; margin-top: 1px; }
.rvi-m { font-size: 11px; color: #94a3b8; margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rvi-st { font-size: 11px; font-weight: 700; border-radius: 5px; padding: 2px 6px; flex-shrink: 0; }

/* 모달 */
#mo { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.5); z-index: 999; align-items: center; justify-content: center; padding: 16px; overflow-y: auto; }
#mo.on { display: flex; }
.md { background: #fff; border-radius: 16px; padding: 18px 18px 14px; width: 100%; max-width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
.md-lg { max-width: 420px; }
.md-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.md-title { font-weight: 800; font-size: 16px; }
.md-x { background: #f1f5f9; border: none; border-radius: 50%; width: 30px; height: 30px; font-size: 16px; cursor: pointer; color: #64748b; display: flex; align-items: center; justify-content: center; }
.mb { display: flex; flex-direction: column; gap: 11px; }
.ib { border-radius: 11px; border: 1px solid; padding: 12px 14px; margin-bottom: 12px; }
.ir { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; }
.ir:last-child { margin-bottom: 0; }
.il { color: #64748b; }
.iv { font-weight: 700; }
.gbs { display: flex; gap: 6px; flex-wrap: wrap; }
.gb  { width: 42px; height: 42px; border-radius: 9px; border: 2px solid #e2e8f0; background: #fff; color: #64748b; font-weight: 800; font-size: 15px; cursor: pointer; }
.gb.bl { border-color: #3b82f6; background: #eff6ff; color: #3b82f6; }
.gb.pu { border-color: #8b5cf6; background: #f5f3ff; color: #8b5cf6; }
.gb.gr { border-color: #10b981; background: #ecfdf5; color: #065f46; }
.abs { display: flex; gap: 7px; }
.ab  { flex: 1; padding: 12px 0; border: none; border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer; color: #fff; }
.fg  { display: flex; flex-direction: column; gap: 4px; }
.fl  { font-size: 12px; color: #64748b; }
.fi  { width: 100%; padding: 9px 11px; border: 1.5px solid #e2e8f0; border-radius: 9px; font-size: 14px; outline: none; -webkit-appearance: none; font-family: inherit; background: #fff; color: #1e293b; }
.fi:focus { border-color: #3b82f6; }
textarea.fi { resize: none; min-height: 60px; }
.tpb { padding: 11px 13px; background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: 700; width: 100%; color: #1e293b; }
.tps { color: #94a3b8; font-size: 12px; font-weight: 500; }
.g2  { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
</style>
</head>
<body>
<div id="wrap">
  <div id="hd">
    <div class="hd-left">
      <div class="hd-logo">🍽</div>
      <div>
        <div class="hd-title">테이블 현황</div>
        <div class="hd-date" id="hdate"></div>
      </div>
    </div>
    <div class="hd-right">
      <span id="badge"></span>
      <span class="chip" id="c1" style="color:#3b82f6;border-color:#3b82f629;background:#3b82f615"></span>
      <span class="chip" id="c2" style="color:#8b5cf6;border-color:#8b5cf629;background:#8b5cf615"></span>
      <span class="chip" id="c3" style="color:#f59e0b;border-color:#f59e0b29;background:#f59e0b15"></span>
      <button class="be" id="bedit">✏️배치</button>
      <button class="bg" id="breset">초기화</button>
    </div>
  </div>

  <div id="tb">
    <button class="tab on" id="t1">🪑 홀 현황</button>
    <button class="tab"    id="t2">📋 예약 관리</button>
  </div>

  <div id="body">
    <div id="sb">
      <div class="sb-head">
        <span class="sb-title">대기자</span>
        <button class="bp" id="bwait">+ 추가</button>
      </div>
      <div id="wl"><div style="padding:24px 12px;text-align:center;color:#cbd5e1;font-size:13px">대기자 없음</div></div>
    </div>

    <div id="main">
      <div id="leg">
        <div class="ld"><div class="lc" style="background:#cbd5e1"></div>빈 테이블</div>
        <div class="ld"><div class="lc" style="background:#3b82f6"></div>예약</div>
        <div class="ld"><div class="lc" style="background:#ca8a04"></div>~1시간</div>
        <div class="ld"><div class="lc" style="background:#ea580c"></div>1~1.5h</div>
        <div class="ld"><div class="lc" style="background:#dc2626"></div>1.5h+</div>
        <span id="ehint" style="margin-left:auto;font-size:11px;color:#6366f1;font-weight:700"></span>
      </div>
      <div id="cv"><div id="edbanner">✏️ 길게 누르고 드래그 · 완료 후 [저장] 클릭</div><div id="cvi"></div></div>
      <div id="stats">
        <div class="sc"><div class="si" style="background:#3b82f615">👥</div><div><div class="sl">착석 인원</div><div class="sv" id="s1" style="color:#3b82f6">0명</div></div></div>
        <div class="sc"><div class="si" style="background:#f59e0b15">🪑</div><div><div class="sl">착석 테이블</div><div class="sv" id="s2" style="color:#f59e0b">0개</div></div></div>
        <div class="sc"><div class="si" style="background:#10b98115">⬜</div><div><div class="sl">빈 테이블</div><div class="sv" id="s3" style="color:#10b981">0개</div></div></div>
        <div class="sc"><div class="si" style="background:#8b5cf615">⏳</div><div><div class="sl">대기</div><div class="sv" id="s4" style="color:#8b5cf6">0팀</div></div></div>
      </div>
    </div>

    <div id="rv">
      <div class="rv-top">
        <input class="rv-srch" id="rvsrch" type="search" placeholder="🔍 이름, 연락처 검색…">
        <button class="bp" id="baddRv">+ 예약 추가</button>
      </div>
      <div id="cal">
        <div class="cal-hd">
          <button class="cal-nav" id="bcalp">‹</button>
          <span class="cal-m" id="calm"></span>
          <button class="cal-nav" id="bcaln">›</button>
        </div>
        <div class="cal-g">
          <div class="cal-dow">일</div><div class="cal-dow">월</div><div class="cal-dow">화</div>
          <div class="cal-dow">수</div><div class="cal-dow">목</div><div class="cal-dow">금</div><div class="cal-dow">토</div>
        </div>
        <div class="cal-g" id="calg"></div>
      </div>
      <div id="rvw">
        <div class="rvw-hd"><span class="rvw-title" id="rvtitle">전체 예약</span><span style="font-size:11px;color:#94a3b8" id="rvcnt"></span></div>
        <div id="rvlist"></div>
      </div>
    </div>
  </div>
</div>

<div id="mo"><div class="md" id="mdc"></div></div>

<script>
// ── 기본 변수 ──
var SK = 'tv5';
var IT = [
  {id:1,n:'1번',t:'4인',c:4,px:2, py:3 },
  {id:2,n:'2번',t:'4인',c:4,px:35,py:3 },
  {id:3,n:'3번',t:'4인',c:4,px:68,py:3 },
  {id:4,n:'4번',t:'4인',c:4,px:68,py:36},
  {id:5,n:'5번',t:'4인',c:4,px:68,py:62},
  {id:6,n:'6번',t:'2인',c:2,px:68,py:84},
  {id:7,n:'바1', t:'바', c:2,px:2, py:37},
  {id:8,n:'바2', t:'바', c:2,px:2, py:58},
  {id:9,n:'바3', t:'바', c:2,px:2, py:79}
];

function ft(t){ return {id:t.id,n:t.n,t:t.t,c:t.c,px:t.px,py:t.py,st:'empty',g:0,seatTime:null,res:null}; }

var S = { tables: IT.map(ft), waits: [], ress: [] };
var tab = 'floor', editMode = false, saveT = null;
var calY = new Date().getFullYear(), calM = new Date().getMonth(), calSel = null;
var gv = 2, rvg = 2, rg = 2, wg = 2, resId = null;

// ── 저장/로드 ──
function load(){
  try {
    var d = JSON.parse(localStorage.getItem(SK)||'{}');
    if(d.tables) S.tables = d.tables;
    if(d.waits)  S.waits  = d.waits;
    if(d.ress)   S.ress   = d.ress;
  } catch(e){}
}

function save(){
  clearTimeout(saveT);
  sbadge('saving');
  saveT = setTimeout(function(){
    try{
      localStorage.setItem(SK, JSON.stringify(S));
      sbadge('saved');
      setTimeout(function(){ sbadge(''); }, 1800);
    } catch(e){
      console.warn("저장 실패:", e);
      if(e.name === 'QuotaExceededError' || e.message.includes('quota')){
        sbadge('err');
        alert("저장 공간이 부족합니다.\n사파리 비공개 탭이거나 캐시가 가득 찼을 수 있습니다.\n설정 → 사파리 → 기록 및 웹사이트 데이터 지우기를 시도해 보세요.");
      } else {
        sbadge('err');
      }
    }
  }, 600);
}

function sbadge(s){
  var el = document.getElementById('badge');
  var m = {saving:'#f59e0b', saved:'#10b981', err:'#ef4444'};
  var t = {saving:'저장 중…', saved:'✓ 저장됨', err:'⚠ 실패'};
  el.style.color = m[s]||'transparent';
  el.textContent = t[s]||'';
}

// ── 유틸 ──
function pad(n){ return String(n).padStart(2,'0'); }
function el(ms){
  var t=Math.floor(ms/1000),h=Math.floor(t/3600),m=Math.floor((t%3600)/60),s=t%60;
  return h ? h+':'+pad(m)+':'+pad(s) : pad(m)+':'+pad(s);
}
function ft2(ts){ var d=new Date(ts); return pad(d.getHours())+':'+pad(d.getMinutes()); }
function today(){ var d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function dlabel(s){
  if(!s) return '';
  var p=s.split('-');
  return new Date(+p[0],+p[1]-1,+p[2]).toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
}
function col(st,st2){
  if(st==='empty')    return {bg:'#f8fafc',bd:'#cbd5e1',tx:'#94a3b8'};
  if(st==='reserved') return {bg:'#eff6ff',bd:'#3b82f6',tx:'#1d4ed8'};
  var e=Date.now()-st2;
  if(e<3600000) return {bg:'#fefce8',bd:'#ca8a04',tx:'#78350f'};
  if(e<5400000) return {bg:'#fff7ed',bd:'#ea580c',tx:'#7c2d12'};
  return {bg:'#fef2f2',bd:'#dc2626',tx:'#7f1d1d'};
}
function csz(t,W,H){
  if(t==='바')  return {w:Math.round(W*.28),h:Math.round(H*.115)};
  if(t==='2인') return {w:Math.round(W*.28),h:Math.round(H*.19)};
  return              {w:Math.round(W*.28),h:Math.round(H*.21)};
}

// ── 헤더/통계 ──
function rHd(){
  document.getElementById('hdate').textContent = new Date().toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
  var occ=S.tables.filter(t=>t.st==='occupied').length;
  var rsv=S.tables.filter(t=>t.st==='reserved').length;
  document.getElementById('c1').textContent = '착석 '+occ+'/'+S.tables.length;
  document.getElementById('c2').textContent = '예약 '+rsv;
  document.getElementById('c3').textContent = '대기 '+S.waits.length+'팀';
}
function rSt(){
  var g=S.tables.reduce((a,t)=>a+(t.st==='occupied'?t.g:0),0);
  var occ=S.tables.filter(t=>t.st==='occupied').length;
  var emp=S.tables.filter(t=>t.st==='empty').length;
  document.getElementById('s1').textContent=g+'명';
  document.getElementById('s2').textContent=occ+'개';
  document.getElementById('s3').textContent=emp+'개';
  document.getElementById('s4').textContent=S.waits.length+'팀';
}

// ── 탭 전환 ──
function switchTab(t){
  tab = t;
  document.getElementById('t1').className = 'tab'+(t==='floor'?' on':'');
  document.getElementById('t2').className = 'tab'+(t==='reserve'?' on':'');
  document.getElementById('sb').style.display   = t==='floor' ? '' : 'none';
  document.getElementById('main').style.display = t==='floor' ? '' : 'none';
  document.getElementById('rv').style.display   = t==='reserve' ? 'flex' : 'none';
  document.getElementById('bedit').style.display= t==='floor' ? '' : 'none';

// ── 드래그 ──
var doff={x:0,y:0}, drect=null;
function bindCard(card, tid){
  let dragging = false;
  let ltmr = null;
  let tapAt = 0;

  const cancel = () => {
    if (ltmr) clearTimeout(ltmr);
    ltmr = null;
  };

  card.addEventListener('touchstart', e => {
    tapAt = Date.now();
    if (!editMode) return;
    e.stopPropagation();
    const t = e.touches[0];
    ltmr = setTimeout(() => {
      dragging = true;
      card.classList.add('drag');
      startDrag(card, tid, t.clientX, t.clientY);
    }, 180);
  }, {passive: true});

  card.addEventListener('touchmove', e => {
    if (!editMode || !dragging) return;
    cancel();
    e.preventDefault();
    moveDrag(e.touches[0].clientX, e.touches[0].clientY, card, tid);
  }, {passive: false});

  card.addEventListener('touchend', e => {
    cancel();
    if (dragging) {
      dragging = false;
      card.classList.remove('drag');
      snapCard(tid);
      save();
      return;
    }
    if (!editMode && Date.now() - tapAt < 300) {
      openTbl(tid);
    }
  }, {passive: true});

  card.addEventListener('mousedown', e => {
    if (!editMode) return;
    dragging = true;
    card.classList.add('drag');
    startDrag(card, tid, e.clientX, e.clientY);
    const mm = ev => moveDrag(ev.clientX, ev.clientY, card, tid);
    const mu = () => {
      dragging = false;
      card.classList.remove('drag');
      snapCard(tid);
      save();
      document.removeEventListener('mousemove', mm);
      document.removeEventListener('mouseup', mu);
    };
    document.addEventListener('mousemove', mm);
    document.addEventListener('mouseup', mu);
  });

  card.addEventListener('click', () => {
    if (!editMode) openTbl(tid);
  });
}

function startDrag(card,tid,cx,cy){
  var r=card.getBoundingClientRect();
  doff={x:cx-r.left, y:cy-r.top};
  drect=document.getElementById('cv').getBoundingClientRect();
}

function moveDrag(cx,cy,card,tid){
  if(!drect) return;
  var p=document.getElementById('cv'), W=p.offsetWidth, H=p.offsetHeight;
  var tb=S.tables.find(t=>t.id===tid);
  if(!tb) return;
  var sz=csz(tb.t,W,H);
  var nx=cx-drect.left-doff.x, ny=cy-drect.top-doff.y;
  nx=Math.max(0,Math.min(W-sz.w,nx)); ny=Math.max(0,Math.min(H-sz.h,ny));
  card.style.left=nx+'px'; card.style.top=ny+'px';
  S.tables = S.tables.map(t=> t.id===tid ? {...t, px:nx/W*100, py:ny/H*100} : t);
}

function snapCard(tid){
  var p=document.getElementById('cv'), W=p.offsetWidth, H=p.offsetHeight;
  var SNAP=Math.round(W*.04), GAP=Math.round(W*.015);
  var me=S.tables.find(t=>t.id===tid); if(!me) return;
  var sz=csz(me.t,W,H);
  var px=me.px/100*W, py=me.py/100*H;
  var xa=[0,W-sz.w], ya=[0,H-sz.h];
  S.tables.filter(t=>t.id!==tid).forEach(t=>{
    var s2=csz(t.t,W,H), ox=t.px/100*W, oy=t.py/100*H;
    xa.push(ox, ox+s2.w+GAP, ox+s2.w-sz.w);
    ya.push(oy, oy+s2.h+GAP, oy+s2.h-sz.h);
  });
  var bx=px,bdx=SNAP; xa.forEach(a=>{var d=Math.abs(px-a);if(d<bdx){bdx=d;bx=a;}});
  var by=py,bdy=SNAP; ya.forEach(a=>{var d=Math.abs(py-a);if(d<bdy){bdy=d;by=a;}});
  bx=Math.max(0,Math.min(W-sz.w,bx)); by=Math.max(0,Math.min(H-sz.h,by));
  var card=document.getElementById('tc'+tid);
  if(card){
    card.style.transition='left .18s ease,top .18s ease';
    card.style.left=bx+'px'; card.style.top=by+'px';
    setTimeout(()=>card.style.transition='',200);
  }
  S.tables = S.tables.map(t=> t.id===tid ? {...t, px:bx/W*100, py:by/H*100} : t);
}

function toggleEdit(){
  editMode=!editMode;

// ── 예약 관리 ──
function rRv(){ rCal(); rRvList(); }

function rCal(){
  document.getElementById('calm').textContent=calY+'년 '+(calM+1)+'월';
  var first=new Date(calY,calM,1).getDay(), days=new Date(calY,calM+1,0).getDate(), td=today();
  var dots={}; S.ress.filter(r=>r.st!=='cancelled'&&r.date).forEach(r=>dots[r.date]=1);
  var h='';
  for(var i=0;i<first;i++) h+='<div class="cd other"></div>';
  for(var d=1;d<=days;d++){
    var s=calY+'-'+pad(calM+1)+'-'+pad(d), dow=(first+d-1)%7;
    var cls='cd'+(dow===0?' sun':dow===6?' sat':'')+(s===td&&s!==calSel?' today':'')+(s===calSel?' sel':'');
    h+='<div class="'+cls+'" data-d="'+s+'">'+d+(dots[s]?'<div class="dot"></div>':'')+'</div>';
  }
  document.getElementById('calg').innerHTML=h;
  document.querySelectorAll('#calg .cd').forEach(el=>{
    el.addEventListener('click',function(){
      var d=this.getAttribute('data-d'); if(!d) return;
      calSel=calSel===d?null:d; rCal(); rRvList();
    });
  });
}

function rRvList(){
  var q=(document.getElementById('rvsrch').value||'').trim().toLowerCase();
  var list=S.ress.filter(r=>r.st!=='cancelled');
  if(calSel) list=list.filter(r=>r.date===calSel);
  if(q) list=list.filter(r=>(r.nm||'').toLowerCase().includes(q)||(r.phone||'').includes(q));
  list.sort((a,b)=>((a.date||'9999')+(a.time||'99:99'))<((b.date||'9999')+(b.time||'99:99'))?-1:1);
  document.getElementById('rvtitle').textContent=calSel?dlabel(calSel)+' 예약':'전체 예약';
  document.getElementById('rvcnt').textContent=list.length+'건';
  var sm={confirmed:['#10b981','#ecfdf5','확정'],pending:['#f59e0b','#fffbeb','대기'],arrived:['#3b82f6','#eff6ff','방문'],noshow:['#ef4444','#fef2f2','노쇼']};
  document.getElementById('rvlist').innerHTML=list.length?list.map(r=>{
    var s=sm[r.st||'confirmed']||sm.confirmed;
    return '<div class="rvi" data-rid="'+r.id+'">'
      +'<div class="rvi-t">'+(r.time||'–:–')+'</div>'
      +'<div class="rvi-b"><div class="rvi-n">'+r.nm+'</div>'
      +'<div class="rvi-s">'+(r.date?dlabel(r.date)+' ':'')+r.g+'명'+(r.phone?' · '+r.phone:'')+'</div>'
      +(r.memo?'<div class="rvi-m">📝'+r.memo+'</div>':'')
      +'</div>'
      +'<div class="rvi-st" style="color:'+s[0]+';background:'+s[1]+'">'+s[2]+'</div>'
      +'</div>';
  }).join(''):'<div style="padding:24px;text-align:center;color:#cbd5e1;font-size:13px">예약 없음</div>';
  document.querySelectorAll('#rvlist .rvi').forEach(el=>{
    el.addEventListener('click',function(){ openRvDetail(+this.getAttribute('data-rid')); });
  });
}

function openAddRv(){
  rvg=2; var df=calSel||today();
  showModal('<div class="md md-lg">'
    +'<div class="md-hd"><span class="md-title">예약 추가</span><button class="md-x" id="mxbtn">×</button></div>'
    +'<div class="mb">'
    +'<div class="g2"><div class="fg"><label class="fl">이름 *</label><input class="fi" id="avn" placeholder="홍길동"></div>'
    +'<div class="fg"><label class="fl">연락처</label><input class="fi" id="avp" type="tel" placeholder="010-0000-0000"></div></div>'
    +'<div class="g2"><div class="fg"><label class="fl">날짜 *</label><input class="fi" id="avd" type="date" value="'+df+'"></div>'
    +'<div class="fg"><label class="fl">시간 *</label><input class="fi" id="avt" type="time" value="18:00"></div></div>'
    +'<div class="fg"><label class="fl">인원</label><div class="gbs" id="rvgbs">'+[1,2,3,4,5,6,7,8].map(n=>'<button class="gb '+(n===2?' gr':'')+'" data-n="'+n+'">'+n+'</button>').join('')+'</div></div>'
    +'<div class="fg"><label class="fl">메모</label><textarea class="fi" id="avm" placeholder="알레르기, 특별 요청 등…"></textarea></div>'
    +'<div class="fg"><label class="fl">상태</label><select class="fi" id="avs"><option value="confirmed">확정</option><option value="pending">대기</option></select></div>'
    +'<button class="ab" style="background:#10b981;width:100%" id="avsubmit">예약 등록</button>'
    +'</div></div>');
  bindGbs('rvgbs','gr',n=>rvg=n);
  document.getElementById('avsubmit').addEventListener('click',function(){
    var nm=document.getElementById('avn').value.trim(), d=document.getElementById('avd').value, t=document.getElementById('avt').value;
    if(!nm||!d||!t){alert('이름, 날짜, 시간은 필수입니다');return;}
    S.ress.push({id:Date.now(),nm:nm,phone:document.getElementById('avp').value,date:d,time:t,g:rvg,memo:document.getElementById('avm').value,st:document.getElementById('avs').value});
    closeModal();save();rRv();
  });
}

function openRvDetail(id){
  var r=S.ress.find(x=>x.id===id); if(!r) return;
  var sm={confirmed:'확정',pending:'대기',arrived:'방문',noshow:'노쇼',cancelled:'취소'};
  var sc={confirmed:['#10b981','#ecfdf5'],pending:['#f59e0b','#fffbeb'],arrived:['#3b82f6','#eff6ff'],noshow:['#ef4444','#fef2f2']};
  showModal('<div class="md md-lg">'
    +'<div class="md-hd"><span class="md-title">'+r.nm+' 예약</span><button class="md-x" id="mxbtn">×</button></div>'
    +'<div class="ib" style="background:#f8fafc;border-color:#e2e8f0">'
    +'<div class="ir"><span class="il">날짜</span><span class="iv">'+dlabel(r.date)+'</span></div>'
    +'<div class="ir"><span class="il">시간</span><span class="iv">'+r.time+'</span></div>'
    +'<div class="ir"><span class="il">인원</span><span class="iv">'+r.g+'명</span></div>'
    +(r.phone?'<div class="ir"><span class="il">연락처</span><span class="iv"><a href="tel:'+r.phone+'" style="color:#3b82f6;text-decoration:none">'+r.phone+'</a></span></div>':'')
    +(r.memo?'<div class="ir"><span class="il">메모</span><span class="iv" style="text-align:right;max-width:160px">'+r.memo+'</span></div>':'')
    +'<div class="ir"><span class="il">상태</span><span class="iv">'+sm[r.st||'confirmed']+'</span></div>'
    +'</div>'
    +'<div style="display:flex;gap:5px;margin-bottom:9px">'
    +['arrived','confirmed','noshow'].map(s=>'<button style="flex:1;padding:8px 0;border:none;border-radius:8px;background:'+(sc[s]?sc[s][1]:'#f1f5f9')+';color:'+(sc[s]?sc[s][0]:'#64748b')+';font-weight:700;font-size:12px;cursor:pointer" data-st="'+s+'">'+sm[s]+'</button>').join('')
    +'</div>'
    +'<div class="abs">'
    +'<button class="ab" style="background:#6366f1" id="bedit2">✏️ 수정</button>'
    +'<button class="ab" style="background:#ef4444" id="bcanc">취소</button>'
    +'</div></div>');
  document.querySelectorAll('#mdc [data-st]').forEach(btn=>{
    btn.addEventListener('click',function(){
      var st=this.getAttribute('data-st');
      S.ress=S.ress.map(x=>x.id===id?{...x,st:st}:x);
      save();closeModal();rRv();
    });
  });
  document.getElementById('bedit2').addEventListener('click',function(){ closeModal(); openEditRv(id); });
  document.getElementById('bcanc').addEventListener('click',function(){
    if(!confirm('예약을 삭제할까요?')) return;
    S.ress=S.ress.filter(x=>x.id!==id);
    save();closeModal();rRv();
  });
}

function openEditRv(id){
  var r=S.ress.find(x=>x.id===id); if(!r) return;
  rvg=r.g||2;
  showModal('<div class="md md-lg">'
    +'<div class="md-hd"><span class="md-title">예약 수정</span><button class="md-x" id="mxbtn">×</button></div>'
    +'<div class="mb">'
    +'<div class="g2"><div class="fg"><label class="fl">이름 *</label><input class="fi" id="evn" value="'+r.nm+'"></div>'
    +'<div class="fg"><label class="fl">연락처</label><input class="fi" id="evp" type="tel" value="'+(r.phone||'')+'"></div></div>'
    +'<div class="g2"><div class="fg"><label class="fl">날짜 *</label><input class="fi" id="evd" type="date" value="'+(r.date||'')+'"></div>'
    +'<div class="fg"><label class="fl">시간 *</label><input class="fi" id="evt" type="time" value="'+(r.time||'')+'"></div></div>'
    +'<div class="fg"><label class="fl">인원</label><div class="gbs" id="rvgbs">'+[1,2,3,4,5,6,7,8].map(n=>'<button class="gb '+(n===rvg?' gr':'')+'" data-n="'+n+'">'+n+'</button>').join('')+'</div></div>'
    +'<div class="fg"><label class="fl">메모</label><textarea class="fi" id="evm">'+(r.memo||'')+'</textarea></div>'
    +'<div class="fg"><label class="fl">상태</label><select class="fi" id="evs">'+['confirmed','pending','arrived','noshow'].map(s=>'<option value="'+s+'"'+(r.st===s?' selected':'')+'>'+{confirmed:'확정',pending:'대기',arrived:'방문',noshow:'노쇼'}[s]+'</option>').join('')+'</select></div>'
    +'<button class="ab" style="background:#10b981;width:100%" id="evsubmit">저장</button>'
    +'</div></div>');
  bindGbs('rvgbs','gr',n=>rvg=n);
  document.getElementById('evsubmit').addEventListener('click',function(){
    var nm=document.getElementById('evn').value.trim(), d=document.getElementById('evd').value, t=document.getElementById('evt').value;
    if(!nm||!d||!t){alert('이름, 날짜, 시간은 필수입니다');return;}
    S.ress=S.ress.map(x=>x.id===id?{...x,nm:nm,phone:document.getElementById('evp').value,date:d,time:t,g:rvg,memo:document.getElementById('evm').value,st:document.getElementById('evs').value}:x);
    closeModal();save();rRv();
  });
}

// ── 초기화 ──
function confirmReset(){
  showModal('<div class="md">'
    +'<div class="md-hd"><span class="md-title">전체 초기화</span><button class="md-x" id="mxbtn">×</button></div>'
    +'<p style="font-size:13px;color:#64748b;margin-bottom:14px;line-height:1.7">모든 착석·대기 정보가 삭제됩니다.<br>예약 목록과 배치는 유지됩니다.</p>'
    +'<div class="abs"><button class="ab" style="background:#94a3b8" id="bno">취소</button><button class="ab" style="background:#ef4444" id="byes">초기화</button></div>'
    +'</div>');
  document.getElementById('bno').addEventListener('click', closeModal);
  document.getElementById('byes').addEventListener('click',function(){
    S.tables=S.tables.map(t=>({...t,st:'empty',g:0,seatTime:null,res:null}));
    S.waits=[];
    closeModal();save();rAll();
  });
}

// ── 모달 ──
function showModal(html){
  document.getElementById('mdc').innerHTML=html;
  document.getElementById('mo').classList.add('on');
  var xbtn=document.getElementById('mxbtn');
  if(xbtn) xbtn.addEventListener('click', closeModal);
}

function closeModal(){
  document.getElementById('mo').classList.remove('on');
  document.getElementById('mdc').innerHTML='';
}

// ── 인원 버튼 헬퍼 ──
function bindGbs(containerId, activeClass, cb){
  var c=document.getElementById(containerId); if(!c) return;
  c.querySelectorAll('.gb').forEach(btn=>{
    btn.addEventListener('click',function(){
      var n=+this.getAttribute('data-n');
      c.querySelectorAll('.gb').forEach(b=>b.className='gb');
      this.className='gb '+activeClass;
      cb(n);
    });
  });
}

// ── 전체 렌더 ──
function rAll(){ rHd(); rCanvas(); rWl(); rSt(); }

// ── 이벤트 바인딩 ──
document.getElementById('t1').addEventListener('click', ()=>switchTab('floor'));
document.getElementById('t2').addEventListener('click', ()=>switchTab('reserve'));
document.getElementById('bedit').addEventListener('click', toggleEdit);
document.getElementById('breset').addEventListener('click', confirmReset);
document.getElementById('bwait').addEventListener('click', openWaitModal);
document.getElementById('baddRv').addEventListener('click', openAddRv);
document.getElementById('bcalp').addEventListener('click', function(){ calM--; if(calM<0){calM=11;calY--;} rCal(); rRvList(); });
document.getElementById('bcaln').addEventListener('click', function(){ calM++; if(calM>11){calM=0;calY++;} rCal(); rRvList(); });
document.getElementById('rvsrch').addEventListener('input', rRvList);
document.getElementById('mo').addEventListener('click', function(e){
  if(e.target===this){
    e.preventDefault();
    e.stopPropagation();
    closeModal();
  }
});

// ── 부트 ──
load();
rAll();

// requestAnimationFrame으로 부드럽게 갱신 (iOS 배터리 최적화에도 유리)
let lastRaf = 0;
function updateLoop(){
  const now = Date.now();
  if (tab === 'floor' && now - lastRaf > 800) {
    lastRaf = now;
    rCanvas();
    rWl();
    rSt();
    rHd();
  }
  requestAnimationFrame(updateLoop);
}
requestAnimationFrame(updateLoop);

window.addEventListener('resize', rCanvas);
document.addEventListener('visibilitychange', function(){
  if(document.hidden) localStorage.setItem(SK, JSON.stringify(S));
});
</script>
