<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="테이블현황">
<title>테이블 현황</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Apple SD Gothic Neo','Pretendard',-apple-system,sans-serif;background:#f1f5f9;color:#1e293b;user-select:none;-webkit-user-select:none;position:fixed;inset:0;overflow:hidden}

/* 전체 flex 컨테이너 */
#root{display:flex;flex-direction:column;height:100%;width:100%}

/* 헤더 */
#header{flex-shrink:0;min-height:52px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;padding:6px 10px;box-shadow:0 1px 4px rgba(0,0,0,0.06);z-index:10;gap:6px}
.logo{width:30px;height:30px;background:linear-gradient(135deg,#3b82f6,#6366f1);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.header-title{font-weight:800;font-size:14px;letter-spacing:-0.5px;white-space:nowrap}
.header-date{font-size:10px;color:#94a3b8;margin-top:1px;white-space:nowrap}
.header-right{display:flex;align-items:center;gap:4px;flex-shrink:0;overflow:hidden}
.chip{border-radius:20px;padding:3px 7px;font-size:11px;font-weight:700;border:1px solid;white-space:nowrap}
#save-badge{font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0}

/* 탭바 */
#tabbar{flex-shrink:0;height:44px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;padding:0 14px;gap:4px;z-index:10}
.tab-btn{padding:5px 14px;border-radius:20px;border:none;font-size:13px;font-weight:700;cursor:pointer;background:transparent;color:#94a3b8}
.tab-btn.active{background:#3b82f6;color:#fff}

/* 콘텐츠 영역 */
#content{flex:1;display:flex;overflow:hidden;min-height:0}

/* 사이드바 */
#sidebar{width:188px;flex-shrink:0;background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;overflow:hidden}
#sidebar.hidden{display:none}
.sidebar-head{flex-shrink:0;padding:11px 12px 9px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between}
.sidebar-label{font-weight:700;font-size:13px;color:#64748b}
#waitlist{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.wait-item{padding:10px 12px;border-bottom:1px solid #f8fafc;cursor:pointer}
.wait-num{width:21px;height:21px;border-radius:50%;background:#e0e7ff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#6366f1;flex-shrink:0}
.wait-name{font-weight:700;font-size:14px;margin-left:6px}
.wait-elapsed{font-size:11px;color:#94a3b8;margin-top:2px}
.empty-msg{padding:24px 12px;text-align:center;color:#cbd5e1;font-size:13px}

/* 메인 홀 */
#main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px;min-width:0}
#main.hidden{display:none}

/* 예약관리 뷰 */
#reserve-view{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px;display:none;flex-direction:column;gap:12px;min-width:0}
#reserve-view.active{display:flex}

/* 범례 */
#legend{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.legend-item{display:flex;align-items:center;gap:4px;font-size:12px;color:#64748b}
.legend-dot{width:8px;height:8px;border-radius:3px;flex-shrink:0}

/* 캔버스 */
#canvas-panel{background:#fff;border-radius:14px;border:1px solid #e2e8f0;position:relative;overflow:hidden;width:100%;height:0;box-shadow:0 1px 6px rgba(0,0,0,0.04)}
#canvas-panel.edit-mode{border:2px dashed #6366f1}
#canvas-inner{position:absolute;inset:0}
#edit-banner{display:none;position:absolute;top:0;left:0;right:0;background:rgba(99,102,241,0.1);border-bottom:2px dashed #6366f1;padding:6px;font-size:12px;color:#6366f1;font-weight:700;z-index:5;text-align:center}
#canvas-panel.edit-mode #edit-banner{display:block}

/* 테이블 카드 */
.tcard{position:absolute;border-radius:12px;border:2px solid;display:flex;flex-direction:column;overflow:hidden;cursor:pointer}
.tcard.bar-card{border-radius:8px;flex-direction:row;align-items:center;justify-content:space-between}
.tcard.dragging{opacity:0.82;z-index:50;box-shadow:0 10px 28px rgba(0,0,0,0.18)}

/* 통계 */
#stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
.stat-card{background:#fff;border-radius:12px;padding:10px 12px;border:1px solid #e2e8f0;display:flex;align-items:center;gap:8px}
.stat-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.stat-label{font-size:11px;color:#94a3b8}
.stat-value{font-weight:800;font-size:15px}

/* 버튼 */
.btn-primary{background:#3b82f6;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:700;cursor:pointer}
.btn-ghost{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:6px 11px;font-size:13px;color:#64748b;cursor:pointer;font-weight:600}
.btn-edit{background:#6366f1;color:#fff;border:none;border-radius:8px;padding:6px 11px;font-size:13px;font-weight:700;cursor:pointer}
.btn-edit.active{background:#ef4444}

/* 예약관리 */
.rv-top{display:flex;align-items:center;gap:10px}
.rv-search{flex:1;padding:9px 13px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;outline:none;-webkit-appearance:none;font-family:inherit}
.rv-search:focus{border-color:#3b82f6}
#cal-wrap{background:#fff;border-radius:14px;border:1px solid #e2e8f0;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-month{font-weight:800;font-size:15px}
.cal-nav{background:none;border:1px solid #e2e8f0;border-radius:7px;width:30px;height:30px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{text-align:center;font-size:11px;font-weight:700;color:#94a3b8;padding:3px 0}
.cal-dow:first-child{color:#ef4444}
.cal-dow:last-child{color:#3b82f6}
.cal-day{text-align:center;padding:5px 2px;border-radius:7px;font-size:13px;cursor:pointer;min-height:32px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.cal-day.today{background:#eff6ff;color:#3b82f6;font-weight:800}
.cal-day.selected{background:#3b82f6;color:#fff;font-weight:800}
.cal-day.selected .cal-dot{background:#fff}
.cal-day.other{color:#cbd5e1}
.cal-day.sun{color:#ef4444}
.cal-day.sat{color:#3b82f6}
.cal-day.selected.sun,.cal-day.selected.sat{color:#fff}
.cal-dot{width:4px;height:4px;border-radius:50%;background:#3b82f6}
#rv-list-wrap{background:#fff;border-radius:14px;border:1px solid #e2e8f0;overflow:hidden}
.rv-list-head{padding:12px 14px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between}
.rv-list-title{font-weight:800;font-size:14px}
.rv-item{padding:12px 14px;border-bottom:1px solid #f8fafc;cursor:pointer;display:flex;align-items:flex-start;gap:10px}
.rv-item:last-child{border-bottom:none}
.rv-time-badge{background:#eff6ff;color:#3b82f6;border-radius:7px;padding:4px 8px;font-size:13px;font-weight:800;flex-shrink:0;min-width:48px;text-align:center}
.rv-item-body{flex:1;min-width:0}
.rv-item-name{font-weight:700;font-size:14px}
.rv-item-sub{font-size:12px;color:#64748b;margin-top:2px}
.rv-item-memo{font-size:12px;color:#94a3b8;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rv-status-badge{font-size:11px;font-weight:700;border-radius:6px;padding:3px 7px;flex-shrink:0}

/* 모달 */
#modal-root{position:fixed;inset:0;z-index:1000;pointer-events:none}
#modal-root.open{pointer-events:auto}
.overlay{position:absolute;inset:0;background:rgba(15,23,42,0.5);display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto}
.modal{background:#fff;border-radius:18px;padding:20px 20px 16px;width:100%;max-width:370px;box-shadow:0 20px 60px rgba(0,0,0,0.22);position:relative}
.modal-lg{max-width:430px}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.modal-title{font-weight:800;font-size:16px}
.modal-close{background:#f1f5f9;border:none;border-radius:50%;width:32px;height:32px;font-size:17px;cursor:pointer;color:#64748b;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.modal-body{display:flex;flex-direction:column;gap:12px}
.info-box{border-radius:12px;border:1px solid;padding:13px 15px;margin-bottom:13px}
.info-row{display:flex;justify-content:space-between;margin-bottom:7px;font-size:14px}
.info-row:last-child{margin-bottom:0}
.info-label{color:#64748b}
.info-value{font-weight:700}
.guest-btns{display:flex;gap:7px;flex-wrap:wrap}
.guest-btn{width:44px;height:44px;border-radius:10px;border:2px solid #e2e8f0;background:#fff;color:#64748b;font-weight:800;font-size:16px;cursor:pointer}
.guest-btn.active-blue{border-color:#3b82f6;background:#eff6ff;color:#3b82f6}
.guest-btn.active-purple{border-color:#8b5cf6;background:#f5f3ff;color:#8b5cf6}
.guest-btn.active-green{border-color:#10b981;background:#ecfdf5;color:#065f46}
.action-btns{display:flex;gap:8px}
.action-btn{flex:1;padding:13px 0;border:none;border-radius:11px;font-weight:700;font-size:14px;cursor:pointer;color:#fff}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:13px;color:#64748b}
.form-input{width:100%;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;outline:none;-webkit-appearance:none;font-family:inherit;background:#fff;color:#1e293b}
.form-input:focus{border-color:#3b82f6}
textarea.form-input{resize:none;min-height:66px}
.table-pick-btn{padding:12px 14px;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:11px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:700;width:100%;color:#1e293b}
.table-pick-sub{color:#94a3b8;font-size:12px;font-weight:500}
</style>

</head>

<script>
'use strict';
// ═══════════════════════════════════
// 상수 / 초기값
// ═══════════════════════════════════
const STORAGE_KEY = 'restaurant-v5';

const INIT_TABLES = [
  {id:1,name:'1번',type:'4인',capacity:4,px:2, py:3 },
  {id:2,name:'2번',type:'4인',capacity:4,px:35,py:3 },
  {id:3,name:'3번',type:'4인',capacity:4,px:68,py:3 },
  {id:4,name:'4번',type:'4인',capacity:4,px:68,py:36},
  {id:5,name:'5번',type:'4인',capacity:4,px:68,py:62},
  {id:6,name:'6번',type:'2인',capacity:2,px:68,py:84},
  {id:7,name:'바1', type:'바', capacity:2,px:2, py:37},
  {id:8,name:'바2', type:'바', capacity:2,px:2, py:58},
  {id:9,name:'바3', type:'바', capacity:2,px:2, py:79},
];

function freshTable(t){ return {...t,status:'empty',guests:0,seatTime:null,reservation:null}; }

// ═══════════════════════════════════
// 상태
// ═══════════════════════════════════
let S = {
  tables: INIT_TABLES.map(freshTable),
  waitlist: [],
  reservations: [],
};
let currentTab  = 'floor';
let editMode    = false;
let saveTimer   = null;
let calYear     = new Date().getFullYear();
let calMonth    = new Date().getMonth();
let calSelected = null;
let _gc = 2, _rvg = 2, _rg = 2, _wg = 2;
let _resTableId = null;

// ═══════════════════════════════════
// 저장 / 로드
// ═══════════════════════════════════
function load(){
  try{
    const r=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
    if(r.tables)       S.tables=r.tables;
    if(r.waitlist)     S.waitlist=r.waitlist;
    if(r.reservations) S.reservations=r.reservations;
  }catch(e){}
}
function save(){
  clearTimeout(saveTimer);
  badge('saving');
  saveTimer=setTimeout(()=>{
    try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(S)); badge('saved'); setTimeout(()=>badge(''),2000); }
    catch(e){ badge('error'); }
  },700);
}
function badge(s){
  const el=document.getElementById('save-badge');
  const m={saving:['#f59e0b','저장 중…'],saved:['#10b981','✓ 저장됨'],error:['#ef4444','⚠ 실패']};
  if(m[s]){el.style.color=m[s][0];el.textContent=m[s][1];}
  else{el.style.color='transparent';el.textContent='';}
}

// ═══════════════════════════════════
// 유틸
// ═══════════════════════════════════
const pad=n=>String(n).padStart(2,'0');
function elapsed(ms){
  const t=Math.floor(ms/1000),h=Math.floor(t/3600),m=Math.floor((t%3600)/60),s=t%60;
  return h?`${h}:${pad(m)}:${pad(s)}`:`${pad(m)}:${pad(s)}`;
}
function fmtTime(ts){const d=new Date(ts);return `${pad(d.getHours())}:${pad(d.getMinutes())}`;}
function todayStr(){const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function dateLabel(s){
  if(!s)return '';
  const[y,m,d]=s.split('-');
  return new Date(+y,+m-1,+d).toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
}
function getColors(status,seatTime){
  if(status==='empty')    return{bg:'#f8fafc',border:'#cbd5e1',text:'#94a3b8'};
  if(status==='reserved') return{bg:'#eff6ff',border:'#3b82f6',text:'#1d4ed8'};
  const e=Date.now()-seatTime;
  if(e<3600000) return{bg:'#fefce8',border:'#ca8a04',text:'#78350f'};
  if(e<5400000) return{bg:'#fff7ed',border:'#ea580c',text:'#7c2d12'};
  return              {bg:'#fef2f2',border:'#dc2626',text:'#7f1d1d'};
}
function cardSize(type,W,H){
  if(type==='바')  return{w:Math.round(W*.28),h:Math.round(H*.115)};
  if(type==='2인') return{w:Math.round(W*.28),h:Math.round(H*.19)};
  return                {w:Math.round(W*.28),h:Math.round(H*.21)};
}

// ═══════════════════════════════════
// 탭 전환
// ═══════════════════════════════════
function switchTab(tab){
  currentTab=tab;
  document.getElementById('tab-floor').classList.toggle('active',tab==='floor');
  document.getElementById('tab-reserve').classList.toggle('active',tab==='reserve');
  document.getElementById('sidebar').classList.toggle('hidden',tab!=='floor');
  document.getElementById('main').classList.toggle('hidden',tab!=='floor');
  document.getElementById('reserve-view').classList.toggle('active',tab==='reserve');
  document.getElementById('btn-edit').style.display=tab==='floor'?'':'none';
  if(tab==='floor') render(); else renderReserveView();
}

// ═══════════════════════════════════
// 헤더 / 통계
// ═══════════════════════════════════
function renderHeader(){
  document.getElementById('header-date').textContent=
    new Date().toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
  const occ=S.tables.filter(t=>t.status==='occupied').length;

// 드래그 + 스냅
// ═══════════════════════════════════
let _dragOffset={x:0,y:0},_dragRect=null;

function bindCard(card,tid){
  let dragging=false,ltimer=null,tapAt=0;

  card.addEventListener('touchstart',e=>{
    tapAt=Date.now();
    if(!editMode)return;
    const t=e.touches[0];
    ltimer=setTimeout(()=>{dragging=true;card.classList.add('dragging');startDrag(card,tid,t.clientX,t.clientY);},180);
  },{passive:true});

  card.addEventListener('touchmove',e=>{
    if(!editMode)return;
    if(ltimer){clearTimeout(ltimer);ltimer=null;}
    if(!dragging)return;
    e.preventDefault();
    moveDrag(e.touches[0].clientX,e.touches[0].clientY,card,tid);
  },{passive:false});

  card.addEventListener('touchend',()=>{
    if(ltimer){clearTimeout(ltimer);ltimer=null;}
    if(dragging){dragging=false;card.classList.remove('dragging');snap(tid);save();return;}
    if(!editMode&&Date.now()-tapAt<280)openTableModal(tid);
  });

  card.addEventListener('mousedown',e=>{
    if(!editMode)return;
    dragging=true;card.classList.add('dragging');startDrag(card,tid,e.clientX,e.clientY);
    const mm=ev=>moveDrag(ev.clientX,ev.clientY,card,tid);
    const mu=()=>{dragging=false;card.classList.remove('dragging');snap(tid);save();document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};
    document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
  });

  card.addEventListener('click',()=>{if(!editMode)openTableModal(tid);});
}

function startDrag(card,tid,cx,cy){
  const r=card.getBoundingClientRect();
  _dragOffset={x:cx-r.left,y:cy-r.top};
  _dragRect=document.getElementById('canvas-panel').getBoundingClientRect();
}

function moveDrag(cx,cy,card,tid){
  if(!_dragRect)return;
  const p=document.getElementById('canvas-panel');
  const W=p.offsetWidth,H=p.offsetHeight;
  const t=S.tables.find(t=>t.id===tid);
  const sz=cardSize(t?.type,W,H);
  let nx=cx-_dragRect.left-_dragOffset.x,ny=cy-_dragRect.top-_dragOffset.y;
  nx=Math.max(0,Math.min(W-sz.w,nx));ny=Math.max(0,Math.min(H-sz.h,ny));
  card.style.left=nx+'px';card.style.top=ny+'px';
  S.tables=S.tables.map(t=>t.id===tid?{...t,px:nx/W*100,py:ny/H*100}:t);
}

function snap(tid){
  const p=document.getElementById('canvas-panel');
  const W=p.offsetWidth,H=p.offsetHeight;
  const SNAP=Math.round(W*.035),GAP=Math.round(W*.015);
  const me=S.tables.find(t=>t.id===tid);if(!me)return;
  const sz=cardSize(me.type,W,H);
  let px=me.px/100*W,py=me.py/100*H;
  const xa=[0,W-sz.w],ya=[0,H-sz.h];
  S.tables.filter(t=>t.id!==tid).forEach(t=>{
    const s2=cardSize(t.type,W,H),ox=t.px/100*W,oy=t.py/100*H;
    xa.push(ox,ox+s2.w+GAP,ox+s2.w-sz.w);
    ya.push(oy,oy+s2.h+GAP,oy+s2.h-sz.h);
  });
  let bx=px,bdx=SNAP;xa.forEach(a=>{const d=Math.abs(px-a);if(d<bdx){bdx=d;bx=a;}});
  let by=py,bdy=SNAP;ya.forEach(a=>{const d=Math.abs(py-a);if(d<bdy){bdy=d;by=a;}});
  bx=Math.max(0,Math.min(W-sz.w,bx));by=Math.max(0,Math.min(H-sz.h,by));
  const card=document.getElementById(`tc-${tid}`);
  if(card){card.style.transition='left .18s ease,top .18s ease';card.style.left=bx+'px';card.style.top=by+'px';setTimeout(()=>{if(card)card.style.transition='';},200);}
  S.tables=S.tables.map(t=>t.id===tid?{...t,px:bx/W*100,py:by/H*100}:t);
}

function toggleEditMode(){
  editMode=!editMode;
  const btn=document.getElementById('btn-edit'),panel=document.getElementById('canvas-panel'),hint=document.getElementById('edit-hint');
  if(editMode){btn.textContent='✅ 저장';btn.classList.add('active');panel.classList.add('edit-mode');hint.textContent='길게 누르고 드래그';}
  else{btn.textContent='✏️ 배치';btn.classList.remove('active');panel.classList.remove('edit-mode');hint.textContent='';save();}
  renderCanvas();
}

function selectCalDay(s){calSelected=calSelected===s?null:s;renderCalendar();renderReserveList();}

function renderCalendar(){
document.getElementById(‘cal-month-label’).textContent=`${calYear}년 ${calMonth+1}월`;
const first=new Date(calYear,calMonth,1).getDay();
const days=new Date(calYear,calMonth+1,0).getDate();
const today=todayStr();
const dots=new Set(S.reservations.filter(r=>r.status!==‘cancelled’&&r.date?.startsWith(`${calYear}-${pad(calMonth+1)}`)).map(r=>r.date));
let h=’’;
for(let i=0;i<first;i++)h+=’<div class="cal-day other"></div>’;
for(let d=1;d<=days;d++){
const s=`${calYear}-${pad(calMonth+1)}-${pad(d)}`;
const dow=(first+d-1)%7;
const cls=[‘cal-day’,dow===0?‘sun’:dow===6?‘sat’:’’,s===today&&s!==calSelected?‘today’:’’,s===calSelected?‘selected’:’’].filter(Boolean).join(’ ’);
h+=`<div class="${cls}" onclick="selectCalDay('${s}')">${d}${dots.has(s)?'<div class="cal-dot"></div>':''}</div>`;
}
document.getElementById(‘cal-grid’).innerHTML=h;
}

function renderReserveList(){
const q=(document.getElementById(‘rv-search’)?.value||’’).trim().toLowerCase();
let list=S.reservations.filter(r=>r.status!==‘cancelled’);
if(calSelected)list=list.filter(r=>r.date===calSelected);
if(q)list=list.filter(r=>(r.name||’’).toLowerCase().includes(q)||(r.phone||’’).includes(q));
list.sort((a,b)=>((a.date||‘9999’)+(a.time||‘99:99’))<((b.date||‘9999’)+(b.time||‘99:99’))?-1:1);
document.getElementById(‘rv-list-title’).textContent=calSelected?dateLabel(calSelected)+’ 예약’:‘전체 예약’;
document.getElementById(‘rv-list-count’).textContent=`${list.length}건`;
const sm={confirmed:[’#10b981’,’#ecfdf5’,‘확정’],pending:[’#f59e0b’,’#fffbeb’,‘대기’],arrived:[’#3b82f6’,’#eff6ff’,‘방문’],noshow:[’#ef4444’,’#fef2f2’,‘노쇼’]};
document.getElementById(‘rv-list’).innerHTML=list.length?list.map(r=>{
const[sc,sbg,sl]=sm[r.status||‘confirmed’]||sm.confirmed;
return `<div class="rv-item" onclick="openRvDetail(${r.id})"> <div class="rv-time-badge">${r.time||'--:--'}</div> <div class="rv-item-body"> <div class="rv-item-name">${r.name}</div> <div class="rv-item-sub">${r.date?dateLabel(r.date)+' ':''}${r.guests}명${r.phone?' · '+r.phone:''}</div> ${r.memo?`<div class="rv-item-memo">📝${r.memo}</div>`:''} </div> <div class="rv-status-badge" style="color:${sc};background:${sbg}">${sl}</div> </div>`;
}).join(’’):’<div class="empty-msg" style="padding:28px">예약 없음</div>’;
}

function openAddReservation(){
_rvg=2;const df=calSelected||todayStr();
const btns=[1,2,3,4,5,6,7,8].map(n=>`<button class="guest-btn${n===2?' active-green':''}" onclick="setRVG(${n})">${n}</button>`).join(’’);
showModal(`<div class="modal modal-lg" onclick="event.stopPropagation()">
<div class="modal-head"><span class="modal-title">예약 추가</span><button class="modal-close" onclick="closeModal()">×</button></div>
<div class="modal-body">
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
<div class="form-group"><label class="form-label">이름 *</label><input class="form-input" id="avn" placeholder="홍길동"></div>
<div class="form-group"><label class="form-label">연락처</label><input class="form-input" id="avp" type="tel" placeholder="010-0000-0000"></div>
</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
<div class="form-group"><label class="form-label">날짜 *</label><input class="form-input" id="avd" type="date" value="${df}"></div>
<div class="form-group"><label class="form-label">시간 *</label><input class="form-input" id="avt" type="time" value="18:00"></div>
</div>
<div class="form-group"><label class="form-label">인원</label><div class="guest-btns" id="rvgb">${btns}</div></div>
<div class="form-group"><label class="form-label">메모</label><textarea class="form-input" id="avm" placeholder="알레르기, 특별 요청 등…"></textarea></div>
<div class="form-group"><label class="form-label">상태</label><select class="form-input" id="avs"><option value="confirmed">확정</option><option value="pending">대기</option></select></div>
<button class="action-btn" style="background:#10b981;width:100%" onclick="submitAddRv()">예약 등록</button>
</div>

  </div>`);
}
function setRVG(n){_rvg=n;document.getElementById('rvgb')?.querySelectorAll('.guest-btn').forEach((b,i)=>{b.className='guest-btn'+((i+1)===n?' active-green':'');});}
function submitAddRv(){
  const name=document.getElementById('avn')?.value.trim();
  const date=document.getElementById('avd')?.value;
  const time=document.getElementById('avt')?.value;
  if(!name||!date||!time){alert('이름, 날짜, 시간은 필수입니다');return;}
  S.reservations.push({id:Date.now(),name,phone:document.getElementById('avp')?.value||'',date,time,guests:_rvg,memo:document.getElementById('avm')?.value||'',status:document.getElementById('avs')?.value||'confirmed',createdAt:Date.now()});
  closeModal();save();renderReserveView();
}
function openRvDetail(id){
  const r=S.reservations.find(x=>x.id===id);if(!r)return;
  const sm={confirmed:'확정',pending:'대기',arrived:'방문',noshow:'노쇼',cancelled:'취소'};
  showModal(`<div class="modal modal-lg" onclick="event.stopPropagation()">
    <div class="modal-head"><span class="modal-title">${r.name} 예약</span><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="info-box" style="background:#f8fafc;border-color:#e2e8f0;margin-bottom:11px">
      <div class="info-row"><span class="info-label">날짜</span><span class="info-value">${dateLabel(r.date)}</span></div>
      <div class="info-row"><span class="info-label">시간</span><span class="info-value">${r.time}</span></div>
      <div class="info-row"><span class="info-label">인원</span><span class="info-value">${r.guests}명</span></div>
      ${r.phone?`<div class="info-row"><span class="info-label">연락처</span><span class="info-value"><a href="tel:${r.phone}" style="color:#3b82f6;text-decoration:none">${r.phone}</a></span></div>`:''}
      ${r.memo?`<div class="info-row"><span class="info-label">메모</span><span class="info-value" style="text-align:right;max-width:180px">${r.memo}</span></div>`:''}
      <div class="info-row"><span class="info-label">상태</span><span class="info-value">${sm[r.status]||r.status}</span></div>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">
      <button onclick="setRvSt(${id},'arrived')"   style="flex:1;padding:9px 0;border:none;border-radius:9px;background:#eff6ff;color:#3b82f6;font-weight:700;font-size:13px;cursor:pointer">방문</button>
      <button onclick="setRvSt(${id},'confirmed')" style="flex:1;padding:9px 0;border:none;border-radius:9px;background:#ecfdf5;color:#10b981;font-weight:700;font-size:13px;cursor:pointer">확정</button>
      <button onclick="setRvSt(${id},'noshow')"    style="flex:1;padding:9px 0;border:none;border-radius:9px;background:#fef2f2;color:#ef4444;font-weight:700;font-size:13px;cursor:pointer">노쇼</button>
    </div>
    <div class="action-btns">
      <button class="action-btn" style="background:#6366f1" onclick="closeModal();openEditRv(${id})">✏️ 수정</button>
      <button class="action-btn" style="background:#ef4444" onclick="cancelRv(${id})">취소</button>
    </div>
  </div>`);
}
function setRvSt(id,st){S.reservations=S.reservations.map(r=>r.id===id?{...r,status:st}:r);save();closeModal();renderReserveView();}
function cancelRv(id){if(!confirm('예약을 삭제할까요?'))return;S.reservations=S.reservations.filter(r=>r.id!==id);save();closeModal();renderReserveView();}
function openEditRv(id){
  const r=S.reservations.find(x=>x.id===id);if(!r)return;
  _rvg=r.guests||2;
  const btns=[1,2,3,4,5,6,7,8].map(n=>`<button class="guest-btn${n===_rvg?' active-green':''}" onclick="setRVG(${n})">${n}</button>`).join('');
  showModal(`<div class="modal modal-lg" onclick="event.stopPropagation()">
    <div class="modal-head"><span class="modal-title">예약 수정</span><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="form-group"><label class="form-label">이름 *</label><input class="form-input" id="evn" value="${r.name||''}"></div>
        <div class="form-group"><label class="form-label">연락처</label><input class="form-input" id="evp" type="tel" value="${r.phone||''}"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="form-group"><label class="form-label">날짜 *</label><input class="form-input" id="evd" type="date" value="${r.date||''}"></div>
        <div class="form-group"><label class="form-label">시간 *</label><input class="form-input" id="evt" type="time" value="${r.time||''}"></div>
      </div>
      <div class="form-group"><label class="form-label">인원</label><div class="guest-btns" id="rvgb">${btns}</div></div>
      <div class="form-group"><label class="form-label">메모</label><textarea class="form-input" id="evm">${r.memo||''}</textarea></div>
      <div class="form-group"><label class="form-label">상태</label><select class="form-input" id="evs">${['confirmed','pending','arrived','noshow'].map(s=>`<option value="${s}"${r.status===s?' selected':''}>${{confirmed:'확정',pending:'대기',arrived:'방문',noshow:'노쇼'}[s]}</option>`).join('')}</select></div>
      <button class="action-btn" style="background:#10b981;width:100%" onclick="submitEditRv(${id})">저장</button>
    </div>
  </div>`);
}
function submitEditRv(id){
  const name=document.getElementById('evn')?.value.trim();
  const date=document.getElementById('evd')?.value;
  const time=document.getElementById('evt')?.value;
  if(!name||!date||!time){alert('이름, 날짜, 시간은 필수입니다');return;}
  S.reservations=S.reservations.map(r=>r.id===id?{...r,name,phone:document.getElementById('evp')?.value||'',date,time,guests:_rvg,memo:document.getElementById('evm')?.value||'',status:document.getElementById('evs')?.value}:r);
  closeModal();save();renderReserveView();
}

function confirmReset(){
showModal(`<div class="modal" onclick="event.stopPropagation()">
<div class="modal-head"><span class="modal-title">전체 초기화</span><button class="modal-close" onclick="closeModal()">×</button></div>
<p style="font-size:14px;color:#64748b;margin-bottom:16px;line-height:1.7">모든 착석·대기 정보가 삭제됩니다.<br>예약 목록과 배치는 유지됩니다.</p>
<div class="action-btns">
<button class="action-btn" style="background:#94a3b8" onclick="closeModal()">취소</button>
<button class="action-btn" style="background:#ef4444" onclick="doReset()">초기화</button>
</div>

  </div>`);
}
function doReset(){
  S.tables=S.tables.map(t=>({...t,status:'empty',guests:0,seatTime:null,reservation:null}));
  S.waitlist=[];closeModal();save();render();
}

// ═══════════════════════════════════
// 모달 공통
// ═══════════════════════════════════
function showModal(html){
const el=document.getElementById(‘modal-root’);
el.innerHTML=`<div class="overlay">${html}</div>`;
el.classList.add(‘open’);
}
function closeModal(){
const el=document.getElementById(‘modal-root’);
el.innerHTML=’’;
el.classList.remove(‘open’);
}
function handleOverlayClick(e){
if(e.target===e.currentTarget||e.target.classList.contains(‘overlay’))closeModal();
}

// ═══════════════════════════════════
// 전체 렌더
// ═══════════════════════════════════
function render(){renderHeader();renderCanvas();renderWaitlist();renderStats();}

load();
render();
setInterval(()=>{if(currentTab===‘floor’){renderCanvas();renderWaitlist();renderStats();renderHeader();}},1000);
window.addEventListener(‘resize’,()=>renderCanvas());
document.addEventListener(‘visibilitychange’,()=>{if(document.hidden)localStorage.setItem(STORAGE_KEY,JSON.stringify(S));});
</script>
