<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="테이블현황">
<title>테이블 현황 - 류마</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif; background: #f0f2f5; color: #1e293b; overflow: hidden; position: fixed; width: 100%; height: 100dvh; }

#wrap { display: flex; flex-direction: column; width: 100%; height: 100%; }
#hd   { flex-shrink: 0; background: #fff; border-bottom: 1px solid #e2e8f0; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
#tb   { flex-shrink: 0; background: #fff; border-bottom: 1px solid #e2e8f0; display: flex; padding: 0 16px; gap: 8px; }
#body { flex: 1; display: flex; overflow: hidden; min-height: 0; position: relative; }

.hd-left  { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.hd-logo  { width: 36px; height: 36px; background: linear-gradient(135deg,#3b82f6,#6366f1); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.hd-title { font-weight: 800; font-size: 16px; }
.hd-date  { font-size: 11px; color: #94a3b8; }
.hd-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end;}
.chip     { border-radius: 99px; padding: 4px 10px; font-size: 12px; font-weight: 700; border: 1px solid; white-space: nowrap; }
#badge    { font-size: 12px; font-weight: 600; white-space: nowrap; color: transparent; }

.tab { padding: 14px 18px; border: none; background: none; font-size: 14px; font-weight: 700; color: #94a3b8; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.tab.on { color: #3b82f6; border-bottom-color: #3b82f6; }

#sb { width: 25%; max-width: 220px; min-width: 160px; flex-shrink: 0; background: #fff; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; overflow: hidden; }
.sb-head { flex-shrink: 0; padding: 12px 16px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: space-between; }
.sb-title { font-weight: 700; font-size: 14px; color: #64748b; }
#wl { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.wi { padding: 12px 16px; border-bottom: 1px solid #f8fafc; cursor: pointer; }
.wi-top { display: flex; align-items: center; justify-content: space-between; }
.wi-num { width: 22px; height: 22px; border-radius: 50%; background: #e0e7ff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: #6366f1; flex-shrink: 0; }
.wi-name { font-weight: 700; font-size: 15px; margin-left: 8px; }
.wi-g { font-size: 13px; color: #475569; font-weight: 600; }
.wi-sub { font-size: 12px; color: #94a3b8; margin-top: 4px; }
.wi-memo { font-size: 12px; color: #94a3b8; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

#main { flex: 1; position: relative; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px; display: flex; flex-direction: column; }
#rv   { flex: 1; position: absolute; top: 0; left: 0; right: 0; bottom: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px; display: none; flex-direction: column; gap: 12px; background: #f0f2f5; }
#rv.on { display: flex; }

#leg { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
.ld  { display: flex; align-items: center; gap: 4px; font-size: 12px; color: #64748b; }
.lc  { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

#cv  { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; position: relative; width: 100%; min-height: 400px; flex-shrink: 0; overflow: hidden; }
#cvi { position: absolute; inset: 0; overflow: hidden; }
#edbanner { display: none; position: absolute; top: 0; left: 0; right: 0; background: rgba(99,102,241,0.12); border-bottom: 2px dashed #6366f1; padding: 8px; font-size: 13px; color: #6366f1; font-weight: 700; text-align: center; z-index: 5; }
#cv.em #edbanner { display: block; }
#cv.em { border: 2px dashed #6366f1; }

.tc { position: absolute; border-radius: 10px; border: 2px solid; display: flex; flex-direction: column; overflow: hidden; cursor: pointer; }
.tc.bar { border-radius: 8px; flex-direction: row; align-items: center; justify-content: space-between; }
.tc.drag { opacity: 0.82; z-index: 50; box-shadow: 0 8px 24px rgba(0,0,0,0.18); }

#stats { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
.sc { flex: 1; min-width: 120px; background: #fff; border-radius: 10px; padding: 12px 14px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 10px; }
.si { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.sl { font-size: 11px; color: #94a3b8; }
.sv { font-weight: 800; font-size: 15px; }

.bp  { background: #3b82f6; color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-size: 14px; font-weight: 700; cursor: pointer; min-height: 36px;}
.bg  { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px 14px; font-size: 13px; color: #64748b; cursor: pointer; font-weight: 600; min-height: 36px;}
.be  { background: #6366f1; color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 700; cursor: pointer; min-height: 36px;}
.be.on { background: #ef4444; }

.rv-top { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.rv-srch { flex: 1; min-width: 200px; padding: 12px 16px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 15px; outline: none; -webkit-appearance: none; font-family: inherit; background: #fff; }
.rv-srch:focus { border-color: #3b82f6; }

#cal { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; padding: 16px; }
.cal-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.cal-m { font-weight: 800; font-size: 16px; }
.cal-nav { background: none; border: 1px solid #e2e8f0; border-radius: 8px; width: 36px; height: 36px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
.cal-g { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
.cal-dow { text-align: center; font-size: 12px; font-weight: 700; color: #94a3b8; padding: 4px 0; }
.cal-dow:first-child { color: #ef4444; }
.cal-dow:last-child  { color: #3b82f6; }
.cd { text-align: center; padding: 8px 4px; border-radius: 8px; font-size: 14px; cursor: pointer; min-height: 44px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; }
.cd.today { background: #eff6ff; color: #3b82f6; font-weight: 800; }
.cd.sel   { background: #3b82f6; color: #fff; font-weight: 800; }
.cd.sel .dot { background: #fff; }
.cd.other { color: #cbd5e1; }
.cd.sun { color: #ef4444; } .cd.sat { color: #3b82f6; }
.cd.sel.sun, .cd.sel.sat { color: #fff; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: #3b82f6; }

#rvw { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; margin-top: 12px; }
.rvw-hd { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: space-between; }
.rvw-title { font-weight: 800; font-size: 15px; }
.rvi { padding: 14px 16px; border-bottom: 1px solid #f8fafc; cursor: pointer; display: flex; align-items: flex-start; gap: 12px; }
.rvi:last-child { border-bottom: none; }
.rvi-t { background: #eff6ff; color: #3b82f6; border-radius: 8px; padding: 6px 10px; font-size: 13px; font-weight: 800; flex-shrink: 0; min-width: 54px; text-align: center; }
.rvi-b { flex: 1; min-width: 0; }
.rvi-n { font-weight: 700; font-size: 15px; }
.rvi-s { font-size: 13px; color: #64748b; margin-top: 2px; }
.rvi-m { font-size: 12px; color: #94a3b8; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rvi-st { font-size: 12px; font-weight: 700; border-radius: 6px; padding: 4px 8px; flex-shrink: 0; }

#mo { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.6); z-index: 999; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
#mo.on { display: flex; }
.md { background: #fff; border-radius: 16px; padding: 24px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); margin: auto; }
.md-lg { max-width: 520px !important; }
.md-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.md-title { font-weight: 800; font-size: 18px; }
.md-x { background: #f1f5f9; border: none; border-radius: 50%; width: 36px; height: 36px; font-size: 20px; cursor: pointer; color: #64748b; display: flex; align-items: center; justify-content: center; }
.mb { display: flex; flex-direction: column; gap: 16px; }
.ib { border-radius: 12px; border: 1px solid; padding: 16px; margin-bottom: 16px; }
.ir { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
.ir:last-child { margin-bottom: 0; }
.il { color: #64748b; }
.iv { font-weight: 700; }
.gbs { display: flex; gap: 8px; flex-wrap: wrap; }
.gb  { width: 48px; height: 48px; border-radius: 10px; border: 2px solid #e2e8f0; background: #fff; color: #64748b; font-weight: 800; font-size: 16px; cursor: pointer; }
.gb.bl { border-color: #3b82f6; background: #eff6ff; color: #3b82f6; }
.gb.pu { border-color: #8b5cf6; background: #f5f3ff; color: #8b5cf6; }
.gb.gr { border-color: #10b981; background: #ecfdf5; color: #065f46; }
.abs { display: flex; gap: 10px; margin-top: 10px;}
.ab  { flex: 1; padding: 14px 0; border: none; border-radius: 12px; font-weight: 700; font-size: 15px; cursor: pointer; color: #fff; }
.fg  { display: flex; flex-direction: column; gap: 6px; }
.fl  { font-size: 13px; color: #64748b; font-weight: 600;}
.fi  { width: 100%; padding: 12px 14px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 15px; outline: none; -webkit-appearance: none; font-family: inherit; background: #fff; color: #1e293b; }
.fi:focus { border-color: #3b82f6; }
textarea.fi { resize: none; min-height: 80px; }
.tpb { padding: 14px 16px; background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 15px; font-weight: 700; width: 100%; color: #1e293b; }
.tps { color: #94a3b8; font-size: 13px; font-weight: 500; }
.g2  { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* 010 고정 폼 디자인 */
.prefix-input { display: flex; align-items: center; background: #fff; border: 1.5px solid #e2e8f0; border-radius: 10px; overflow: hidden; padding-left: 14px; }
.prefix-input span { font-weight: 700; color: #64748b; font-size: 15px; flex-shrink: 0; }
.prefix-input input { border: none; outline: none; padding: 12px 14px 12px 8px; flex: 1; font-size: 15px; background: transparent; color: #1e293b; width: 100%; }
.prefix-input:focus-within { border-color: #3b82f6; }

/* 태그 UI 버튼 디자인 추가 */
.tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
.tag-btn { padding: 8px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px; background: #fff; color: #64748b; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; outline: none; }
.tag-btn.on { background: #eff6ff; border-color: #3b82f6; color: #3b82f6; }
.t-chip { display: inline-block; padding: 4px 8px; border-radius: 6px; background: #f1f5f9; color: #475569; font-size: 11px; font-weight: 700; margin-right: 6px; margin-top: 4px; border: 1px solid #e2e8f0; }

@media (max-width: 820px) {
  #sb { width: 30%; max-width: none; }
  .hd-right { justify-content: flex-start; }
}

@media (max-width: 600px) {
  #body { flex-direction: column; }
  #sb { width: 100%; height: 30%; border-right: none; border-bottom: 1px solid #e2e8f0; }
  #main { height: 70%; padding: 10px;}
  #hd { flex-direction: column; align-items: flex-start; }
  .hd-right { width: 100%; justify-content: space-between; }
  #stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .sc { min-width: 0; }
}
</style>
</head>
<body>
<div id="wrap">
  <div id="hd">
    <div class="hd-left">
      <div class="hd-logo">🍽</div>
      <div>
        <div class="hd-title">테이블 현황</div>
        <div class="hd-date" id="hdate"></div>
      </div>
    </div>
    <div class="hd-right">
      <span id="badge"></span>
      <span class="chip" id="c1" style="color:#3b82f6;border-color:#3b82f629;background:#3b82f615"></span>
      <span class="chip" id="c2" style="color:#8b5cf6;border-color:#8b5cf629;background:#8b5cf615"></span>
      <span class="chip" id="c3" style="color:#f59e0b;border-color:#f59e0b29;background:#f59e0b15"></span>
      <button class="be" id="bedit">✏️배치</button>
      <button class="bg" id="breset">초기화</button>
    </div>
  </div>

  <div id="tb">
    <button class="tab on" id="t1">🪑 홀 현황</button>
    <button class="tab"    id="t2">📋 예약 관리</button>
  </div>

  <div id="body">
    <div id="sb">
      <div class="sb-head">
        <span class="sb-title">대기자</span>
        <button class="bp" id="bwait">+ 추가</button>
      </div>
      <div id="wl"><div style="padding:24px 12px;text-align:center;color:#cbd5e1;font-size:13px">대기자 없음</div></div>
    </div>

    <div id="main">
      <div id="leg">
        <div class="ld"><div class="lc" style="background:#cbd5e1"></div>빈 테이블</div>
        <div class="ld"><div class="lc" style="background:#3b82f6"></div>예약</div>
        <div class="ld"><div class="lc" style="background:#ca8a04"></div>~1시간</div>
        <div class="ld"><div class="lc" style="background:#ea580c"></div>1~1.5h</div>
        <div class="ld"><div class="lc" style="background:#dc2626"></div>1.5h+</div>
        <span id="ehint" style="margin-left:auto;font-size:11px;color:#6366f1;font-weight:700"></span>
      </div>
      <div id="cv"><div id="edbanner">✏️ 길게 누르고 드래그 · 완료 후 [저장] 클릭</div><div id="cvi"></div></div>
      <div id="stats">
        <div class="sc"><div class="si" style="background:#3b82f615">👥</div><div><div class="sl">착석 인원</div><div class="sv" id="s1" style="color:#3b82f6">0명</div></div></div>
        <div class="sc"><div class="si" style="background:#f59e0b15">🪑</div><div><div class="sl">착석 테이블</div><div class="sv" id="s2" style="color:#f59e0b">0개</div></div></div>
        <div class="sc"><div class="si" style="background:#10b98115">⬜</div><div><div class="sl">빈 테이블</div><div class="sv" id="s3" style="color:#10b981">0개</div></div></div>
        <div class="sc"><div class="si" style="background:#8b5cf615">⏳</div><div><div class="sl">대기</div><div class="sv" id="s4" style="color:#8b5cf6">0팀</div></div></div>
      </div>
    </div>

    <div id="rv">
      <div class="rv-top">
        <input class="rv-srch" id="rvsrch" type="search" placeholder="🔍 이름, 연락처 검색…">
        <button class="bp" id="baddRv">+ 예약 추가</button>
      </div>
      <div id="cal">
        <div class="cal-hd">
          <button class="cal-nav" id="bcalp">‹</button>
          <span class="cal-m" id="calm"></span>
          <button class="cal-nav" id="bcaln">›</button>
        </div>
        <div class="cal-g">
          <div class="cal-dow">일</div><div class="cal-dow">월</div><div class="cal-dow">화</div>
          <div class="cal-dow">수</div><div class="cal-dow">목</div><div class="cal-dow">금</div><div class="cal-dow">토</div>
        </div>
        <div class="cal-g" id="calg"></div>
      </div>
      <div id="rvw">
        <div class="rvw-hd"><span class="rvw-title" id="rvtitle">전체 예약</span><span style="font-size:11px;color:#94a3b8" id="rvcnt"></span></div>
        <div id="rvlist"></div>
      </div>
    </div>
  </div>
</div>

<div id="mo"><div class="md" id="mdc"></div></div>

<script>
// ── 상수 ──────────────────────────────────────────────────
var STORAGE_KEY = 'tv5';

var INIT_TABLES = [
  {id:1,n:"1번",t:"4인",c:4,px:2, py:5 },
  {id:2,n:"2번",t:"4인",c:4,px:35,py:5 },
  {id:3,n:"3번",t:"4인",c:4,px:68,py:5 },
  {id:4,n:"4번",t:"4인",c:4,px:68,py:32},
  {id:5,n:"5번",t:"4인",c:4,px:68,py:58},
  {id:6,n:"6번",t:"2인",c:2,px:68,py:80},
  {id:7,n:"바1",t:"바", c:2,px:2, py:35},
  {id:8,n:"바2",t:"바", c:2,px:2, py:56},
  {id:9,n:"바3",t:"바", c:2,px:2, py:77}
];

var TAG_LIST = ['회식', '기념일', '생일', '코스(일반)', '코스(한우)'];

// ── 상태 ──────────────────────────────────────────────────
var S = { tables: [], waits: [], ress: [] };
var currentTab = 'floor';
var editMode   = false;
var saveTimer  = null;
var calY = new Date().getFullYear();
var calM = new Date().getMonth();
var calSel = null;

var gvFloor = 2;
var gvWait  = 2;
var gvRes   = 2;
var gvRvAdd = 2;
var gvRvEdit= 2;
var gvTags  = []; 
var activeResTableId = null;

var dragOffset = {x:0, y:0};
var dragPanelRect = null;

// ── XSS 방어 ──────────────────────────────────────────────
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function uid() {
  return Date.now() + '_' + Math.random().toString(36).slice(2, 7);
}

function makeTable(t) {
  return { id:t.id, n:t.n, t:t.t, c:t.c, px:t.px, py:t.py,
           st:'empty', g:0, seatTime:null, res:null, linkTo:null };
}

// ── 저장 / 로드 ───────────────────────────────────────────
function loadData() {
  try {
    var d = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    if (d.tables) S.tables = d.tables;
    if (d.waits)  S.waits  = d.waits;
    if (d.ress)   S.ress   = d.ress;
  } catch(e) {}
}
function saveData() {
  clearTimeout(saveTimer);
  showBadge('saving');
  saveTimer = setTimeout(function() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(S));
      showBadge('saved');
      setTimeout(function(){ showBadge(''); }, 2000);
    } catch(e) { showBadge('err'); }
  }, 700);
}
function showBadge(s) {
  var el = document.getElementById('badge');
  var colorMap = { saving:'#f59e0b', saved:'#10b981', err:'#ef4444' };
  var textMap  = { saving:'저장 중…', saved:'✓ 저장됨', err:'⚠ 실패' };
  el.style.color = colorMap[s] || 'transparent';
  el.textContent = textMap[s] || '';
}

// ── 유틸 ──────────────────────────────────────────────────
function pad(n) { return String(n).padStart(2,'0'); }

function fmtElapsed(ms) {
  var t = Math.floor(ms/1000);
  var h = Math.floor(t/3600);
  var m = Math.floor((t%3600)/60);
  var s = t % 60;
  return h ? h+':'+pad(m)+':'+pad(s) : pad(m)+':'+pad(s);
}

function fmtTime(ts) {
  var d = new Date(ts);
  return pad(d.getHours()) + ':' + pad(d.getMinutes());
}

function today() {
  var d = new Date();
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function dlabel(s) {
  if (!s) return '';
  var p = s.split('-');
  return new Date(+p[0], +p[1]-1, +p[2])
    .toLocaleDateString('ko-KR', {month:'long', day:'numeric', weekday:'short'});
}
function tableColor(st, seatTime, isLinked) {
  if (st === 'empty')    return {bg:'#f8fafc', bd:'#cbd5e1', tx:'#94a3b8'};
  if (st === 'reserved') return {bg:'#eff6ff', bd:'#3b82f6', tx:'#1d4ed8'};
  if (isLinked)          return {bg:'#f0fdf4', bd:'#22c55e', tx:'#15803d'}; 
  var elapsed = Date.now() - seatTime;
  if (elapsed < 3600000) return {bg:'#fefce8', bd:'#ca8a04', tx:'#78350f'};
  if (elapsed < 5400000) return {bg:'#fff7ed', bd:'#ea580c', tx:'#7c2d12'};
  return {bg:'#fef2f2', bd:'#dc2626', tx:'#7f1d1d'};
}
function cardSize(type, W, H) {
  if (type === "바")  return {w:Math.round(W*.28), h:Math.round(H*.115)};
  if (type === "2인") return {w:Math.round(W*.28), h:Math.round(H*.19)};
  return                    {w:Math.round(W*.28), h:Math.round(H*.21)};
}

function renderTagBtns(selected) {
  return TAG_LIST.map(function(t) {

    // 태그를 <button> 태그로 렌더링하도록 수정

}
function bindTags(containerId) {
  var container = document.getElementById(containerId);
  if(!container) return;
  container.querySelectorAll('.tag-btn').forEach(function(btn) {

function renderTagChips(tags) {

  return '<div style="margin-top:2px">' + tags.map(function(t){ return '<span class="t-chip">#'+esc(t)+'</span>'; }).join('') + '</div>';

var cardCache = {};

  var H = Math.round(W * 0.75);

  var now = Date.now();
  S.tables.forEach(function(tb) {
    var card = document.getElementById('tc' + tb.id);
    if (!card) {
      card = document.createElement('div');
      card.id = 'tc' + tb.id;
      inner.appendChild(card);
      bindCard(card, tb.id);
      cardCache[tb.id] = '';
    }

    var isLinked = !!tb.linkTo;
    var c   = tableColor(tb.st, tb.seatTime, isLinked);
    var sz  = cardSize(tb.t, W, H);
    var x   = Math.max(0, Math.min(W - sz.w, Math.round(tb.px / 100 * W)));
    var y   = Math.max(0, Math.min(H - sz.h, Math.round(tb.py / 100 * H)));

    card.style.cursor      = editMode ? 'grab' : 'pointer';
    card.style.boxShadow   = editMode ? '0 0 0 2px #6366f144' : '';

    var wasDragging = card.classList.contains('drag');

    var dot     = tb.st === 'occupied' ? '#22c55e' : tb.st === 'reserved' ? '#3b82f6' : '#d1d5db';
    var dshadow = tb.st !== 'empty' ? '0 0 0 3px ' + dot + '33' : 'none';

    var cacheKey   = tb.st + '|' + tb.g + '|' + (tb.seatTime||0) + '|' + elapsedMin
                   + '|' + (tb.res ? JSON.stringify(tb.res) : '') + '|' + editMode + '|' + tb.linkTo + '|' + tb.n + '|' + tb.c;

      } else if (tb.st === 'occupied') {

              + '<div style="font-size:10px;color:'+c.tx+'">'+fmtElapsed(now - tb.seatTime)+'</div>';
      } else if (tb.st === 'reserved') {
        html += '<div style="font-size:11px;color:#3b82f6;font-weight:700">'+esc(tb.res && tb.res.time || '')+'</div>';
      } else {
        html += '<div style="width:9px;height:9px;border-radius:50%;background:'+dot+';box-shadow:'+dshadow+'"></div>';
      }
      html += '</div>';
    } else {
      html = '<div style="display:flex;justify-content:space-between;align-items:flex-start;width:100%;margin-bottom:4px">'
        + '<div>'
        + '<div style="font-weight:800;font-size:14px">'+esc(tb.n)+'</div>' // 이름만 남기고 폰트 크기 키움
        // 불필요한 보조 텍스트 완전 삭제
        + '</div>'
        + '<div style="width:9px;height:9px;border-radius:50%;background:'+dot+';box-shadow:'+dshadow+';flex-shrink:0;margin-top:2px"></div>'
        + '</div>';
      if (isLinked) {
         html += '<div style="font-size:12px;color:'+c.tx+';font-weight:800;margin-top:4px">🔗 단체석 연결</div>';
      } else if (tb.st === 'occupied') {
        html += '<div style="font-size:11px;color:'+c.tx+';font-weight:700">👤'+esc(String(tb.g))+'명</div>'
              + '<div style="font-size:11px;color:'+c.tx+';margin-top:1px">⏱'+fmtElapsed(now - tb.seatTime)+'</div>';

    }
  });
}

// ── 드래그 & 클릭 ─────────────────────────────────────────
function bindCard(card, tid) {
  var dragging = false;
  var longPressTimer = null;
  var tapAt = 0;

  card.addEventListener('touchstart', function(e) {
    tapAt = Date.now();
    if (!editMode) return;
    var touch = e.touches[0];
    longPressTimer = setTimeout(function() {
      dragging = true;
      card.classList.add('drag');
      startDrag(card, tid, touch.clientX, touch.clientY);
    }, 180);
  }, {passive: true});

  card.addEventListener('touchmove', function(e) {
    if (!editMode) return;
    if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
    if (!dragging) return;
    e.preventDefault();
    moveDrag(e.touches[0].clientX, e.touches[0].clientY, card, tid);
  }, {passive: false});

  card.addEventListener('touchend', function() {
    if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
    if (dragging) {
      dragging = false;
      card.classList.remove('drag');
      snapCard(tid);
      saveData();
      return;
    }
    if (Date.now() - tapAt < 280) {
      if (editMode) openTableConfig(tid);
      else openTableModal(tid);
    }
  });

  card.addEventListener('mousedown', function(e) {
    if (!editMode) return;
    dragging = true;
    card.classList.add('drag');
    startDrag(card, tid, e.clientX, e.clientY);
    function onMove(ev) { moveDrag(ev.clientX, ev.clientY, card, tid); }
    function onUp(ev) {
      dragging = false;
      card.classList.remove('drag');
      snapCard(tid);
      saveData();
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  card.addEventListener('click', function() {
    if (editMode) openTableConfig(tid);
    else openTableModal(tid);
  });
}

function startDrag(card, tid, cx, cy) {
  var r = card.getBoundingClientRect();
  dragOffset = {x: cx - r.left, y: cy - r.top};
  dragPanelRect = document.getElementById('cv').getBoundingClientRect();
}
function moveDrag(cx, cy, card, tid) {
  if (!dragPanelRect) return;
  var panel = document.getElementById('cv');
  var W = panel.offsetWidth, H = panel.offsetHeight;
  var tb = S.tables.filter(function(t){ return t.id === tid; })[0];
  var sz = cardSize(tb ? tb.t : "4인", W, H);
  var nx = Math.max(0, Math.min(W - sz.w, cx - dragPanelRect.left - dragOffset.x));
  var ny = Math.max(0, Math.min(H - sz.h, cy - dragPanelRect.top  - dragOffset.y));
  card.style.left = nx + 'px';
  card.style.top  = ny + 'px';
  S.tables = S.tables.map(function(t) {
    return t.id === tid ? Object.assign({}, t, {px: nx/W*100, py: ny/H*100}) : t;
  });
  cardCache[tid] = '';
}
function snapCard(tid) {
  var panel = document.getElementById('cv');
  var W = panel.offsetWidth, H = panel.offsetHeight;
  var SNAP = Math.round(W * .04), GAP = Math.round(W * .015);
  var me = S.tables.filter(function(t){ return t.id === tid; })[0];
  if (!me) return;
  var sz = cardSize(me.t, W, H);
  var px = me.px / 100 * W, py = me.py / 100 * H;
  var xa = [0, W - sz.w], ya = [0, H - sz.h];
  S.tables.filter(function(t){ return t.id !== tid; }).forEach(function(t) {
    var s2 = cardSize(t.t, W, H);
    var ox = t.px/100*W, oy = t.py/100*H;
    xa.push(ox, ox + s2.w + GAP, ox + s2.w - sz.w);
    ya.push(oy, oy + s2.h + GAP, oy + s2.h - sz.h);
  });
  var bx = px, bdx = SNAP;
  xa.forEach(function(a){ var d = Math.abs(px-a); if (d < bdx){ bdx=d; bx=a; } });
  var by = py, bdy = SNAP;
  ya.forEach(function(a){ var d = Math.abs(py-a); if (d < bdy){ bdy=d; by=a; } });
  bx = Math.max(0, Math.min(W - sz.w, bx));
  by = Math.max(0, Math.min(H - sz.h, by));
  var card = document.getElementById('tc' + tid);
  if (card) {
    card.style.transition = 'left .18s ease, top .18s ease';
    card.style.left = bx + 'px';
    card.style.top  = by + 'px';
    setTimeout(function(){ if(card) card.style.transition = ''; }, 200);
  }
  S.tables = S.tables.map(function(t) {
    return t.id === tid ? Object.assign({}, t, {px: bx/W*100, py: by/H*100}) : t;
  });
}
function toggleEdit() {
  editMode = !editMode;
  var btn  = document.getElementById('bedit');
  var cv   = document.getElementById('cv');
  var hint = document.getElementById('ehint');
  S.tables.forEach(function(t){ cardCache[t.id] = ''; });
  if (editMode) {
    btn.textContent = '✅저장'; btn.classList.add('on');
    cv.classList.add('em'); hint.textContent = '드래그 이동 / 짧게 터치시 설정';
  } else {
    btn.textContent = '✏️배치'; btn.classList.remove('on');
    cv.classList.remove('em'); hint.textContent = '';
    saveData();
  }
  renderCanvas();
}

function openTableModal(tid) {
  if (editMode) return;
  var tb = S.tables.filter(function(t){ return t.id === tid; })[0];
  if (!tb) return;
  if (tb.linkTo) {
      var mainTb = S.tables.filter(function(t){ return t.id === tb.linkTo; })[0];
      if (mainTb) tb = mainTb;
  }
  gvFloor = tb.g || 2;
  if      (tb.st === 'occupied') showOccupied(tb);
  else if (tb.st === 'reserved') showReserved(tb);
  else                           showEmpty(tb);
}

function showEmpty(tb) {
  showModal(
    '<div class="md-hd"><span class="md-title">'+esc(tb.n)+' — 착석</span><button class="md-x" id="mxbtn">×</button></div>'
    + '<p style="font-size:13px;color:#64748b;margin-bottom:10px">인원을 선택하세요</p>'
    + '<div class="gbs" id="gcbs" style="margin-bottom:14px">'
    +   Array.from({length: Math.max(8, tb.c)}, function(_, i) {
          return '<button class="gb'+(i+1===gvFloor?' bl':'')+'" data-n="'+(i+1)+'">'+(i+1)+'</button>';
        }).join('')
    + '</div>'
    + '<div class="abs">'
    +   '<button class="ab" style="background:#3b82f6" id="bseat">착석</button>'
    +   '<button class="ab" style="background:#8b5cf6" id="bres2">예약 등록</button>'
    + '</div>'
  );
  bindGbs('gcbs', 'bl', function(n){ gvFloor = n; });
  document.getElementById('bseat').addEventListener('click', function() {
    S.tables = S.tables.map(function(t) {
      return t.id === tb.id
        ? Object.assign({}, t, {st:'occupied', g:gvFloor, seatTime:Date.now()})
        : t;
    });
    closeModal(); saveData(); renderAll();
  });
  document.getElementById('bres2').addEventListener('click', function() {
    closeModal(); openResModal(tb.id);
  });
}

function showOccupied(tb) {
  var c = tableColor(tb.st, tb.seatTime, false);
  var elapsed = Date.now() - tb.seatTime;
  
  var linked = S.tables.filter(function(t){ return t.linkTo === tb.id; });
  var linkHtml = '';
  if (linked.length > 0) {
      var names = linked.map(function(t){ return t.n; }).join(', ');
      linkHtml = '<div class="ir"><span class="il">연결된 단체석</span><span class="iv" style="color:#10b981">'+esc(names)+'</span></div>';
  }

  showModal(
    '<div class="md-hd"><span class="md-title">'+esc(tb.n)+' — 착석중</span><button class="md-x" id="mxbtn">×</button></div>'
    + '<div class="ib" style="background:'+c.bg+';border-color:'+c.bd+'">'
    + '<div class="ir"><span class="il">착석 인원</span><span class="iv" style="display:flex;align-items:center;gap:8px">'+esc(String(tb.g))+'명 <button class="bg" style="padding:4px 8px;min-height:0;font-size:12px" id="bmodg">수정</button></span></div>'
    + '<div class="ir"><span class="il">착석 시간</span><span class="iv">'+fmtTime(tb.seatTime)+'</span></div>'
    + '<div class="ir"><span class="il">경과</span>'
    +   '<span class="iv" style="color:'+(elapsed>5400000?'#ef4444':'#1e293b')+'">'+fmtElapsed(elapsed)+'</span>'
    + '</div>'
    + linkHtml
    + '</div>'
    + '<button class="bg" style="width:100%;margin-bottom:12px;border-color:#10b981;color:#10b981" id="blink">🔗 빈 테이블 추가로 붙이기 (단체)</button>'
    + '<button class="ab" style="background:#ef4444;width:100%" id="bclr">퇴석 처리</button>'
  );

  document.getElementById('bmodg').addEventListener('click', function() {
    var n = prompt('현재 착석 인원수를 입력하세요:', tb.g);
    if (n && !isNaN(n)) {
      S.tables = S.tables.map(function(t) { return t.id === tb.id ? Object.assign({}, t, {g: parseInt(n)}) : t; });
      saveData(); renderAll(); 
      setTimeout(function(){ showOccupied(S.tables.filter(function(t){return t.id===tb.id})[0]); }, 100);
    }
  });

  document.getElementById('blink').addEventListener('click', function() {
    closeModal();
    var avail = S.tables.filter(function(t){ return t.st === 'empty' && !t.linkTo && t.id !== tb.id; });
    if (!avail.length) { alert('붙일 수 있는 빈 테이블이 없습니다.'); return; }
    
    var html = avail.map(function(t){ 
      return '<button class="tpb" data-ltid="'+t.id+'">'+esc(t.n)+' (최대 '+t.c+'인)</button>'; 
    }).join('');
    
    showModal('<div class="md-hd"><span class="md-title">어떤 테이블을 붙일까요?</span><button class="md-x" id="mxbtn">×</button></div><div style="display:flex;flex-direction:column;gap:8px">'+html+'</div>');
    
    document.getElementById('mdc').querySelectorAll('.tpb[data-ltid]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var ltid = +this.getAttribute('data-ltid');
        S.tables = S.tables.map(function(t) { 
          return t.id === ltid ? Object.assign({}, t, {st:'occupied', g:0, seatTime: tb.seatTime, linkTo: tb.id}) : t; 
        });
        saveData(); renderAll(); openTableModal(tb.id);
      });
    });
  });

  document.getElementById('bclr').addEventListener('click', function() {
    S.tables = S.tables.map(function(t) {
      if (t.id === tb.id || t.linkTo === tb.id) {
        return Object.assign({}, t, {st:'empty', g:0, seatTime:null, res:null, linkTo:null});
      }
      return t;
    });
    closeModal(); saveData(); renderAll();
  });
}

    S.tables = S.tables.map(function(t) {
      return t.id === activeResTableId
        ? Object.assign({}, t, {st:'reserved', res:resObj})

    });
    S.ress.push({
      id:    uid(),
      nm:    nm,
      phone: phone,

      st:    'confirmed',

    closeModal(); saveData(); renderAll();
  });
}

// ── 예약 관리 탭 ──────────────────────────────────────────
function renderReservations() { renderCal(); renderRvList(); }

function renderCal() {
  document.getElementById('calm').textContent = calY + '년 ' + (calM+1) + '월';
  var firstDow = new Date(calY, calM, 1).getDay();
  var daysInMonth = new Date(calY, calM+1, 0).getDate();
  var td = today();
  var dots = {};
  S.ress.filter(function(r){ return r.st !== 'cancelled' && r.date; })
        .forEach(function(r){ dots[r.date] = 1; });
  var html = '';
  for (var i = 0; i < firstDow; i++) html += '<div class="cd other"></div>';
  for (var d = 1; d <= daysInMonth; d++) {
    var s   = calY + '-' + pad(calM+1) + '-' + pad(d);
    var dow = (firstDow + d - 1) % 7;
    var cls = 'cd'
      + (dow === 0 ? ' sun' : dow === 6 ? ' sat' : '')
      + (s === td && s !== calSel ? ' today' : '')
      + (s === calSel ? ' sel' : '');
    html += '<div class="'+cls+'" data-d="'+s+'">'+d+(dots[s]?'<div class="dot"></div>':'')+'</div>';
  }
  document.getElementById('calg').innerHTML = html;
  document.getElementById('calg').querySelectorAll('.cd').forEach(function(el) {
    el.addEventListener('click', function() {
      var d = this.getAttribute('data-d');
      if (!d) return;
      calSel = (calSel === d) ? null : d;
      renderCal(); renderRvList();
    });
  });
}

function renderRvList() {
  var q = (document.getElementById('rvsrch').value || '').trim().toLowerCase();
  var list = S.ress.filter(function(r){ return r.st !== 'cancelled'; });
  if (calSel) list = list.filter(function(r){ return r.date === calSel; });
  if (q) list = list.filter(function(r){
    return (r.nm||'').toLowerCase().indexOf(q) >= 0 || (r.phone||'').indexOf(q) >= 0;
  });
  list.sort(function(a, b) {
    return ((a.date||'9999')+(a.time||'99:99')) < ((b.date||'9999')+(b.time||'99:99')) ? -1 : 1;
  });
  document.getElementById('rvtitle').textContent = calSel ? dlabel(calSel)+' 예약' : '전체 예약';
  document.getElementById('rvcnt').textContent   = list.length + '건';
  var sm = {
    confirmed: ['#10b981','#ecfdf5','확정'],
    pending:   ['#f59e0b','#fffbeb','대기'],
    arrived:   ['#3b82f6','#eff6ff','방문'],
    noshow:    ['#ef4444','#fef2f2','노쇼']
  };
  document.getElementById('rvlist').innerHTML = list.length
    ? list.map(function(r) {
        var s = sm[r.st||'confirmed'] || sm.confirmed;
        return '<div class="rvi" data-rid="'+esc(String(r.id))+'">'
          + '<div class="rvi-t">'+esc(r.time||'-:-')+'</div>'
          + '<div class="rvi-b">'
          +   '<div class="rvi-n">'+esc(r.nm)+'</div>'
          +   '<div class="rvi-s">'+(r.date ? dlabel(r.date)+' ' : '')+esc(String(r.g))+'명'+(r.phone?' · '+esc(r.phone):'')+'</div>'
          +   renderTagChips(r.tags)
          +   (r.memo ? '<div class="rvi-m">📝'+esc(r.memo)+'</div>' : '')
          + '</div>'
          + '<div class="rvi-st" style="color:'+s[0]+';background:'+s[1]+'">'+s[2]+'</div>'
          + '</div>';
      }).join('')
    : '<div style="padding:24px;text-align:center;color:#cbd5e1;font-size:13px">예약 없음</div>';

  document.getElementById('rvlist').querySelectorAll('.rvi').forEach(function(el) {
    el.addEventListener('click', function() { openRvDetail(this.getAttribute('data-rid')); });
  });
}

function openRvDetail(rid) {
  var r = S.ress.filter(function(x){ return x.id == rid; })[0];

  var sm  = {confirmed:'확정', pending:'대기', arrived:'방문', noshow:'노쇼', cancelled:'취소'};
  var sc  = {confirmed:['#10b981','#ecfdf5'], pending:['#f59e0b','#fffbeb'], arrived:['#3b82f6','#eff6ff'], noshow:['#ef4444','#fef2f2']};
  showModal(
    '<div class="md-hd"><span class="md-title">'+esc(r.nm)+' 예약</span><button class="md-x" id="mxbtn">×</button></div>'

    + '<div class="ir"><span class="il">시간</span><span class="iv">'+esc(r.time)+'</span></div>'
    + '<div class="ir"><span class="il">인원</span><span class="iv">'+esc(String(r.g))+'명</span></div>'

        return '<button style="flex:1;padding:8px 0;border:none;border-radius:8px;background:'+(sc[s]?sc[s][1]:'#f1f5f9')+';color:'+(sc[s]?sc[s][0]:'#64748b')+';font-weight:700;font-size:12px;cursor:pointer" data-st="'+s+'">'+sm[s]+'</button>';

    + '</div>'
    + '<div class="abs">'
    +   '<button class="ab" style="background:#6366f1" id="bedit2">✏️ 수정</button>'
    +   '<button class="ab" style="background:#ef4444" id="bcanc">삭제</button>'
    + '</div>'
  );
  document.getElementById('mdc').querySelectorAll('[data-st]').forEach(function(btn) {
    btn.addEventListener('click', function() {

      saveData(); closeModal(); renderReservations();
    });
  });
  document.getElementById('bedit2').addEventListener('click', function() {
    closeModal(); openEditRv(rid);
  });
  document.getElementById('bcanc').addEventListener('click', function() {
    if (!confirm('예약을 삭제할까요?')) return;
    S.ress = S.ress.filter(function(x){ return x.id != rid; });

    + '<div class="fg"><label class="fl">방문 목적 및 메뉴</label><div class="tags" id="evtags">'+renderTagBtns(gvTags)+'</div></div>'
    + '<div class="fg"><label class="fl">메모</label><textarea class="fi" id="evm">'+esc(r.memo||'')+'</textarea></div>'
    + '<div class="fg"><label class="fl">상태</label>'
    +   '<select class="fi" id="evs">'
    +     ['confirmed','pending','arrived','noshow'].map(function(s) {
            return '<option value="'+s+'"'+(r.st===s?' selected':'')+'>'+{confirmed:'확정',pending:'대기',arrived:'방문',noshow:'노쇼'}[s]+'</option>';
          }).join('')
    +   '</select>'
    + '</div>'
    + '<button class="ab" style="background:#10b981;width:100%" id="evsubmit">저장</button>'
    + '</div>', 'md-lg'
  );
  bindGbs('rvgbs', 'gr', function(n){ gvRvEdit = n; });
  bindTags('evtags');
  document.getElementById('evsubmit').addEventListener('click', function() {
    var nm = document.getElementById('evn').value.trim();
    var d  = document.getElementById('evd').value;
    var t  = document.getElementById('evt').value;
    if (!nm || !d || !t) { alert('이름, 날짜, 시간은 필수입니다'); return; }
    
    var pVal = document.getElementById('evp').value.trim();
    var finalPhone = pVal ? '010-' + pVal : '';

    S.ress = S.ress.map(function(x) {
      return x.id == rid
        ? Object.assign({}, x, {nm:nm, phone:finalPhone, date:d, time:t, g:gvRvEdit, tags:gvTags.slice(), memo:document.getElementById('evm').value, st:document.getElementById('evs').value})
        : x;
    });
    closeModal(); saveData(); renderReservations();
  });
}

// ── 초기화 ────────────────────────────────────────────────
function confirmReset() {
  showModal(
    '<div class="md-hd"><span class="md-title">전체 초기화</span><button class="md-x" id="mxbtn">×</button></div>'
    + '<p style="font-size:13px;color:#64748b;margin-bottom:14px;line-height:1.7">모든 착석·대기 정보가 삭제됩니다.<br>예약 목록과 배치는 유지됩니다.</p>'
    + '<div class="abs">'
    +   '<button class="ab" style="background:#94a3b8" id="bno">취소</button>'
    +   '<button class="ab" style="background:#ef4444" id="byes">초기화</button>'
    + '</div>'
  );
  document.getElementById('bno').addEventListener('click', closeModal);
  document.getElementById('byes').addEventListener('click', function() {
    S.tables = S.tables.map(function(t) {
      return Object.assign({}, t, {st:'empty', g:0, seatTime:null, res:null, linkTo:null});
    });
    S.waits = [];
    S.tables.forEach(function(t){ cardCache[t.id] = ''; });
    closeModal(); saveData(); renderAll();
  });
}

// ── 모달 ──────────────────────────────────────────────────
function showModal(html, sizeClass) {
  var mdc = document.getElementById('mdc');
  mdc.className = 'md' + (sizeClass ? ' ' + sizeClass : '');
  mdc.innerHTML = html;
  document.getElementById('mo').classList.add('on');
  var xbtn = document.getElementById('mxbtn');
  if (xbtn) xbtn.addEventListener('click', closeModal);
}
function closeModal() {
  document.getElementById('mo').classList.remove('on');
  document.getElementById('mdc').innerHTML = '';
}

// ── 인원 버튼 헬퍼 ────────────────────────────────────────
function bindGbs(containerId, activeClass, cb) {
  var container = document.getElementById(containerId);
  if (!container) return;
  container.querySelectorAll('.gb').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var n = +this.getAttribute('data-n');
      container.querySelectorAll('.gb').forEach(function(b){ b.className = 'gb'; });
      this.className = 'gb ' + activeClass;
      cb(n);
    });
  });
}

// ── 전체 렌더 ─────────────────────────────────────────────
function renderAll() {
  renderHeader();
  renderCanvas();
  renderWaitList();
  renderStats();
}

// ── 이벤트 바인딩 ─────────────────────────────────────────
document.getElementById('t1').addEventListener('click', function(){ switchTab('floor'); });
document.getElementById('t2').addEventListener('click', function(){ switchTab('reserve'); });
document.getElementById('bedit').addEventListener('click', toggleEdit);
document.getElementById('breset').addEventListener('click', confirmReset);
document.getElementById('bwait').addEventListener('click', openWaitModal);
document.getElementById('baddRv').addEventListener('click', openAddRv);

document.getElementById('bcalp').addEventListener('click', function() {
  calM--;
  if (calM < 0) { calM = 11; calY--; }
  renderCal(); renderRvList();
});
document.getElementById('bcaln').addEventListener('click', function() {
  calM++;
  if (calM > 11) { calM = 0; calY++; }
  renderCal(); renderRvList();
});
document.getElementById('rvsrch').addEventListener('input', renderRvList);

document.getElementById('mo').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.getElementById('mo').addEventListener('touchend', function(e) {
  if (e.target === this) closeModal();
});

// ── 부트 ──────────────────────────────────────────────────
loadData();
if (!S.tables.length) S.tables = INIT_TABLES.map(makeTable);
renderAll();

setInterval(function() {
  if (currentTab === 'floor') {
    renderCanvas();
    renderWaitList();
    renderStats();
    renderHeader();
  }
}, 1000);

window.addEventListener('resize', function() {
  S.tables.forEach(function(t){ cardCache[t.id] = ''; });
  renderCanvas();
});

document.addEventListener('visibilitychange', function() {
  if (document.hidden) localStorage.setItem(STORAGE_KEY, JSON.stringify(S));
});
</script>
</body>
</html>
