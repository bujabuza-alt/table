<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0f0e0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="류마">
<title>류마 관리</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
:root {
  --bg:#0f0e0d; --surf:#1c1a18; --surf2:#252320; --surf3:#2e2b27;
  --border:rgba(255,255,255,.08); --border2:rgba(255,255,255,.14);
  --text:#f0ebe3; --text2:#8a8070; --text3:#5a5248;
  --red:#c41230; --red2:#e8162c; --amber:#c8922a;
  --green:#2a9a5a; --blue:#2a72c8; --indigo:#5a52c8;
}
/* 라이트 모드 */
body.light {
  --bg:#f5f3f0; --surf:#ffffff; --surf2:#f0ede8; --surf3:#e8e4de;
  --border:rgba(0,0,0,.08); --border2:rgba(0,0,0,.14);
  --text:#1a1816; --text2:#6b6458; --text3:#a09880;
  --red:#c41230; --red2:#e8162c; --amber:#b07818;
  --green:#1a7a42; --blue:#1a5aaa; --indigo:#4840b0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
/* 라이트모드 전용 오버라이드 */
body.light #cv { background:#ffffff; }
body.light .tc { box-shadow:0 1px 6px rgba(0,0,0,.1); }
body{font-family:-apple-system,'Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;position:fixed;width:100%;height:100%;}

/* 매장선택 화면 */
#sel{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;}
.sel-logo{width:120px;height:120px;object-fit:contain;opacity:.85;margin-bottom:14px;}
.sel-brand{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.28em;text-transform:uppercase;margin-bottom:40px;}
.sel-step{width:100%;max-width:310px;}
.sel-label{font-size:16px;color:var(--text2);font-weight:700;text-align:center;margin-bottom:16px;}
.sel-store-btn{width:100%;padding:20px 22px;margin-bottom:12px;border-radius:14px;border:1px solid var(--border2);background:var(--surf);color:var(--text);font-size:17px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-family:inherit;}
.sel-store-btn:active{background:var(--surf3);}
.sel-store-icon{font-size:12px;color:var(--text3);}

/* 비밀번호 화면 */
.pw-form{width:100%;max-width:310px;display:flex;flex-direction:column;align-items:center;}
.pw-store-name{font-size:20px;font-weight:800;color:var(--text);margin-bottom:4px;}
.pw-sub{font-size:12px;color:var(--text3);margin-bottom:22px;letter-spacing:.06em;}
.pw-input{width:100%;padding:15px 16px;background:var(--surf);border:1px solid var(--border2);border-radius:12px;color:var(--text);font-size:20px;letter-spacing:.18em;outline:none;font-family:inherit;-webkit-appearance:none;transition:border-color .15s;margin-bottom:12px;}
.pw-input:focus{border-color:var(--red);}
.pw-input::placeholder{letter-spacing:.06em;font-size:13px;color:var(--text3);}
.pw-btn{width:100%;padding:15px;background:var(--red);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;}
.pw-btn:active{opacity:.85;}
.pw-err{font-size:12px;color:var(--red2);text-align:center;margin-top:10px;min-height:18px;}
.sel-back{background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer;padding:14px;font-family:inherit;margin-top:2px;}

/* 메인 레이아웃 */
#wrap{display:flex;flex-direction:column;width:100%;height:100%;}
#hd{flex-shrink:0;background:var(--surf);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;align-items:center;justify-content:space-between;gap:6px;}
.hd-left{display:flex;align-items:center;gap:9px;flex-shrink:0;}
.hd-logo{width:28px;height:28px;object-fit:contain;opacity:.9;flex-shrink:0;}
.hd-title{font-weight:800;font-size:14px;color:var(--text);}
.hd-date{font-size:10px;color:var(--text3);margin-top:1px;}
.hd-right{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.chip{border-radius:99px;padding:3px 8px;font-size:10px;font-weight:700;border:1px solid;white-space:nowrap;}
#badge{font-size:11px;font-weight:600;white-space:nowrap;color:transparent;}
#tb{flex-shrink:0;background:var(--surf);border-bottom:1px solid var(--border);display:flex;padding:0 12px;gap:2px;}
.tab{padding:10px 14px;border:none;background:none;font-size:13px;font-weight:700;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit;}
.tab.on{color:var(--red2);border-bottom-color:var(--red2);}
#body{flex:1;display:flex;overflow:hidden;min-height:0;}

/* 사이드바 */
#sb{width:156px;flex-shrink:0;background:var(--surf);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sb-head{flex-shrink:0;padding:8px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.sb-title{font-weight:700;font-size:11px;color:var(--text3);letter-spacing:.06em;}
.sb-add{background:var(--red);color:#fff;border:none;border-radius:6px;padding:5px 9px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;}
.sb-sec{flex-shrink:0;padding:5px 10px 3px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:2;}
.sb-sec-t{font-size:9px;font-weight:800;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;}
.sb-sec-c{font-size:9px;color:var(--text3);}
#sb-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.ri{padding:8px 10px;border-bottom:1px solid var(--border);cursor:pointer;}
.ri:active{background:var(--surf2);}
.ri-top{display:flex;align-items:center;justify-content:space-between;gap:4px;}
.ri-time{font-size:11px;font-weight:800;color:var(--red);background:rgba(196,18,48,.12);border-radius:5px;padding:2px 5px;flex-shrink:0;}
.ri-name{font-weight:700;font-size:13px;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ri-g{font-size:11px;color:var(--text2);flex-shrink:0;}
.ri-sub{font-size:10px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:4px;}
.ri-tbl{color:var(--blue);font-weight:700;}
.ri-dot{display:inline-block;width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.di{padding:7px 10px;border-bottom:1px solid var(--border);}
.di-top{display:flex;align-items:center;justify-content:space-between;gap:4px;}
.di-badge{font-size:9px;font-weight:700;border-radius:4px;padding:1px 5px;flex-shrink:0;}
.di-name{font-weight:700;font-size:12px;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.di-g{font-size:10px;color:var(--text3);flex-shrink:0;}
.di-sub{font-size:10px;color:var(--text3);margin-top:2px;}
.wi{padding:8px 10px;border-bottom:1px solid var(--border);cursor:pointer;}
.wi:active{background:var(--surf2);}
.wi-top{display:flex;align-items:center;justify-content:space-between;}
.wi-num{width:16px;height:16px;border-radius:50%;background:rgba(196,18,48,.18);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:var(--red2);flex-shrink:0;}
.wi-name{font-weight:700;font-size:13px;color:var(--text);margin-left:5px;}
.wi-g{font-size:11px;color:var(--text2);}
.wi-sub{font-size:10px;color:var(--text3);margin-top:2px;}
.wi-memo{font-size:10px;color:var(--text3);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.wi-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px;}
.wi-tag{font-size:9px;padding:1px 5px;border-radius:99px;background:rgba(196,18,48,.1);color:var(--red);font-weight:700;}
.sb-empty{padding:14px 10px;text-align:center;color:var(--text3);font-size:11px;}

/* 메인 */
#main{flex:1;min-width:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px;display:flex;flex-direction:column;}
#rv{flex:1;min-width:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px;display:none;flex-direction:column;gap:10px;}
#rv.on{display:flex;}
#leg{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center;}
.ld{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--text3);}
.lc{width:7px;height:7px;border-radius:2px;flex-shrink:0;}
#cv{background:var(--surf);border-radius:12px;border:1px solid var(--border);position:relative;width:100%;overflow:hidden;}
/* 테이블 묶기 */
.merge-chip{display:inline-flex;align-items:center;gap:4px;background:rgba(90,82,200,.15);border:1px solid rgba(90,82,200,.3);border-radius:99px;padding:3px 8px;font-size:11px;font-weight:700;color:#a78bfa;}
.merge-badge{position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:var(--indigo);color:#fff;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;}
/* 리스트 뷰 */
#listview{display:none;flex-direction:column;gap:6px;}
#listview.on{display:flex;}
.lv-item{background:var(--surf);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;position:relative;overflow:hidden;}
.lv-item:active{opacity:.85;}
.lv-bar{width:4px;border-radius:2px;flex-shrink:0;align-self:stretch;}
.lv-name{font-weight:800;font-size:15px;color:var(--text);flex-shrink:0;min-width:42px;}
.lv-type{font-size:10px;color:var(--text3);background:var(--surf2);border-radius:99px;padding:2px 7px;flex-shrink:0;}
.lv-info{flex:1;min-width:0;}
.lv-status{font-weight:700;font-size:13px;}
.lv-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.lv-time{font-weight:700;font-size:13px;flex-shrink:0;text-align:right;}
.lv-edit-btns{display:flex;gap:6px;flex-shrink:0;}
.lv-edit-btn{border:none;border-radius:7px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
#cvi{position:absolute;inset:0;overflow:hidden;}
#edbanner{display:none;position:absolute;top:0;left:0;right:0;background:rgba(196,18,48,.1);border-bottom:2px dashed var(--red);padding:6px;font-size:11px;color:var(--red);font-weight:700;text-align:center;z-index:5;}
#cv.em #edbanner{display:block;}
#cv.em{border:2px dashed var(--red);}
.tc{position:absolute;border-radius:10px;border:1.5px solid;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden;cursor:pointer;box-shadow:0 1px 6px rgba(0,0,0,.12);}
.tc.drag{opacity:.85;z-index:50;box-shadow:0 8px 28px rgba(0,0,0,.5);}
.tc-hd{display:flex;justify-content:space-between;align-items:flex-start;width:100%;}
.tc-name{font-weight:800;font-size:12px;line-height:1.2;}
.tc-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:2px;}
.tc-info{display:flex;flex-direction:column;gap:1px;}
.tc-info-row{font-size:10px;font-weight:700;line-height:1.25;}
.tc-info-sub{font-size:9px;font-weight:500;opacity:.8;line-height:1.2;}
.tc-badge{display:inline-flex;align-items:center;gap:3px;border-radius:4px;padding:2px 5px;font-size:9px;font-weight:700;background:rgba(0,0,0,.1);}
.tc-bar-r{display:flex;flex-direction:column;align-items:flex-end;gap:1px;}
#stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px;}
.sc{background:var(--surf);border-radius:10px;padding:9px 10px;border:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.si{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.sl{font-size:9px;color:var(--text3);}
.sv{font-weight:800;font-size:14px;margin-top:1px;}

/* 버튼 공통 */
.bp{background:var(--red);color:#fff;border:none;border-radius:7px;padding:6px 11px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.bp:active{opacity:.85;}
.bg{background:var(--surf2);border:1px solid var(--border2);border-radius:7px;padding:5px 10px;font-size:12px;color:var(--text2);cursor:pointer;font-weight:600;font-family:inherit;}
.be{background:var(--indigo);color:#fff;border:none;border-radius:7px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.be.on{background:var(--red);}

/* 예약탭 */
.rv-top{display:flex;align-items:center;gap:8px;}
.rv-srch{flex:1;padding:9px 12px;border:1px solid var(--border2);border-radius:10px;font-size:14px;outline:none;-webkit-appearance:none;font-family:inherit;background:var(--surf);color:var(--text);}
.rv-srch:focus{border-color:var(--red);}
.rv-srch::placeholder{color:var(--text3);}
#cal{background:var(--surf);border-radius:12px;border:1px solid var(--border);padding:12px;}
.cal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.cal-m{font-weight:800;font-size:14px;color:var(--text);}
.cal-nav{background:var(--surf2);border:1px solid var(--border2);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--text2);}
.cal-g{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-dow{text-align:center;font-size:10px;font-weight:700;color:var(--text3);padding:3px 0;}
.cal-dow:first-child{color:var(--red);}
.cal-dow:last-child{color:var(--blue);}
.cd{text-align:center;padding:4px 2px;border-radius:6px;font-size:12px;cursor:pointer;min-height:28px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;color:var(--text2);}
.cd.today{background:rgba(196,18,48,.12);color:var(--red2);font-weight:800;}
.cd.sel{background:var(--red);color:#fff;font-weight:800;}
.cd.sel .dot{background:rgba(255,255,255,.7);}
.cd.other{color:var(--text3);}
.cd.sun{color:var(--red);}
.cd.sat{color:var(--blue);}
.cd.sel.sun,.cd.sel.sat{color:#fff;}
.dot{width:4px;height:4px;border-radius:50%;background:var(--red);}
#rvw{background:var(--surf);border-radius:12px;border:1px solid var(--border);overflow:hidden;}
.rvw-hd{padding:11px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.rvw-title{font-weight:800;font-size:14px;color:var(--text);}
.rvi{padding:11px 13px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:flex-start;gap:9px;}
.rvi:last-child{border-bottom:none;}
.rvi-t{background:rgba(196,18,48,.12);color:var(--red2);border-radius:6px;padding:4px 7px;font-size:12px;font-weight:800;flex-shrink:0;min-width:46px;text-align:center;}
.rvi-b{flex:1;min-width:0;}
.rvi-n{font-weight:700;font-size:14px;color:var(--text);}
.rvi-s{font-size:11px;color:var(--text2);margin-top:1px;}
.rvi-m{font-size:11px;color:var(--text3);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rvi-st{font-size:11px;font-weight:700;border-radius:5px;padding:2px 6px;flex-shrink:0;}
.rvi-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px;}
.rvi-tag{font-size:10px;padding:1px 6px;border-radius:99px;background:rgba(196,18,48,.1);color:var(--red);font-weight:700;}
.rvi.past{opacity:.5;}
.rv-sec-lbl{padding:6px 13px 5px;font-size:10px;font-weight:800;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;background:var(--bg);border-bottom:1px solid var(--border);}

/* 모달 */
#mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;align-items:center;justify-content:center;padding:16px;overflow-y:auto;}
#mo.on{display:flex;}
.md{background:var(--surf);border-radius:16px;padding:18px 18px 16px;width:100%;max-width:360px;border:1px solid var(--border2);box-shadow:0 24px 64px rgba(0,0,0,.6);}
.md-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.md-title{font-weight:800;font-size:16px;color:var(--text);}
.md-x{background:var(--surf3);border:none;border-radius:50%;width:30px;height:30px;font-size:16px;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;}
.mb{display:flex;flex-direction:column;gap:11px;}
.ib{border-radius:11px;border:1px solid;padding:12px 14px;margin-bottom:12px;}
.ir{display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px;}
.ir:last-child{margin-bottom:0;}
.il{color:var(--text2);}
.iv{font-weight:700;color:var(--text);}
.gbs{display:flex;gap:6px;flex-wrap:wrap;}
.gb{width:42px;height:42px;border-radius:9px;border:1.5px solid var(--border2);background:var(--surf2);color:var(--text2);font-weight:800;font-size:15px;cursor:pointer;font-family:inherit;}
.gb.bl{border-color:var(--blue);background:rgba(42,114,200,.15);color:#60a5fa;}
.gb.pu{border-color:var(--indigo);background:rgba(90,82,200,.15);color:#a78bfa;}
.gb.gr{border-color:var(--green);background:rgba(42,154,90,.15);color:#4ade80;}
.abs{display:flex;gap:7px;}
.ab{flex:1;padding:12px 0;border:none;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;color:#fff;font-family:inherit;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fl{font-size:12px;color:var(--text2);}
.fi{width:100%;padding:9px 11px;border:1px solid var(--border2);border-radius:9px;font-size:14px;outline:none;-webkit-appearance:none;font-family:inherit;background:var(--surf2);color:var(--text);}
.fi:focus{border-color:var(--red);}
textarea.fi{resize:none;min-height:60px;}
.tpb{padding:11px 13px;background:var(--surf2);border:1px solid var(--border2);border-radius:10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:700;width:100%;color:var(--text);font-family:inherit;}
.tps{color:var(--text3);font-size:12px;font-weight:500;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.phone-wrap{display:flex;align-items:center;border:1px solid var(--border2);border-radius:9px;overflow:hidden;background:var(--surf2);}
.phone-wrap:focus-within{border-color:var(--red);}
.phone-pfx{padding:9px 0 9px 11px;font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;flex-shrink:0;}
.phone-sep{padding:9px 2px;font-size:14px;color:var(--text3);flex-shrink:0;}
.phone-inp{flex:1;padding:9px 11px 9px 3px;border:none;outline:none;font-size:14px;font-family:inherit;background:transparent;color:var(--text);min-width:0;-webkit-appearance:none;}
.tag-picker{display:flex;flex-wrap:wrap;gap:6px;}
.tag-pill{padding:5px 11px;border-radius:99px;border:1px solid var(--border2);background:var(--surf2);color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;}
.tag-pill.on{border-color:var(--red);background:rgba(196,18,48,.12);color:var(--red2);}
.tag-add-btn{padding:5px 11px;border-radius:99px;border:1px dashed var(--border2);background:transparent;color:var(--text3);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.divider{height:1px;background:var(--border);margin:8px 0;}
.shape-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.shape-btn{border:1.5px solid var(--border2);background:var(--surf2);border-radius:9px;cursor:pointer;padding:10px 6px;display:flex;flex-direction:column;align-items:center;gap:5px;font-family:inherit;}
.shape-btn.on{border-color:var(--red);background:rgba(196,18,48,.1);}
.shape-preview{background:var(--border2);border-radius:4px;}
.shape-label{font-size:10px;font-weight:700;color:var(--text2);}
.shape-btn.on .shape-label{color:var(--red2);}
.size-row{display:flex;gap:7px;}
.size-btn{flex:1;border:1.5px solid var(--border2);background:var(--surf2);border-radius:9px;cursor:pointer;padding:10px 6px;display:flex;flex-direction:column;align-items:center;gap:4px;font-family:inherit;}
.size-btn.on{border-color:var(--red);background:rgba(196,18,48,.1);}
.size-label{font-size:11px;font-weight:700;color:var(--text2);}
.size-sub{font-size:9px;color:var(--text3);}
.size-btn.on .size-label{color:var(--red2);}
.ss-label{font-size:10px;font-weight:800;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:9px;}
/* ====== 가로모드 대응 ====== */
@media (orientation:landscape) and (max-height:500px) {
  #hd{padding:4px 10px;}
  .hd-date{display:none;}
  .tab{padding:6px 12px;}
  #main{padding:6px;}
  #leg{margin-bottom:4px;}
  #stats{margin-top:6px;}
  .sc{padding:6px 8px;}
  .sl{display:none;}
}
/* ====== 아이패드 가로모드 대응 ====== */
@media (orientation:landscape) and (min-height:501px) {
  #hd{padding:5px 12px;}
  .hd-date{display:none;}
  .tab{padding:7px 12px;}
  #main{padding:6px 10px;}
  #rv{padding:6px 10px;}
  #leg{margin-bottom:6px;}
  #stats{margin-top:6px;}
  #sb{width:176px;}
}
/* ====== 네이버 예약 가져오기 ====== */
.nv-upload-area{border:2px dashed var(--border2);border-radius:12px;padding:20px 16px;text-align:center;cursor:pointer;background:var(--surf2);transition:border-color .15s;}
.nv-upload-area.has-img{border-style:solid;border-color:var(--green);}
.nv-upload-label{font-size:13px;color:var(--text3);margin-bottom:4px;}
.nv-upload-hint{font-size:11px;color:var(--text3);}
.nv-preview{width:100%;border-radius:8px;margin-top:10px;max-height:200px;object-fit:contain;display:none;}
.nv-preview.on{display:block;}
.nv-status{font-size:12px;text-align:center;min-height:18px;margin-top:8px;color:var(--text2);}
.nv-parsed-box{background:var(--surf2);border:1px solid var(--border2);border-radius:10px;padding:10px 12px;margin-bottom:10px;}
.nv-parsed-row{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:12px;border-bottom:1px solid var(--border);}
.nv-parsed-row:last-child{border-bottom:none;}
.nv-parsed-lbl{color:var(--text3);width:64px;flex-shrink:0;font-size:11px;}
.nv-parsed-val{color:var(--text);font-weight:600;flex:1;}

  var pw    = document.getElementById('pw-input').value;
  fbDb.ref('tableApp/config/' + store + 'Pw').once('value').then(function(snap) {
    var stored = snap.val() || DEFAULT_PW[store];

      saveAuth(store);
      doEnter(store);
    } else { document.getElementById('pw-err').textContent = '비밀번호가 틀렸습니다'; }
  }).catch(function() {
    if (pw === DEFAULT_PW[store]) { saveAuth(store); doEnter(store); }
    else { document.getElementById('pw-err').textContent = '비밀번호가 틀렸습니다'; }

function initTheme() {

function saveAuth(store) {
  try { localStorage.setItem('ryuma_auth', JSON.stringify({store:store})); } catch(e) {}
}
function doEnter(store) {
  currentStore = store;
  STORAGE_KEY  = 'tv5_' + store;
  if (fbRef) fbRef.off();
  fbRef = null;
  lastSavedTs = 0;  // 매장 전환 시 반드시 초기화
  fbRef = fbDb.ref('tableApp/' + store);
  S = {tables:[],waits:[],ress:[],tags:[],daily:[]};
  cardCache = {};
  document.getElementById('cvi').innerHTML = '';
  editMode = false;
  calY = new Date().getFullYear();
  calM = new Date().getMonth();
  calSel = null;

  document.getElementById('hd-store').textContent = STORE_NAMES[store];
  document.getElementById('bedit').textContent = '✏️';
  document.getElementById('bedit').classList.remove('on');
  document.getElementById('sel').style.display  = 'none';
  document.getElementById('wrap').style.display = '';

  // 로딩 표시
  showBadge('saving');
  document.getElementById('badge').textContent = '불러오는 중…';

  // ── 새 경로(tableApp/store) 확인 후 비어있으면 구버전(tableApp) 마이그레이션 ──
  fbRef.once('value').then(function(newSnap) {
    var newData = newSnap.val();

    function applyData(d) {
      if (d && d.tables && d.tables.length) S.tables = d.tables;
      if (d && d.waits)  S.waits = d.waits;
      if (d && d.ress)   S.ress  = d.ress;
      if (d && d.daily)  S.daily = d.daily;
      if (d && d.tags && d.tags.length) S.tags = d.tags;
    }

    function boot() {
      // ── localStorage 구버전 키(tv5)도 확인 ──
      try {
        var oldLocal = JSON.parse(localStorage.getItem('tv5') || 'null');
        if (oldLocal && oldLocal.tables && oldLocal.tables.length && !S.tables.length) {
          // localStorage 구버전 데이터 발견 → 적용 후 Firebase에 저장
          applyData(oldLocal);
          fbRef.set({
            tables: S.tables, waits: S.waits, ress: S.ress,
            tags: S.tags, daily: S.daily, _ts: Date.now()
          }).then(function() {
            localStorage.removeItem('tv5'); // 구버전 키 정리
            console.log('localStorage 마이그레이션 완료: tv5 → tv5_' + store);
          });
        }
      } catch(e) {}

      // 새 키로 저장된 localStorage도 병합
      loadData();
      var init = store === 'covent' ? INIT_COVENT : INIT_PARAGON;
      if (!S.tables.length) S.tables = init.map(mkTable);
      if (!S.daily) S.daily = [];
      if (!S.tags || !S.tags.length) S.tags = DEFAULT_TAGS.slice();
      showBadge('');
      syncToday();
      renderAll();
      startFb();
    }

    if (newData && newData.tables && newData.tables.length) {
      // 새 경로(tableApp/store)에 데이터 있음 → 바로 사용
      applyData(newData);
      boot();
    } else {
      // 새 경로 비어있음 → Firebase 구버전(tableApp 루트) 확인
      fbDb.ref('tableApp').once('value').then(function(oldSnap) {
        var oldFb = oldSnap.val();
        // 구버전은 tables 배열이 tableApp 바로 아래에 있음
        if (oldFb && oldFb.tables && oldFb.tables.length) {
          applyData(oldFb);
          fbRef.set({
            tables: S.tables, waits: S.waits, ress: S.ress,
            tags: S.tags, daily: S.daily, _ts: Date.now()
          }).then(function() {
            console.log('Firebase 마이그레이션 완료: tableApp → tableApp/' + store);
          });
        }
        boot();
      }).catch(function() { boot(); });
    }
  }).catch(function() {
    loadData();
    var init = store === 'covent' ? INIT_COVENT : INIT_PARAGON;
    if (!S.tables.length) S.tables = init.map(mkTable);
    if (!S.daily) S.daily = [];
    if (!S.tags || !S.tags.length) S.tags = DEFAULT_TAGS.slice();
    showBadge('');
    syncToday(); renderAll(); startFb();
  });
}
function logout() {
  if (fbRef) { fbRef.off(); fbRef = null; }
  currentStore = null;
  S = {tables:[],waits:[],ress:[],tags:[],daily:[]};
  cardCache = {};

}

// ── Firebase ──
function loadData() {
  try {
    var d = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    if (d.tables && d.tables.length) S.tables = d.tables;
    if (d.waits)  S.waits = d.waits;
    if (d.ress)   S.ress  = d.ress;
    if (d.daily)  S.daily = d.daily;
    S.tags = (d.tags && d.tags.length) ? d.tags : DEFAULT_TAGS.slice();
  } catch(e) { S.tags = DEFAULT_TAGS.slice(); }
}
function saveData() {
  if (!fbRef) return;
  clearTimeout(saveTimer);
  showBadge('saving');
  saveTimer = setTimeout(function() {
    var ts = Date.now(); lastSavedTs = ts;
    var p = {tables:S.tables, waits:S.waits, ress:S.ress, tags:S.tags, daily:S.daily, _ts:ts};
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); } catch(e) {}
    fbRef.set(p)
      .then(function() { showBadge('saved'); setTimeout(function(){ showBadge(''); }, 2000); })
      .catch(function() { showBadge('err'); });
  }, 400);
}
function startFb() {
  if (!fbRef) return;
  fbRef.off();
  var listenStore = currentStore; // 이 리스너가 등록된 매장 기억
  fbRef.on('value', function(snap) {
    if (listenStore !== currentStore) return; // 매장 바뀌었으면 무시
    var d = snap.val();
    if (!d) return;
    if (d._ts && d._ts === lastSavedTs) return;
    if (d._ts && lastSavedTs && d._ts < lastSavedTs - 1000) return;
    if (d.tables && d.tables.length) S.tables = d.tables;
    if (d.waits)  S.waits = d.waits;
    if (d.ress)   S.ress  = d.ress;
    if (d.daily)  S.daily = d.daily;
    if (d.tags && d.tags.length) S.tags = d.tags;
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch(e) {}
    S.tables.forEach(function(t){ cardCache[t.id]=''; });
    syncToday(); renderAll();
    if (currentTab === 'reserve') renderReservations();
  }, function() { showBadge('err'); });
}
function showBadge(s) {
  var el = document.getElementById('badge');
  el.style.color = ({saving:'#c8922a',saved:'#2a9a5a',err:'var(--red2)'})[s] || 'transparent';
  el.textContent  = ({saving:'저장 중…',saved:'✓ 저장됨',err:'⚠ 실패'})[s] || '';
}

// ── 유틸 ──
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function uid()  { return Date.now() + '_' + Math.random().toString(36).slice(2,7); }
function pad(n) { return String(n).padStart(2,'0'); }
function fmtElapsed(ms) {
  var t=Math.floor(ms/1000), h=Math.floor(t/3600), m=Math.floor((t%3600)/60), s=t%60;
  return h ? h+':'+pad(m)+':'+pad(s) : pad(m)+':'+pad(s);
}
function fmtTime(ts) { var d=new Date(ts); return pad(d.getHours())+':'+pad(d.getMinutes()); }
function today()  { var d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function dlabel(s) {
  if (!s) return '';
  var p=s.split('-');
  return new Date(+p[0],+p[1]-1,+p[2]).toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
}
function mkTable(t) {
  var shape = t.shape || (t.t==='바'?'bar':t.t==='6인'?'wide':'sq');
  var sz    = t.sz    || (t.t==='바'?'s':t.t==='6인'?'l':'m');
  var cap   = t.c || (shape==='wide'?6:shape==='bar'?2:4);
  return {id:t.id, n:t.n, shape:shape, sz:sz, c:cap, px:t.px, py:t.py, st:'empty', g:0, seatTime:null, res:null};
}
function isSlaveTbl(tid) {
  return S.tables.some(function(t){ return t.mergeIds && t.mergeIds.indexOf(tid) >= 0; });
}
function tblColor(st, seatTime, merged) {
  var isLight = document.body.classList.contains('light');
  if (st==='empty' && merged) return isLight
    ? {bg:'rgba(90,82,200,.07)', bd:'rgba(90,82,200,.45)', tx:'#4840b0'}
    : {bg:'rgba(90,82,200,.14)', bd:'var(--indigo)',       tx:'#a78bfa'};
  if (st==='empty')    return isLight
    ? {bg:'#f5f3f0', bd:'#d8d2c8', tx:'#a09880'}
    : {bg:'#1c1a18', bd:'#3a3835', tx:'#5a5248'};
  if (st==='reserved') return isLight
    ? {bg:'rgba(42,114,200,.08)', bd:'rgba(42,114,200,.5)', tx:'#1a5aaa'}
    : {bg:'rgba(42,114,200,.12)', bd:'var(--blue)',         tx:'#60a5fa'};
  var e = Date.now() - seatTime;
  if (e < 3600000) return isLight
    ? {bg:'rgba(200,146,42,.1)',  bd:'#b07818', tx:'#7a5210'}
    : {bg:'rgba(200,146,42,.1)',  bd:'var(--amber)', tx:'var(--amber)'};
  if (e < 5400000) return isLight
    ? {bg:'rgba(200,112,48,.12)', bd:'#c87030', tx:'#7c3810'}
    : {bg:'rgba(200,112,48,.1)',  bd:'#c87030', tx:'#c87030'};
  return isLight
    ? {bg:'rgba(196,18,48,.08)',  bd:'var(--red)', tx:'var(--red2)'}
    : {bg:'rgba(196,18,48,.12)',  bd:'var(--red)', tx:'var(--red2)'};
}
function cardSz(shape, sz, W, H) {
  var bw = {s:0.17, m:0.26, l:0.36}[sz] || 0.26;
  // 가로모드(W>H)에서는 캔버스 높이가 작으므로 카드 크기를 비례 축소
  if (W > H) bw = bw * 0.75;
  var w  = Math.round(W * bw);
  var ratio = shape==='wide' ? 0.52 : shape==='bar' ? 0.32 : 1.0;
  var h = Math.round(w * ratio);
  if (h < 28) h = 28;
  return {w:w, h:h};
}
function doneCnt() {
  var td = today();
  return (S.daily||[]).filter(function(d){ return d.date===td; }).length
       + S.ress.filter(function(r){ return r.st==='completed' && r.date===td; }).length;
}

  var panel = document.getElementById('cv'), inner = document.getElementById('cvi');
  var W = panel.offsetWidth;
  if (!W) { setTimeout(renderCanvas, 50); return; }
  var isLandscape = window.innerWidth > window.innerHeight;
  var H = Math.round(W * (isLandscape ? 0.7 : 1.25));
  if (parseInt(panel.style.height) !== H) panel.style.height = H+'px';
  var now = Date.now();
  S.tables.forEach(function(tb) {
    var card = document.getElementById('tc'+tb.id);
    if (!card) {
      card = document.createElement('div'); card.id = 'tc'+tb.id;
      inner.appendChild(card); bindCard(card, tb.id); cardCache[tb.id]='';
    }
    var isMerged = !!(tb.mergeIds && tb.mergeIds.length) || isSlaveTbl(tb.id);
    var c  = tblColor(tb.st, tb.seatTime, isMerged);
    var sz = cardSz(tb.shape||'sq', tb.sz||'m', W, H);
    var x  = Math.max(0, Math.min(W-sz.w, Math.round(tb.px/100*W)));
    var y  = Math.max(0, Math.min(H-sz.h, Math.round(tb.py/100*H)));

    card.style.width=sz.w+'px'; card.style.height=sz.h+'px';
    card.style.background=c.bg; card.style.borderColor=c.bd;
    card.style.padding=(tb.shape==='bar')?'5px 9px':'8px 9px 7px';
    card.style.cursor=editMode?'grab':'pointer';
    card.style.boxShadow=editMode?'0 0 0 2px rgba(196,18,48,.3)':'';
    var wasDrag = card.classList.contains('drag');
    card.className = 'tc' + (wasDrag?' drag':'');
    var isLightMode = document.body.classList.contains('light');
    var dot = tb.st==='occupied'?'#2a9a5a':tb.st==='reserved'?'var(--blue)':(isMerged?'var(--indigo)':(isLightMode?'#c8c0b0':'#3a3835'));
    var elMin = tb.st==='occupied'?Math.floor((now-tb.seatTime)/60000):0;
    var key = tb.st+'|'+tb.g+'|'+(tb.seatTime||0)+'|'+elMin+'|'+(tb.res?JSON.stringify(tb.res):'')+
              '|'+editMode+'|'+tb.shape+'|'+tb.sz+'|'+(isMerged?1:0);
    if (cardCache[tb.id]===key) return;
    cardCache[tb.id]=key;
    var html='';
    var isBar = tb.shape==='bar';
    var elapsed = tb.st==='occupied' ? now - tb.seatTime : 0;
    var isOvertime = elapsed >= 5400000;
    var elapsedTxt = elapsed ? (isOvertime ? '+' : '') + fmtElapsed(elapsed) : '';
    var dotColor = editMode ? 'rgba(196,18,48,.5)' : dot;

    if (isBar) {
      html = '<div style="display:flex;justify-content:space-between;align-items:center;width:100%;height:100%">'
           + '<div class="tc-name" style="color:'+c.tx+'">'+esc(tb.n)+'</div>';
      if (editMode) {
        html += '<div class="tc-dot" style="background:'+dotColor+'"></div>';
      } else if (tb.st==='occupied') {
        html += '<div class="tc-bar-r">'
              + '<div class="tc-info-row" style="color:'+c.tx+'">'+esc(String(tb.g))+'명</div>'
              + '<div class="tc-info-sub" style="color:'+c.tx+'">'+elapsedTxt+'</div>'
              + '</div>';
      } else if (tb.st==='reserved') {
        html += '<div class="tc-bar-r">'
              + '<div class="tc-info-row" style="color:'+c.tx+'">'+esc(tb.res&&tb.res.time||'')+'</div>'
              + (tb.res&&tb.res.g ? '<div class="tc-info-sub" style="color:'+c.tx+'">'+esc(String(tb.res.g))+'명</div>' : '')
              + '</div>';
      } else {
        html += '<div class="tc-dot" style="background:'+dotColor+'"></div>';
      }
      html += '</div>';
    } else {
      // Square / Wide
      html = '<div class="tc-hd">'
           + '<div class="tc-name" style="color:'+c.tx+'">'+esc(tb.n)+'</div>'
           + '<div class="tc-dot" style="background:'+dotColor+'"></div>'
           + '</div>';

      if (!editMode) {
        if (tb.st==='occupied') {
          html += '<div class="tc-info">'
                + '<div class="tc-info-row" style="color:'+c.tx+'">'+esc(String(tb.g))+'명</div>'
                + '<div class="tc-info-sub" style="color:'+c.tx+'">'+(isOvertime?'<span style="font-weight:800">'+elapsedTxt+'</span>':elapsedTxt)+'</div>'
                + '</div>';
        } else if (tb.st==='reserved') {
          var resName = esc(tb.res&&tb.res.name||'');
          var resTime = esc(tb.res&&tb.res.time||'');
          var resG = tb.res&&tb.res.g ? esc(String(tb.res.g))+'명' : '';
          html += '<div class="tc-info">'
                + (resName ? '<div class="tc-info-row" style="color:'+c.tx+';overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+resName+'</div>' : '')
                + '<div class="tc-info-sub" style="color:'+c.tx+'">'+(resTime&&resG ? resTime+' · '+resG : resTime||resG)+'</div>'
                + '</div>';
        } else if (tb.mergeIds && tb.mergeIds.length) {
          html += '<div class="tc-info">'
                + '<div style="font-size:9px;color:#a78bfa;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+getMergedNames(tb.id).join(' + ')+'</div>'
                + '</div>';
        }
      }
    }
    card.innerHTML = html;
  });
}

// ── 드래그 ──
function bindCard(card, tid) {
  var dragging=false, lpt=null, tapAt=0;
  card.addEventListener('touchstart', function(e){
    tapAt=Date.now(); if(!editMode)return;
    var touch=e.touches[0];
    lpt=setTimeout(function(){ dragging=true; card.classList.add('drag'); startDrag(card,tid,touch.clientX,touch.clientY); },180);
  }, {passive:true});
  card.addEventListener('touchmove', function(e){
    if(!editMode)return; if(lpt){clearTimeout(lpt);lpt=null;} if(!dragging)return; e.preventDefault();
    moveDrag(e.touches[0].clientX, e.touches[0].clientY, card, tid);
  }, {passive:false});
  card.addEventListener('touchend', function(){
    if(lpt){clearTimeout(lpt);lpt=null;}
    if(dragging){dragging=false;card.classList.remove('drag');snapCard(tid);saveData();return;}
    if(!editMode && Date.now()-tapAt<280) openTableModal(tid);
  });
  card.addEventListener('mousedown', function(e){
    if(!editMode)return; dragging=true; card.classList.add('drag'); startDrag(card,tid,e.clientX,e.clientY);
    function onMove(ev){moveDrag(ev.clientX,ev.clientY,card,tid);}
    function onUp(){dragging=false;card.classList.remove('drag');snapCard(tid);saveData();document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);}
    document.addEventListener('mousemove',onMove); document.addEventListener('mouseup',onUp);
  });
  card.addEventListener('click', function(){ openTableModal(tid); });
}
function startDrag(card,tid,cx,cy){
  var r=card.getBoundingClientRect(); dragOffset={x:cx-r.left,y:cy-r.top};
  dragPanelRect=document.getElementById('cv').getBoundingClientRect();
}
function moveDrag(cx,cy,card,tid){
  if(!dragPanelRect)return;
  var p=document.getElementById('cv'), W=p.offsetWidth, H=p.offsetHeight;
  var tb=S.tables.filter(function(t){return t.id===tid;})[0];
  var sz=cardSz(tb?tb.shape:'sq', tb?tb.sz:'m', W, H);
  var nx=Math.max(0,Math.min(W-sz.w, cx-dragPanelRect.left-dragOffset.x));
  var ny=Math.max(0,Math.min(H-sz.h, cy-dragPanelRect.top-dragOffset.y));
  card.style.left=nx+'px'; card.style.top=ny+'px';
  S.tables=S.tables.map(function(t){return t.id===tid?Object.assign({},t,{px:nx/W*100,py:ny/H*100}):t;});
  cardCache[tid]='';
}
function snapCard(tid){
  var p=document.getElementById('cv'), W=p.offsetWidth, H=p.offsetHeight;
  var SNAP=Math.round(W*.04), GAP=Math.round(W*.015);
  var me=S.tables.filter(function(t){return t.id===tid;})[0]; if(!me)return;
  var sz=cardSz(me.shape,me.sz,W,H), px=me.px/100*W, py=me.py/100*H;
  var xa=[0,W-sz.w], ya=[0,H-sz.h];
  S.tables.filter(function(t){return t.id!==tid;}).forEach(function(t){
    var s2=cardSz(t.shape,t.sz,W,H), ox=t.px/100*W, oy=t.py/100*H;
    xa.push(ox, ox+s2.w+GAP, ox+s2.w-sz.w); ya.push(oy, oy+s2.h+GAP, oy+s2.h-sz.h);
  });
  var bx=px,bdx=SNAP; xa.forEach(function(a){var d=Math.abs(px-a);if(d<bdx){bdx=d;bx=a;}});
  var by=py,bdy=SNAP; ya.forEach(function(a){var d=Math.abs(py-a);if(d<bdy){bdy=d;by=a;}});
  bx=Math.max(0,Math.min(W-sz.w,bx)); by=Math.max(0,Math.min(H-sz.h,by));
  var card=document.getElementById('tc'+tid);
  if(card){card.style.transition='left .18s,top .18s';card.style.left=bx+'px';card.style.top=by+'px';setTimeout(function(){if(card)card.style.transition='';},200);}
  S.tables=S.tables.map(function(t){return t.id===tid?Object.assign({},t,{px:bx/W*100,py:by/H*100}):t;});
}

// ── 테이블 묶기 ──
// merges: [{masterId, slaveIds:[]}] — S.tables 각 테이블에 mergeGroup 필드로 저장
function getMergedCap(tid) {
  var tb = S.tables.filter(function(t){ return t.id===tid; })[0];
  if (!tb) return 50;
  var base = tb.c || 4;
  if (!tb.mergeIds || !tb.mergeIds.length) return Math.max(base, 50);
  var extra = 0;
  tb.mergeIds.forEach(function(mid){
    var mt = S.tables.filter(function(t){ return t.id===mid; })[0];
    if (mt) extra += (mt.c || 4);
  });
  return base + extra;
}
function getMergedNames(tid) {
  var tb = S.tables.filter(function(t){ return t.id===tid; })[0];
  if (!tb || !tb.mergeIds || !tb.mergeIds.length) return [];
  return tb.mergeIds.map(function(mid){
    var mt = S.tables.filter(function(t){ return t.id===mid; })[0];
    return mt ? mt.n : '';
  }).filter(Boolean);
}
function openMergeModal(masterId) {
  var master = S.tables.filter(function(t){ return t.id===masterId; })[0];
  if (!master) return;
  // 현재 묶인 테이블 목록
  var currentMergeIds = master.mergeIds ? master.mergeIds.slice() : [];
  // 묶을 수 있는 테이블: 빈 테이블 중 자신 제외, 다른 곳에 묶이지 않은 것
  var available = S.tables.filter(function(t){
    if (t.id === masterId) return false;
    if (t.st !== 'empty') return false;
    // 이미 다른 테이블의 slave인지 확인
    var isSlave = S.tables.some(function(mt){
      return mt.id !== masterId && mt.mergeIds && mt.mergeIds.indexOf(t.id) >= 0;
    });
    return !isSlave;
  });
  var itemsHtml = available.length ? available.map(function(t){
    var isMerged = currentMergeIds.indexOf(t.id) >= 0;
    return '<button type="button" class="tpb" data-mid="'+t.id+'" style="border-color:'+(isMerged?'var(--indigo)':'var(--border2)')+';background:'+(isMerged?'rgba(90,82,200,.12)':'var(--surf2)')+'">'
      +'<span style="color:'+(isMerged?'#a78bfa':'var(--text)')+'">'+esc(t.n)+'</span>'
      +'<span class="tps">'+t.c+'인 '+(isMerged?'✓ 묶임':'')+'</span></button>';
  }).join('') : '<p style="color:var(--text3);font-size:13px;text-align:center;padding:16px 0">묶을 수 있는 빈 테이블 없음</p>';

  var totalCap = master.c + currentMergeIds.reduce(function(a,mid){
    var mt=S.tables.filter(function(t){return t.id===mid;})[0]; return a+(mt?mt.c:0);
  },0);

  showModal('<div class="md-hd"><span class="md-title">'+esc(master.n)+' 테이블 묶기</span><button class="md-x" id="mxbtn">×</button></div>'
    +'<div class="mb">'
    +'<div style="font-size:12px;color:var(--text2);margin-bottom:10px">테이블을 선택하면 합쳐서 운영할 수 있어요<br>현재 최대 <span id="merge-cap-disp" style="font-weight:800;color:var(--indigo)">'+totalCap+'명</span></div>'
    +'<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px" id="merge-list">'+itemsHtml+'</div>'
    +'<div class="abs">'
    +'<button class="ab" style="background:var(--red)" id="merge-clear">묶기 해제</button>'
    +'<button class="ab" style="background:var(--indigo)" id="merge-save">저장</button>'
    +'</div></div>');

  // 토글
  document.getElementById('merge-list').querySelectorAll('[data-mid]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var mid = +this.getAttribute('data-mid');
      var idx = currentMergeIds.indexOf(mid);
      if (idx >= 0) currentMergeIds.splice(idx, 1);
      else currentMergeIds.push(mid);
      // UI 업데이트
      var newTotal = master.c + currentMergeIds.reduce(function(a,m){
        var mt=S.tables.filter(function(t){return t.id===m;})[0]; return a+(mt?mt.c:0);
      },0);
      document.getElementById('merge-cap-disp').textContent = newTotal+'명';
      var isMergedNow = currentMergeIds.indexOf(mid) >= 0;
      this.style.borderColor = isMergedNow?'var(--indigo)':'var(--border2)';
      this.style.background  = isMergedNow?'rgba(90,82,200,.12)':'var(--surf2)';
      this.querySelector('span').style.color = isMergedNow?'#a78bfa':'var(--text)';
      this.querySelector('.tps').textContent = S.tables.filter(function(t){return t.id===mid;})[0].c+'인 '+(isMergedNow?'✓ 묶임':'');
    });
  });
  document.getElementById('merge-save').addEventListener('click', function(){
    S.tables = S.tables.map(function(t){
      if (t.id === masterId) return Object.assign({},t,{mergeIds: currentMergeIds.slice()});
      return t;
    });
    closeModal(); saveData(); renderAll();
  });
  document.getElementById('merge-clear').addEventListener('click', function(){
    S.tables = S.tables.map(function(t){
      if (t.id === masterId) return Object.assign({},t,{mergeIds:[]});
      return t;
    });
    closeModal(); saveData(); renderAll();
  });
}

function renderCal(){
  document.getElementById('calm').textContent=calY+'년 '+(calM+1)+'월';
  var fd=new Date(calY,calM,1).getDay(), dim=new Date(calY,calM+1,0).getDate();
  var td=today(), dots={};
  S.ress.filter(function(r){return r.st!=='cancelled'&&r.date;}).forEach(function(r){dots[r.date]=1;});
  var html='';
  for(var i=0;i<fd;i++) html+='<div class="cd other"></div>';
  for(var d=1;d<=dim;d++){
    var s=calY+'-'+pad(calM+1)+'-'+pad(d), dow=(fd+d-1)%7;
    var cls='cd'+(dow===0?' sun':dow===6?' sat':'')+(s===td&&s!==calSel?' today':'')+(s===calSel?' sel':'');
    html+='<div class="'+cls+'" data-d="'+s+'">'+d+(dots[s]?'<div class="dot"></div>':'')+'</div>';

function renderRvList(){
  var q=(document.getElementById('rvsrch').value||'').trim().toLowerCase();

  if(calSel) list=list.filter(function(r){return r.date===calSel;});
  if(q) list=list.filter(function(r){return (r.nm||'').toLowerCase().indexOf(q)>=0||(r.phone||'').indexOf(q)>=0;});
  list.sort(function(a,b){
    var ka=(a.date||'9999')+(a.time||'99:99'), kb=(b.date||'9999')+(b.time||'99:99');
    return rvSortAsc?(ka<kb?-1:1):(ka>kb?-1:1);
  });
  document.getElementById('rvtitle').textContent=calSel?dlabel(calSel)+' 예약':'전체 예약';
  document.getElementById('rvcnt').textContent=list.length+'건';
  var sortBtn=document.getElementById('rvsort');
  if(sortBtn) sortBtn.textContent=rvSortAsc?'↑ 날짜순':'↓ 날짜순';
  var sm={confirmed:['#2a9a5a','rgba(42,154,90,.12)','확정'],pending:['var(--amber)','rgba(200,146,42,.1)','대기'],
          arrived:['var(--blue)','rgba(42,114,200,.1)','방문'],noshow:['var(--red2)','rgba(196,18,48,.1)','노쇼'],completed:['var(--indigo)','rgba(90,82,200,.1)','완료']};
  var nd=today(), showSections=!calSel&&!q;
  var html='';
  if(showSections){
    var upcoming=list.filter(function(r){return r.date>=nd;});
    var past=list.filter(function(r){return r.date<nd;});
    if(rvSortAsc){
      if(past.length) html+='<div class="rv-sec-lbl">지난 예약 '+past.length+'건</div>'+past.map(function(r){return rvItemHtml(r,sm,true);}).join('');
      if(upcoming.length) html+='<div class="rv-sec-lbl">예정 예약 '+upcoming.length+'건</div>'+upcoming.map(function(r){return rvItemHtml(r,sm,false);}).join('');
    } else {
      if(upcoming.length) html+='<div class="rv-sec-lbl">예정 예약 '+upcoming.length+'건</div>'+upcoming.map(function(r){return rvItemHtml(r,sm,false);}).join('');
      if(past.length) html+='<div class="rv-sec-lbl">지난 예약 '+past.length+'건</div>'+past.map(function(r){return rvItemHtml(r,sm,true);}).join('');
    }
    if(!html) html='<div style="padding:24px;text-align:center;color:var(--text3);font-size:13px">예약 없음</div>';
  } else {
    html=list.length?'':'<div style="padding:24px;text-align:center;color:var(--text3);font-size:13px">예약 없음</div>';
    list.forEach(function(r){html+=rvItemHtml(r,sm,!calSel&&r.date<nd);});
  }
  document.getElementById('rvlist').innerHTML=html;
  document.getElementById('rvlist').querySelectorAll('.rvi').forEach(function(el){

  showModal(

    });

function parseNaverScreenshot(base64, mediaType) {
  var key = getGeminiKey();
  var prompt = '이 이미지는 네이버 스마트플레이스 예약 상세 페이지의 스크린샷입니다.\n'
    + '다음 예약 정보를 추출해서 JSON 객체만 반환하세요. 설명이나 마크다운 없이 JSON만 응답하세요:\n'
    + '{\n'
    + '  "nm": "예약자명 (문자열)",\n'
    + '  "phone": "전화번호, 010-XXXX-XXXX 형식으로 변환. 없으면 빈 문자열",\n'
    + '  "resNo": "예약번호 (문자열, 없으면 빈 문자열)",\n'
    + '  "product": "상품명 (예: 바(BAR) 자리 예약, 없으면 빈 문자열)",\n'
    + '  "date": "이용날짜 YYYY-MM-DD 형식",\n'
    + '  "time": "이용시간 HH:MM 형식 (24시간제)",\n'
    + '  "g": 인원수 숫자,\n'
    + '  "st": "확정이면 confirmed, 완료이면 completed, 취소이면 cancelled, 나머지는 confirmed"\n'
    + '}\n'
    + '값을 찾을 수 없으면 null 또는 빈 문자열로 처리하세요.';

  var url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + key;

  return fetch(url, {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({
      contents: [{
        parts: [
          { inline_data: { mime_type: mediaType || 'image/jpeg', data: base64 } },
          { text: prompt }
        ]
      }],
      generationConfig: { maxOutputTokens: 512, temperature: 0 }
    })
  }).then(function(res) {
    if (!res.ok) {
      return res.json().catch(function() { return {}; }).then(function(err) {
        if (res.status === 400 || res.status === 403) {
          localStorage.removeItem('ryuma_gemini_key');
          throw new Error('API 키가 유효하지 않습니다. 설정에서 다시 입력해주세요.');
        }
        var msg = err.error && err.error.message ? err.error.message : '오류 코드 ' + res.status;
        throw new Error(msg);
      });
    }
    return res.json();
  }).then(function(data) {
    var text = (data.candidates && data.candidates[0] &&
                data.candidates[0].content && data.candidates[0].content.parts &&
                data.candidates[0].content.parts[0] && data.candidates[0].content.parts[0].text) || '';
    var match = text.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('응답에서 예약 정보를 찾을 수 없습니다');
    return JSON.parse(match[0]);
  });
}

function confirmNaverImport(p) {
  if (!p) { alert('파싱 결과가 없습니다'); return; }
  var d = p.date || today();
  var t = p.time || '18:00';

function saveOneToNotion(r) {
  var token = getNotionToken();
  if (!token) return;
  var storeName = currentStore === 'covent' ? '코벤트' : '파라곤';
  var stMap = {confirmed:'확정', pending:'대기', arrived:'방문', noshow:'노쇼', completed:'완료', cancelled:'취소'};
  var body = {
    parent: { database_id: NOTION_DB_ID },
    properties: {
      '예약자명': { title: [{ text: { content: r.nm || '(이름없음)' } }] },
      '인원':     { number: r.g || 1 },
      '연락처':   { phone_number: r.phone || null },
      '메모':     { rich_text: [{ text: { content: r.memo || '' } }] },
      '매장':     { select: { name: storeName } },
      '상태':     { select: { name: stMap[r.st] || '확정' } }
    }
  };
  if (r.date) body.properties['예약날짜'] = { date: { start: r.date } };
  fetch('https://api.notion.com/v1/pages', {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + token,
      'Content-Type': 'application/json',
      'Notion-Version': '2022-06-28'
    },
    body: JSON.stringify(body)
  }).then(function(res) {
    if (!res.ok) res.json().then(function(err) {
      if (err.code === 'unauthorized') localStorage.removeItem('ryuma_notion_token');
    });
  }).catch(function(e) { console.warn('Notion save failed:', e); });
}

var NOTION_DB_ID = '7562318a7b0b41b5aa3a9ec91cba2d85';

function setBackupStatus(msg, color) {

    +'② 새 Integration 생성 → Internal<br>'

  );

      alert('올바른 토큰을 입력하세요 (secret_으로 시작)'); return;
    }
    localStorage.setItem('ryuma_notion_token', token);

    setTimeout(function() { openCfg(); setTimeout(runNotionBackup, 300); }, 200);
  });

async function runNotionBackup() {
  var token = getNotionToken();
  if (!token) { openNotionTokenInput(); return; }

  if (!S.ress || !S.ress.length) {
    setBackupStatus('백업할 예약 데이터가 없습니다', 'var(--amber)'); return;
  }
  var btn = document.getElementById('btn-backup');
  if (btn) { btn.disabled = true; btn.style.opacity = '.6'; }
  setBackupStatus('백업 중…', 'var(--amber)');

  var storeName = currentStore === 'covent' ? '코벤트' : '파라곤';
  var stMap = {confirmed:'확정', pending:'대기', arrived:'방문', noshow:'노쇼', completed:'완료'};
  var ok = 0, fail = 0;
  var list = S.ress.filter(function(r){ return r.st !== 'cancelled'; });

  for (var i = 0; i < list.length; i++) {
    var r = list[i];
    var body = {
      parent: { database_id: NOTION_DB_ID },
      properties: {
        '예약자명': { title: [{ text: { content: r.nm || '(이름없음)' } }] },
        '인원':     { number: r.g || 1 },
        '연락처':   { phone_number: r.phone || null },
        '메모':     { rich_text: [{ text: { content: r.memo || '' } }] },
        '매장':     { select: { name: storeName } },
        '상태':     { select: { name: stMap[r.st] || '확정' } }
      }
    };
    if (r.date) {
      body.properties['예약날짜'] = { date: { start: r.date } };
    }
    try {
      var res = await fetch('https://api.notion.com/v1/pages', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + token,
          'Content-Type': 'application/json',
          'Notion-Version': '2022-06-28'
        },
        body: JSON.stringify(body)
      });
      if (res.ok) { ok++; }
      else {
        var err = await res.json();
        if (err.code === 'unauthorized') {
          // 토큰 오류 → 재입력 유도
          if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
          setBackupStatus('토큰 오류. 다시 설정해주세요', 'var(--red2)');
          localStorage.removeItem('ryuma_notion_token');
          return;
        }
        fail++;
      }
    } catch(e) { fail++; }
    setBackupStatus('저장 중… (' + (ok+fail) + '/' + list.length + ')', 'var(--amber)');
  }

  if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
  if (fail === 0) {
    setBackupStatus('✅ ' + ok + '건 백업 완료!', '#2a9a5a');
  } else {
    setBackupStatus('⚠ ' + ok + '건 성공 / ' + fail + '건 실패', 'var(--red2)');
  }
}

function syncToday(){
  var td=today(), changed=false;
  S.ress.forEach(function(r){
    if(r.date===td&&r.st==='confirmed'&&r.tableId){
      var tbl=S.tables.filter(function(t){return t.id===r.tableId;})[0];
      if(tbl&&tbl.st==='empty'){
        var ro={name:r.nm,g:r.g,time:r.time,date:r.date,phone:r.phone,memo:r.memo,tags:r.tags,resId:r.id};
        S.tables=S.tables.map(function(t){return t.id===r.tableId?Object.assign({},t,{st:'reserved',res:ro}):t;});
        changed=true;
      }
    }
  });
  if(changed){S.tables.forEach(function(t){cardCache[t.id]='';});saveData();}
}
