<body>
<!-- 매장선택 -->
<div id="sel">
  <button id="sel-theme" style="position:absolute;top:20px;right:20px;background:none;border:none;font-size:22px;cursor:pointer;opacity:.6;padding:6px">☀️</button>
  <img id="sel-logo" class="sel-logo" alt="류마">
  <div class="sel-brand">RYUMA</div>
  <div class="sel-step" id="step-store">
    <div class="sel-label">매장 선택</div>
    <button class="sel-store-btn" id="btn-covent">
      <span>류마 코벤트</span><span class="sel-store-icon">›</span>
    </button>
    <button class="sel-store-btn" id="btn-paragon">
      <span>류마 파라곤</span><span class="sel-store-icon">›</span>
    </button>
  </div>
  <div class="pw-form" id="step-pw" style="display:none">
    <div class="pw-store-name" id="pw-name"></div>
    <div class="pw-sub">비밀번호를 입력하세요</div>
    <input type="password" class="pw-input" id="pw-input" placeholder="비밀번호" autocomplete="current-password">
    <button class="pw-btn" id="pw-enter">입장</button>
    <div class="pw-err" id="pw-err"></div>
    <button class="sel-back" id="pw-back">← 매장 변경</button>
  </div>
</div>

<!-- 메인 앱 -->
<div id="wrap" style="display:none">
  <div id="hd">
    <div class="hd-left">
      <img class="hd-logo" id="hd-logo" alt="류마">
      <div>
        <div class="hd-title" id="hd-store"></div>
        <div class="hd-date" id="hdate"></div>
      </div>
    </div>
    <div class="hd-right">
      <span id="badge"></span>
      <span class="chip" id="c1" style="color:#60a5fa;border-color:#60a5fa33;background:rgba(42,114,200,.1)"></span>
      <span class="chip" id="c2" style="color:var(--red2);border-color:rgba(196,18,48,.3);background:rgba(196,18,48,.1)"></span>
      <span class="chip" id="c3" style="color:var(--amber);border-color:rgba(200,146,42,.3);background:rgba(200,146,42,.1)"></span>
      <button class="bg" id="btn-view" style="font-size:14px;padding:5px 9px">☰</button>
      <button class="be" id="bedit">✏️</button>
      <button class="bg" id="btn-theme" style="font-size:14px;padding:5px 8px">☀️</button>
      <button class="bg" id="btn-cfg" style="font-size:14px;padding:5px 8px">⚙</button>
    </div>
  </div>
  <div id="tb">
    <button class="tab on" id="t1">🪑 홀 현황</button>
    <button class="tab" id="t2">📋 예약 관리</button>
    <button class="tab" id="t3">👤 손님</button>
  </div>
  <div id="body">
    <div id="sb">
      <div class="sb-head">
        <span class="sb-title">LIVE</span>
        <button class="sb-add" id="bwait">+ 대기</button>
      </div>
      <div id="sb-scroll"></div>
    </div>
    <div id="main">
      <div id="floor-nav"></div>
      <div id="leg">
        <div class="ld"><div class="lc" id="lc-empty" style="background:#3a3835"></div>빈</div>
        <div class="ld"><div class="lc" style="background:var(--blue)"></div>예약</div>
        <div class="ld"><div class="lc" style="background:var(--amber)"></div>~1h</div>
        <div class="ld"><div class="lc" style="background:#c87030"></div>~1.5h</div>
        <div class="ld"><div class="lc" style="background:var(--red)"></div>1.5h+</div>
        <span id="ehint" style="margin-left:auto;font-size:10px;color:var(--red);font-weight:700"></span>
      </div>
      <div id="cv"><div id="edbanner">편집 모드 · 길게 누르고 드래그 · 완료 후 저장 클릭</div><div id="cvi"></div></div>
      <div id="listview"></div>
      <div id="stats">
        <div class="sc"><div class="si" style="background:rgba(42,114,200,.12)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div><div><div class="sl">착석 인원</div><div class="sv" id="s1" style="color:#60a5fa">0명</div></div></div>
        <div class="sc"><div class="si" style="background:rgba(200,146,42,.12)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--amber)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18"/><path d="M9 21V9"/></svg></div><div><div class="sl">착석 테이블</div><div class="sv" id="s2" style="color:var(--amber)">0개</div></div></div>
        <div class="sc"><div class="si" style="background:rgba(42,154,90,.12)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 12l2 2 4-4"/></svg></div><div><div class="sl">빈 테이블</div><div class="sv" id="s3" style="color:#4ade80">0개</div></div></div>
      </div>
    </div>
    <div id="rv">
      <div class="rv-top">
        <input class="rv-srch" id="rvsrch" type="search" placeholder="이름, 연락처 검색…">
        <button class="bg" id="bNaverImport" style="font-size:11px;padding:5px 9px;white-space:nowrap;flex-shrink:0">📷 가져오기</button>
        <button class="bp" id="baddRv">+ 예약</button>
      </div>
      <div id="cal">
        <div class="cal-hd">
          <button class="cal-nav" id="bcalp">‹</button>
          <span class="cal-m" id="calm"></span>
          <button class="cal-nav" id="bcaln">›</button>
        </div>
        <div class="cal-g">
          <div class="cal-dow">일</div><div class="cal-dow">월</div><div class="cal-dow">화</div>
          <div class="cal-dow">수</div><div class="cal-dow">목</div><div class="cal-dow">금</div><div class="cal-dow">토</div>
        </div>
        <div class="cal-g" id="calg"></div>
      </div>
      <div id="rvw">
        <div class="rvw-hd"><span class="rvw-title" id="rvtitle">전체 예약</span><div style="display:flex;align-items:center;gap:6px"><button id="rvsort" style="font-size:10px;padding:3px 8px;border-radius:6px;border:1px solid var(--border2);background:var(--surf2);color:var(--text2);cursor:pointer;font-family:inherit;font-weight:700">↑ 날짜순</button><span style="font-size:11px;color:var(--text3)" id="rvcnt"></span></div></div>
        <div id="rv-upcoming"></div>
        <div id="rv-past-wrap" style="display:none">
          <div class="rv-sec-lbl" id="rv-past-lbl">완료된 예약</div>
          <div id="rv-past"></div>
        </div>
      </div>
    </div>
    <div id="cust">
      <div class="rv-top">
        <input class="rv-srch" id="custsrch" type="search" placeholder="이름, 연락처 검색…">
        <select id="custsort" style="flex-shrink:0;padding:8px 10px;border:1px solid var(--border2);border-radius:8px;background:var(--surf);color:var(--text2);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;outline:none">
          <option value="visits">방문 많은 순</option>
          <option value="recent">최근 방문 순</option>
          <option value="name">이름순</option>
        </select>
        <button class="bg" id="btn-cust-notion" style="font-size:11px;padding:5px 9px;white-space:nowrap;flex-shrink:0">☁ 노션</button>
      </div>
      <div id="custlist"></div>
    </div>
  </div>
</div>
<div id="mo"><div class="md" id="mdc"></div></div>

</body>
